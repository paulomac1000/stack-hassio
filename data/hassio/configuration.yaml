# Loads default set of integrations. Do not remove.
homeassistant:
  allowlist_external_dirs:
    - /config
    - /media
  external_url: "https://hassio.cleverdevelopment.pl"
  internal_url: "http://192.168.0.101:8123"

logger:
  default: info
  logs:
    homeassistant.components.rest_command: critical
    homeassistant.components.automation.watchdog_openbk_devices: critical
    custom_components.xiaomi_miot.core.device.careli.fryer.maf10a: critical
    custom_components.xiaomi_miot.fan: critical
    homeassistant.util.logging: critical
    homeassistant.components.onvif: warning
    onvif: warning
    zeep: warning
    custom_components.tuya_local.device: error

default_config:

notify:
  - name: notification_file_log
    platform: file
    filename: notifications.log
    timestamp: false

utility_meter:
  socket_kitchen_dishwasher_daily_consumption:
    source: sensor.dishwasher_energy_today
    cycle: daily
    unique_id: socket_kitchen_dishwasher_daily_consumption
  socket_kitchen_dishwasher_weekly_consumption:
    source: sensor.dishwasher_energy_today
    cycle: weekly
    unique_id: socket_kitchen_dishwasher_weekly_consumption
  socket_kitchen_dishwasher_monthly_consumption:
    source: sensor.dishwasher_energy_today
    cycle: monthly
    unique_id: socket_kitchen_dishwasher_monthly_consumption
  socket_kitchen_fridge_daily_consumption:
    source: sensor.fridge_energy_today
    cycle: daily
    unique_id: socket_kitchen_fridge_daily_consumption
  socket_kitchen_fridge_weekly_consumption:
    source: sensor.fridge_energy_today
    cycle: weekly
    unique_id: socket_kitchen_fridge_weekly_consumption
  socket_kitchen_fridge_monthly_consumption:
    source: sensor.fridge_energy_today
    cycle: monthly
    unique_id: socket_kitchen_fridge_monthly_consumption
  socket_piesek_pc_daily_consumption:
    source: sensor.pc_energy_today
    cycle: daily
    unique_id: socket_piesek_pc_daily_consumption
  socket_piesek_pc_weekly_consumption:
    source: sensor.pc_energy_today
    cycle: weekly
    unique_id: socket_piesek_pc_weekly_consumption
  socket_piesek_pc_monthly_consumption:
    source: sensor.pc_energy_today
    cycle: monthly
    unique_id: socket_piesek_pc_monthly_consumption
  socket_bedroom_power_strip_daily_consumption:
    source: sensor.power_strip_energy_today
    cycle: daily
    unique_id: socket_bedroom_power_strip_daily_consumption
  socket_bedroom_power_strip_weekly_consumption:
    source: sensor.power_strip_energy_today
    cycle: weekly
    unique_id: socket_bedroom_power_strip_weekly_consumption
  socket_bedroom_power_strip_monthly_consumption:
    source: sensor.power_strip_energy_today
    cycle: monthly
    unique_id: socket_bedroom_power_strip_monthly_consumption

