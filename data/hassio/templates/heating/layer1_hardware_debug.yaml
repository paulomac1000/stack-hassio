# ──────────────────────────────────────────────────────────────
# WThermostat - Debug
# ──────────────────────────────────────────────────────────────
- sensor:
    name: "WThermostat Debug"
    unique_id: "wthermostat_debug_sensor"
    state: >
      {% set state = states('climate.wthermostat') %}
      {% set demand = states('binary_sensor.heating_demand') %}
      {% if state == 'unavailable' %}UNAVAILABLE
      {% elif demand == 'on' %}HEATING
      {% else %}IDLE{% endif %}
    attributes:
      climate_state: "{{ states('climate.wthermostat') }}"
      hvac_action: "{{ state_attr('climate.wthermostat', 'hvac_action') }}"
      current_temperature: "{{ state_attr('climate.wthermostat', 'current_temperature') | default(0) | round(1) }}"
      target_temperature: "{{ state_attr('climate.wthermostat', 'temperature') | default(0) | round(1) }}"
      heating_demand: "{{ states('binary_sensor.heating_demand') }}"
      ac_economical_percentage: "{{ states('sensor.ac_heating_economical_percentage') | float(0) | round(1) }}"
      ac_economical_binary: "{{ states('binary_sensor.ac_heating_economical') }}"
      area: "Salon"
      device_type: "WThermostat"

# ──────────────────────────────────────────────────────────────
# Fuse Air Conditioner - Debug
# ──────────────────────────────────────────────────────────────
- sensor:
    name: "Fuse AC Debug"
    unique_id: "fuse_ac_debug_sensor"
    state: >
      {% set power = states('sensor.fuse_air_conditioner_power') | float(0) %}
      {% set voltage = states('sensor.fuse_air_conditioner_voltage') | float(0) %}
      {% if voltage < 200 %}NO_POWER
      {% elif power > 5 %}ON
      {% elif power > 0 %}STANDBY
      {% else %}OFF{% endif %}
    attributes:
      power_w: "{{ states('sensor.fuse_air_conditioner_power') | float(0) | round(2) }}"
      voltage_v: "{{ states('sensor.fuse_air_conditioner_voltage') | float(0) | round(1) }}"
      current_a: "{{ states('sensor.fuse_air_conditioner_current') | float(0) | round(3) }}"
      apparent_power_va: "{{ states('sensor.fuse_air_conditioner_apparent_power') | float(0) | round(2) }}"
      reactive_power_var: "{{ states('sensor.fuse_air_conditioner_reactive_power') | float(0) | round(2) }}"
      fuse_state: >
        {% set power = states('sensor.fuse_air_conditioner_power') | float(0) %}
        {% set voltage = states('sensor.fuse_air_conditioner_voltage') | float(0) %}
        {% if voltage < 200 %}'no_power'
        {% elif power > 5 %}'on'
        {% elif power > 0 %}'standby'
        {% else %}'off'{% endif %}
      area: "Korytarz"
      device_type: "Fuse"
      issues: >
        {% set issues = [] %}
        {% if states('sensor.fuse_air_conditioner_voltage') | float(0) < 200 %}
          {% set issues = issues + ['voltage_low'] %}
        {% endif %}
        {% if states('sensor.fuse_air_conditioner_power') | float(0) > 0 and states('binary_sensor.ac_heating_economical') == 'off' %}
          {% set issues = issues + ['power_waste'] %}
        {% endif %}
        {{ issues if issues else ['none'] }}
