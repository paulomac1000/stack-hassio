# ═══════════════════════════════════════════════════════════════
# WARSTWA 3: WIRTUALNA (Better Thermostat)
# ═══════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────
# Better Thermostat - LivingRoom Main
# ──────────────────────────────────────────────────────────────
- sensor:
    name: "BT LivingRoom Main Debug"
    unique_id: "bt_livingroom_main_debug_sensor"
    state: >
      {% set state = states('climate.livingroom_main_better_thermostat') %}
      {% set action = state_attr('climate.livingroom_main_better_thermostat', 'hvac_action') %}
      {% if state == 'unavailable' %}UNAVAILABLE
      {% elif action == 'heating' %}HEATING
      {% elif action == 'idle' %}IDLE
      {% else %}{{ state | upper }}{% endif %}
    attributes:
      climate_state: "{{ states('climate.livingroom_main_better_thermostat') }}"
      hvac_action: "{{ state_attr('climate.livingroom_main_better_thermostat', 'hvac_action') }}"
      current_temperature: "{{ state_attr('climate.livingroom_main_better_thermostat', 'current_temperature') | default(0) | round(1) }}"
      target_temperature: "{{ state_attr('climate.livingroom_main_better_thermostat', 'temperature') | default(0) | round(1) }}"
      linked_trv: "TRV_1, TRV_2"
      area: "Salon"
      device_type: "Better Thermostat"
      virtual_calibration: "{{ states('sensor.thermostat_livingroom_virtual_calibrated') | default('N/A') }}"
      virtual_force: "{{ states('sensor.thermostat_livingroom_virtual_force') | default('N/A') }}"

