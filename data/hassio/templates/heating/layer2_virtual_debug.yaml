# ──────────────────────────────────────────────────────────────
# Better Thermostat - Bedroom AC (unavailable monitor)
# ──────────────────────────────────────────────────────────────
- sensor:
    name: "BT Bedroom AC Debug"
    unique_id: "bt_bedroom_ac_debug_sensor"
    state: >
      {% set state = states('climate.bedroom_ac_better_thermostat') %}
      {% if state == 'unavailable' %}UNAVAILABLE
      {% elif state_attr('climate.bedroom_ac_better_thermostat', 'hvac_action') == 'heating' %}HEATING
      {% elif state_attr('climate.bedroom_ac_better_thermostat', 'hvac_action') == 'cooling' %}COOLING
      {% else %}IDLE{% endif %}
    attributes:
      climate_state: "{{ states('climate.bedroom_ac_better_thermostat') }}"
      hvac_action: "{{ state_attr('climate.bedroom_ac_better_thermostat', 'hvac_action') }}"
      linked_device: "AC Bedroom"
      area: "Sypialnia"
      device_type: "Better Thermostat AC"
      unavailable_reason: >
        {% if states('climate.bedroom_ac_better_thermostat') == 'unavailable' %}
          {% if states('sensor.fuse_air_conditioner_power') | float(0) == 0 %}'fuse_off'
          {% else %}'device_offline'{% endif %}
        {% else %}'none'{% endif %}

