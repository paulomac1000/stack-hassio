# ──────────────────────────────────────────────────────────────
# Virtual Calibration Summary
# ──────────────────────────────────────────────────────────────
- sensor:
    name: "Virtual Calibration Summary"
    unique_id: "virtual_calibration_summary_sensor"
    state: >
      {% set bedroom = states('sensor.thermostat_bedroom_virtual_calibrated') | float(0) %}
      {% set livingroom = states('sensor.thermostat_livingroom_virtual_calibrated') | float(0) %}
      {% if bedroom == 0 and livingroom == 0 %}NO_CALIBRATION
      {% elif bedroom != 0 or livingroom != 0 %}CALIBRATED
      {% else %}UNKNOWN{% endif %}
    attributes:
      bedroom_calibration: "{{ states('sensor.thermostat_bedroom_virtual_calibrated') | float(0) | round(2) }}"
      livingroom_calibration: "{{ states('sensor.thermostat_livingroom_virtual_calibrated') | float(0) | round(2) }}"
      bedroom_input: "{{ states('input_number.thermostat_bedroom_virtual_calibration') | float(0) | round(2) }}"
      livingroom_input: "{{ states('input_number.thermostat_livingroom_virtual_calibration') | float(0) | round(2) }}"
      total_calibrated_zones: >
        {% set count = 0 %}
        {% if states('sensor.thermostat_bedroom_virtual_calibrated') | float(0) != 0 %}
          {% set count = count + 1 %}
        {% endif %}
        {% if states('sensor.thermostat_livingroom_virtual_calibrated') | float(0) != 0 %}
          {% set count = count + 1 %}
        {% endif %}
        {{ count }}
