# ═════════════════════════════════════════════════════════════
# ENERGY AI-PACK SYSTEM (Trigger-based)
# ═════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────
# Energy AI Pack Cache (trigger-based)
# ──────────────────────────────────────────────────────────────
- trigger:
    - platform: event
      event_type: energy_ai_pack_updated
  sensor:
    - name: "Energy AI Pack Cache"
      unique_id: energy_ai_pack_cache
      state: "{{ trigger.event.data.status | default('unknown') }}"
      icon: mdi:lightning-bolt
      attributes:
        generated_at: "{{ trigger.event.data.generated_at | default('') }}"
        fingerprint: "{{ trigger.event.data.fingerprint | default('') }}"
        stale: "{{ trigger.event.data.stale | default(false) }}"
        dashboard_today: "{{ trigger.event.data.dashboard.today | default('Brak danych.') }}"
        dashboard_night: "{{ trigger.event.data.dashboard.night | default('Brak danych.') }}"
        dashboard_tomorrow: "{{ trigger.event.data.dashboard.tomorrow | default('Brak danych.') }}"
        tactical_tts: "{{ trigger.event.data.tactical.tts | default('') }}"
        strategic_tts: "{{ trigger.event.data.strategic.tts | default('') }}"
        strategic_pawel: "{{ trigger.event.data.strategic.pawel | default('') }}"
        strategic_magda: "{{ trigger.event.data.strategic.magda | default('') }}"
        prices_snapshot: "{{ trigger.event.data.prices_snapshot | default({}) }}"

# ──────────────────────────────────────────────────────────────
# Energy Dashboard Cache (trigger-based + midnight rotation)
# ──────────────────────────────────────────────────────────────
- trigger:
    - platform: event
      event_type: energy_ai_pack_updated
    - platform: event
      event_type: update_energy_dashboard_daily
    - platform: time
      at: "00:00:30"
      id: midnight_rotation
  sensor:
    - name: "Energy Dashboard Cache"
      unique_id: energy_dashboard_cache
      state: >
        {% if trigger.id == 'midnight_rotation' %}
          rotated
        {% elif trigger.platform == 'event' %}
          {{ trigger.event.data.status | default('success') }}
        {% else %}
          {{ states('sensor.energy_dashboard_cache') | default('unknown') }}
        {% endif %}
      icon: >
        {% if trigger.id == 'midnight_rotation' %}mdi:flash-auto
        {% elif trigger.platform == 'event' and trigger.event.data.status == 'success' %}mdi:flash-check
        {% else %}mdi:flash-alert{% endif %}
      attributes:
        last_update: >
          {% if trigger.id == 'midnight_rotation' %}
            {{ state_attr('sensor.energy_dashboard_cache', 'last_update') }}
          {% else %}
            {{ now().isoformat() }}
          {% endif %}
        friendly_status: >
          {% if trigger.id == 'midnight_rotation' %}Rotacja danych (północ)
          {% elif trigger.platform == 'event' %}
            {% if trigger.event.data.status == 'success' %}Dane aktualne
            {% elif trigger.event.data.status == 'stale' %}Dane nieaktualne
            {% else %}Błąd generowania{% endif %}
          {% else %}{{ state_attr('sensor.energy_dashboard_cache', 'friendly_status') | default('Nieznany') }}{% endif %}
        stale: >
          {% if trigger.id == 'midnight_rotation' %}
            {{ state_attr('sensor.energy_dashboard_cache', 'stale') | default(false) }}
          {% elif trigger.platform == 'event' %}
            {{ trigger.event.data.stale | default(false) }}
          {% else %}false{% endif %}
        summary_today: >
          {% if trigger.id == 'midnight_rotation' %}
            {{ state_attr('sensor.energy_dashboard_cache', 'summary_tomorrow') | default('Brak danych') }}
          {% elif trigger.event is defined %}
            {% if trigger.event.event_type == 'energy_ai_pack_updated' %}
              {{ trigger.event.data.dashboard.today | default('Brak danych') }}
            {% else %}
              {{ trigger.event.data.summary_today | default('Brak danych') }}
            {% endif %}
          {% else %}
            {{ state_attr('sensor.energy_dashboard_cache', 'summary_today') | default('Brak danych') }}
          {% endif %}
        summary_night: >
          {% if trigger.id == 'midnight_rotation' %}
            Dane będą dostępne po 13:15
          {% elif trigger.event is defined %}
            {% if trigger.event.event_type == 'energy_ai_pack_updated' %}
              {{ trigger.event.data.dashboard.night | default('Brak danych') }}
            {% else %}
              {{ trigger.event.data.summary_night | default('Brak danych') }}
            {% endif %}
          {% else %}
            {{ state_attr('sensor.energy_dashboard_cache', 'summary_night') | default('Brak danych') }}
          {% endif %}
        summary_tomorrow: >
          {% if trigger.id == 'midnight_rotation' %}
            Dane będą dostępne po 13:15
          {% elif trigger.event is defined %}
            {% if trigger.event.event_type == 'energy_ai_pack_updated' %}
              {{ trigger.event.data.dashboard.tomorrow | default('Brak danych') }}
            {% else %}
              {{ trigger.event.data.summary_tomorrow | default('Brak danych') }}
            {% endif %}
          {% else %}
            {{ state_attr('sensor.energy_dashboard_cache', 'summary_tomorrow') | default('Brak danych') }}
          {% endif %}
        data_age_hours: >
          {% set last = state_attr('sensor.energy_dashboard_cache', 'last_update') %}
          {% if last %}
            {% set last_ts = as_timestamp(last, 0) %}
            {% if last_ts > 0 %}
              {{ ((as_timestamp(now()) - last_ts) / 3600) | round(1) }}
            {% else %}999{% endif %}
          {% else %}999{% endif %}

# ──────────────────────────────────────────────────────────────
# Energy AI Pack Age Minutes
# ──────────────────────────────────────────────────────────────
- sensor:
    - name: "Energy AI Pack Age Minutes"
      unique_id: energy_ai_pack_age_minutes
      icon: mdi:timer-sand
      unit_of_measurement: "min"
      state: >
        {% set gen_at = states('input_datetime.energy_ai_pack_generated_at') %}
        {% if gen_at in ['unknown', 'unavailable', '', 'None'] or gen_at is none %}
          9999
        {% else %}
          {% set gen_ts = as_timestamp(gen_at, 0) %}
          {% set now_ts = as_timestamp(now()) %}
          {% if gen_ts > 0 %}
            {{ ((now_ts - gen_ts) / 60) | round(0) }}
          {% else %}
            9999
          {% endif %}
        {% endif %}

# ──────────────────────────────────────────────────────────────
# Energy AI Pack Fingerprint Current
# ──────────────────────────────────────────────────────────────
- sensor:
    - name: "Energy AI Pack Fingerprint Current"
      unique_id: energy_ai_pack_fingerprint_current
      icon: mdi:fingerprint
      state: >
        {% set pstryk = states.sensor.pstryk_buy_price %}
        {% if pstryk is none or pstryk.state in ['unknown', 'unavailable'] %}
          unavailable
        {% else %}
          {% set today_raw = state_attr('sensor.pstryk_buy_price', 'prices_today') or [] %}
          {% set tomorrow_raw = state_attr('sensor.pstryk_buy_price', 'prices_tomorrow') or [] %}
          {% set current_hour = now().hour %}
          {% set ns = namespace(today_prices=[]) %}
          {% for item in today_raw %}
            {% set h = (item.time | as_timestamp | timestamp_custom('%H')) | int(0) %}
            {% if h >= current_hour %}
              {% set ns.today_prices = ns.today_prices + [(item.price | float(0) * 10) | round(0)] %}
            {% endif %}
          {% endfor %}
          {% set tomorrow_prices = tomorrow_raw | map(attribute='price') | list %}
          {% set tomorrow_valid = tomorrow_raw | count >= 20 and tomorrow_prices | unique | list != [0.0] %}
          {% set ns2 = namespace(tmrw_prices=[]) %}
          {% if tomorrow_valid %}
            {% for item in tomorrow_raw %}
              {% set ns2.tmrw_prices = ns2.tmrw_prices + [(item.price | float(0) * 10) | round(0)] %}
            {% endfor %}
          {% endif %}
          {{ (ns.today_prices + ns2.tmrw_prices)[:24] | join(',') }}
        {% endif %}

# ──────────────────────────────────────────────────────────────
# Energy Tomorrow Data Valid
# ──────────────────────────────────────────────────────────────
- sensor:
    - name: "Energy Tomorrow Data Valid"
      unique_id: energy_tomorrow_data_valid
      icon: mdi:check-circle
      state: >
        {% set tomorrow_raw = state_attr('sensor.pstryk_buy_price', 'prices_tomorrow') or [] %}
        {% set tomorrow_prices = tomorrow_raw | map(attribute='price') | list %}
        {% set valid = tomorrow_raw | count >= 20 and tomorrow_prices | unique | list != [0.0] %}
        {{ valid }}

# ═════════════════════════════════════════════════════════════
# WEATHER AI-PACK SYSTEM (Trigger-based) - DODANO BRAKUJĄCE
# ═════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────
# Weather Forecast Raw Cache (trigger-based) - DODANY
# ──────────────────────────────────────────────────────────────
- trigger:
    - platform: time_pattern
      hours: "/6"
    - platform: homeassistant
      event: start
  action:
    - action: weather.get_forecasts
      target:
        entity_id: weather.dom
      data:
        type: daily
      response_variable: daily_forecast
    - action: weather.get_forecasts
      target:
        entity_id: weather.dom
      data:
        type: hourly
      response_variable: hourly_forecast
  sensor:
    - name: "Weather Forecast Raw Cache"
      unique_id: weather_forecast_raw_cache
      state: "{{ now().isoformat() }}"
      icon: mdi:weather-cloudy-clock
      attributes:
        today: "{{ daily_forecast['weather.dom'].forecast[0] | default({}) }}"
        tomorrow: "{{ daily_forecast['weather.dom'].forecast[1] | default({}) }}"
        hourly_12h: "{{ hourly_forecast['weather.dom'].forecast[:12] | default([]) }}"

