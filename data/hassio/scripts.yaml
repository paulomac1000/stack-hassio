speakers_in_use:
  alias: Determine whether to turn the speakers on or off
  description: Włącza/wyłącza głośniki Fenda na podstawie aktywności źródeł dźwięku.
  mode: single
  sequence:
  - variables:
      tv_playing: '{{ is_state(''binary_sensor.tv_enabled'', ''on'') }}'
      ma_salon_playing: '{{ is_state(''media_player.salon'', ''playing'') }}'
      ma_terminal_playing: '{{ is_state(''media_player.terminal'', ''playing'') }}'
      ma_chromacast_playing: '{{ is_state(''media_player.chromacast_2'', ''playing'')
        }}'
      ma_android_playing: '{{ is_state(''media_player.android_1cff7134d196a36c'',
        ''playing'') }}'
      snapcast_terminal_playing: '{{ is_state(''media_player.terminal_snapcast_client'',
        ''playing'') }}'
      chromecast_playing: '{{ is_state(''media_player.chromecast'', ''playing'') }}'
      audio_active: "{{ tv_playing\n   or ma_salon_playing\n   or ma_terminal_playing\n
        \  or ma_chromacast_playing\n   or ma_android_playing\n   or snapcast_terminal_playing\n
        \  or chromecast_playing }}\n"
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ audio_active }}'
      sequence:
      - target:
          entity_id: input_boolean.device_livingroom_speakers
        action: input_boolean.turn_on
    default:
    - target:
        entity_id: input_boolean.device_livingroom_speakers
      action: input_boolean.turn_off
led_light:
  alias: Led Light +
  sequence:
  - service: remote.send_command
    data:
      num_repeats: 1
      delay_secs: 0.4
      hold_secs: 0
      command: Light +
      device: Led
    target:
      entity_id: remote.rm4c_mini
  mode: single
led_light_2:
