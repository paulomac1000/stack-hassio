switch_yard_gate_lock:
  alias: Switch Yard Gate Lock
  sequence:
  - type: turn_on
    device_id: 4ca2f28933ebef6960b0a38780a931a3
    entity_id: d27d92a800170971b830372ecb42686c
    domain: switch
  - delay:
      hours: 0
      minutes: 0
      seconds: 3
      milliseconds: 0
  - type: turn_off
    device_id: 4ca2f28933ebef6960b0a38780a931a3
    entity_id: d27d92a800170971b830372ecb42686c
    domain: switch
  mode: single
switch_entry_gate_lock:
  alias: Switch Entry Gate Lock
  sequence:
