    - conditions:
      - condition: template
        value_template: '{{ is_valid }}'
      sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.energy_ai_pack_fingerprint
        data:
          value: '{{ current_fingerprint }}'
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.energy_ai_pack_generated_at
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.energy_ai_pack_stale
      - event: energy_ai_pack_updated
        event_data:
          status: success
          generated_at: '{{ now().isoformat() }}'
          fingerprint: '{{ current_fingerprint }}'
          stale: false
          dashboard:
            today: '{{ sect_dashboard_today }}'
            night: '{{ sect_dashboard_night }}'
            tomorrow: '{{ sect_dashboard_tomorrow }}'
          tactical:
            tts: '{{ sect_tactical_tts }}'
          strategic:
            tts: '{{ sect_strategic_tts }}'
            pawel: '{{ sect_strategic_push }}'
            magda: '{{ sect_strategic_push }}'
          prices_snapshot: '{{ prices_snapshot }}'
      - action: persistent_notification.create
        data:
          title: ✅ Energy AI Pack
          message: 'Cache zaktualizowany (tomorrow_valid: {{ tomorrow_valid }})'
          notification_id: energy_ai_success
    default:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.energy_ai_pack_stale
    - event: energy_ai_pack_updated
      event_data:
        status: stale
        generated_at: '{{ states(''input_datetime.energy_ai_pack_generated_at'') }}'
        fingerprint: '{{ states(''input_text.energy_ai_pack_fingerprint'') }}'
        stale: true
        dashboard:
          today: '{{ state_attr(''sensor.energy_ai_pack_cache'', ''dashboard_today'')
            | default(''Problem z AI.'') }}'
          night: '{{ state_attr(''sensor.energy_ai_pack_cache'', ''dashboard_night'')
            | default(''Sprawdź później.'') }}'
          tomorrow: '{{ state_attr(''sensor.energy_ai_pack_cache'', ''dashboard_tomorrow'')
            | default(''Niedostępne.'') }}'
        tactical:
          tts: '{{ state_attr(''sensor.energy_ai_pack_cache'', ''tactical_tts'') |
            default(''Sprawdź aplikację.'') }}'
        strategic:
          tts: '{{ state_attr(''sensor.energy_ai_pack_cache'', ''strategic_tts'')
            | default(''Dane niedostępne.'') }}'
          pawel: '{{ state_attr(''sensor.energy_ai_pack_cache'', ''strategic_pawel'')
            | default(''Cache error'') }}'
          magda: '{{ state_attr(''sensor.energy_ai_pack_cache'', ''strategic_magda'')
            | default(''Cache error'') }}'
        prices_snapshot: {}
    - action: persistent_notification.create
      data:
        title: ⚠️ Energy AI Pack - Fallback
        message: '{{ debug_msg }}'
        notification_id: energy_ai_error
