                      action: more-info
                alignment: center
          - type: custom:stack-in-card
            mode: vertical
            cards:
              - type: custom:button-card
                entity: device_tracker.tracker_2
                icon: mdi:scooter
                aspect_ratio: 1/1
                show_name: false
                styles:
                  grid:
                    - grid-template-areas: '"i" "localisation"'
                    - grid-template-columns: 1fr
                    - grid-template-rows: 1fr 0.2fr
                  icon:
                    - color: |-
                        [[[
                          if (entity.attributes['status'] == 'online')
                            return 'green';
                          else return '#808080';
                        ]]]
                    - width: 70%
                  custom_fields:
                    localisation:
                      - padding: 2px
                custom_fields:
                  localisation: |-
                    [[[
                      return entity.state;
                    ]]]
              - type: custom:mushroom-chips-card
                chips:
                  - type: template
                    entity: sensor.tracker_2_motion
                    icon_color: |2-
                                {% set motion = state_attr('device_tracker.tracker_2', 'motion') | bool %}
                                {% if motion == true %} red
                                {% else %} grey
                                {% endif %}
                    icon: mdi:traffic-light
                    tap_action:
                      action: more-info
                  - type: template
                    entity: sensor.tracker_2_battery_filtered
                    icon: |2-
                                {% set states = states('sensor.tracker_2_battery_filtered')  %}
                                {% set bl = states | int if states != 'unknown' else -1 %}                    {% if bl >= 0 and bl < 10 %} mdi:battery-outline
                                {% elif bl < 20 %} mdi:battery-10
                                {% elif bl < 30 %} mdi:battery-20
                                {% elif bl < 40 %} mdi:battery-30
                                {% elif bl < 50 %} mdi:battery-40
                                {% elif bl < 60 %} mdi:battery-50
                                {% elif bl < 70 %} mdi:battery-60
                                {% elif bl < 80 %} mdi:battery-70
                                {% elif bl < 90 %} mdi:battery-80
                                {% elif bl < 100 %} mdi:battery-90
                                {% elif bl == 100 %} mdi:battery
                                {% else %} mdi:battery-unknown
                                {% endif %}
                    icon_color: |2-
                                {% set states = states('sensor.tracker_2_battery_filtered')  %}
                                {% set bl = states | int if states != 'unknown' else -1 %}                    {% if bl >= 0 and bl < 10 %} red
                                {% elif bl < 20 %} red
                                {% elif bl < 30 %} red
                                {% elif bl < 40 %} orange
                                {% elif bl < 50 %} orange
                                {% elif bl < 60 %} green
                                {% elif bl < 70 %} green
                                {% elif bl < 80 %} green
                                {% elif bl < 90 %} green
                                {% elif bl < 100 %} green
                                {% elif bl == 100 %} green
                                {% else %} grey
                                {% endif %}
                    tap_action:
                      action: more-info
                alignment: center
          - type: custom:stack-in-card
            mode: vertical
            cards:
              - type: custom:button-card
                entity: device_tracker.tracker_3
                icon: mdi:devices
                aspect_ratio: 1/1
                show_name: false
                styles:
                  grid:
                    - grid-template-areas: '"i" "localisation"'
                    - grid-template-columns: 1fr
                    - grid-template-rows: 1fr 0.2fr
                  icon:
