                    - grid-template-rows: 1fr 0.2fr
                  icon:
                    - color: |-
                        [[[
                          if (entity.attributes['status'] == 'online')
                            return 'green';
                          else return '#808080';
                        ]]]
                    - width: 70%
                  custom_fields:
                    localisation:
                      - padding: 2px
                custom_fields:
                  localisation: |-
                    [[[
                      return entity.state;
                    ]]]
              - type: custom:mushroom-chips-card
                chips:
                  - type: template
                    entity: sensor.tracker_1_motion
                    icon_color: |2-
                                {% set motion = state_attr('device_tracker.tracker_1', 'motion') | bool %}
