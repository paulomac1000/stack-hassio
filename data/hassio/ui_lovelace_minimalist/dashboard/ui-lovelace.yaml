---
button_card_templates: !include_dir_merge_named "../../custom_components/ui_lovelace_minimalist/__ui_minimalist__/ulm_templates/"
title: Dom
views:
  - theme: minimalist-desktop
    path: default_view
    title: Dom
    icon: ''
    badges: []
    cards:
      - type: custom:kontomierz-card
        entity: sensor.to_do_list
        show_header: true
        show_completed: 3
        show_item_add: false
        use_quick_add: false
        show_item_close: true
        show_item_delete: false
        only_today_overdue: false
        max_completed_transactions: 0
      - square: false
        columns: 3
        type: grid
        cards:
          - type: custom:stack-in-card
            mode: vertical
            cards:
              - type: custom:mushroom-person-card
                entity: person.pawel
                use_entity_picture: true
                hide_name: false
                layout: horizontal
                tap_action:
                  action: more-info
              - type: custom:mushroom-chips-card
                chips:
                  - type: template
                    icon_color: |2-
                                {% set state=states('binary_sensor.rmx2202_is_charging') %}
                                {% if state=='on' %}
                                green
                                {% elif state=='off' %}
                                #6f6f6f
                               {% endif %}
                    entity: binary_sensor.rmx2202_is_charging
                    icon: mdi:power-plug
                    tap_action:
                      action: more-info
                  - type: template
                    entity: sensor.rmx2202_battery_level
                    icon: |2
                                {% set bl = states('sensor.rmx2202_battery_level') | int %}
                                {% if bl < 10 %} mdi:battery-outline
                                {% elif bl < 20 %} mdi:battery-10
                                {% elif bl < 30 %} mdi:battery-20
                                {% elif bl < 40 %} mdi:battery-30
                                {% elif bl < 50 %} mdi:battery-40
                                {% elif bl < 60 %} mdi:battery-50
                                {% elif bl < 70 %} mdi:battery-60
                                {% elif bl < 80 %} mdi:battery-70
                                {% elif bl < 90 %} mdi:battery-80
                                {% elif bl < 100 %} mdi:battery-90
                                {% elif bl == 100 %} mdi:battery
                                {% else %} mdi:battery-unknown
                                {% endif %}
                    icon_color: |2-
                                {% set bl = states('sensor.rmx2202_battery_level') | int %}
                                {% if bl < 10 %} red
                                {% elif bl < 20 %} red
                                {% elif bl < 30 %} red
                                {% elif bl < 40 %} orange
                                {% elif bl < 50 %} orange
                                {% elif bl < 60 %} green
                                {% elif bl < 70 %} green
                                {% elif bl < 80 %} green
                                {% elif bl < 90 %} green
                                {% elif bl < 100 %} green
                                {% elif bl == 100 %} green
                                {% else %} grey
                                {% endif %}
                    tap_action:
                      action: more-info
                alignment: center
          - type: custom:stack-in-card
            mode: vertical
            cards:
              - type: custom:mushroom-person-card
                entity: person.magda
                use_entity_picture: true
                hide_name: false
                layout: horizontal
                tap_action:
                  action: more-info
              - type: custom:mushroom-chips-card
                chips:
                  - type: template
                    icon_color: |2-
                                {% set state=states('sensor.iphone_magdalena_battery_state') %}
                                {% if state=='Charging' %}
                                green
                                {% else %}
                                #6f6f6f
                               {% endif %}
                    entity: sensor.iphone_magdalena_battery_state
                    icon: mdi:power-plug
                    tap_action:
                      action: more-info
                  - type: template
                    entity: sensor.iphone_magdalena_battery_level
                    icon: |2
                                {% set bl = states('sensor.iphone_magdalena_battery_level') | int %}
                                {% if bl < 10 %} mdi:battery-outline
                                {% elif bl < 20 %} mdi:battery-10
                                {% elif bl < 30 %} mdi:battery-20
                                {% elif bl < 40 %} mdi:battery-30
                                {% elif bl < 50 %} mdi:battery-40
                                {% elif bl < 60 %} mdi:battery-50
                                {% elif bl < 70 %} mdi:battery-60
                                {% elif bl < 80 %} mdi:battery-70
                                {% elif bl < 90 %} mdi:battery-80
                                {% elif bl < 100 %} mdi:battery-90
                                {% elif bl == 100 %} mdi:battery
                                {% else %} mdi:battery-unknown
                                {% endif %}
                    icon_color: |2-
                                {% set bl = states('sensor.iphone_magdalena_battery_level') | int %}
                                {% if bl < 10 %} red
                                {% elif bl < 20 %} red
                                {% elif bl < 30 %} red
                                {% elif bl < 40 %} orange
                                {% elif bl < 50 %} orange
                                {% elif bl < 60 %} green
                                {% elif bl < 70 %} green
                                {% elif bl < 80 %} green
                                {% elif bl < 90 %} green
                                {% elif bl < 100 %} green
                                {% elif bl == 100 %} green
                                {% else %} grey
                                {% endif %}
                    tap_action:
                      action: more-info
                alignment: center
          - type: custom:stack-in-card
            mode: vertical
            cards:
              - type: custom:mushroom-person-card
                entity: person.perelka
                use_entity_picture: true
                hide_name: false
                layout: horizontal
                tap_action:
                  action: more-info
              - type: custom:mushroom-chips-card
                chips:
                  - type: template
                    entity: sensor.tracker_1_motion
                    icon: mdi:car-arrow-right
                    icon_color: |2-
                                {% set state=states('sensor.tracker_1_motion') %}
                                {% if state=='True' %}
                                green
                                {% elif state=='False' %}
                                #6f6f6f
                               {% endif %}
                    tap_action:
                      action: more-info
                  - type: template
                    entity: sensor.tracker_1_battery
                    icon: |2
                                {% set bl = states('sensor.tracker_1_battery') | int %}
                                {% if bl == -1 %} mdi:battery-unknown
                                {% elif bl < 10 %} mdi:battery-outline
                                {% elif bl < 20 %} mdi:battery-10
                                {% elif bl < 30 %} mdi:battery-20
                                {% elif bl < 40 %} mdi:battery-30
                                {% elif bl < 50 %} mdi:battery-40
                                {% elif bl < 60 %} mdi:battery-50
                                {% elif bl < 70 %} mdi:battery-60
                                {% elif bl < 80 %} mdi:battery-70
                                {% elif bl < 90 %} mdi:battery-80
                                {% elif bl < 100 %} mdi:battery-90
                                {% elif bl == 100 %} mdi:battery
                                {% else %} mdi:battery-unknown
                                {% endif %}
                    icon_color: |2-
                                {% set bl = states('sensor.tracker_1_battery') | int %}
                                {% if bl == -1 %} grey
                                {% elif if bl < 10 %} red
                                {% elif bl < 20 %} red
                                {% elif bl < 30 %} red
                                {% elif bl < 40 %} orange
                                {% elif bl < 50 %} orange
                                {% elif bl < 60 %} green
                                {% elif bl < 70 %} green
                                {% elif bl < 80 %} green
                                {% elif bl < 90 %} green
                                {% elif bl < 100 %} green
                                {% elif bl == 100 %} green
                                {% else %} grey
                                {% endif %}
                    tap_action:
                      action: more-info
                alignment: center
      - square: false
        columns: 4
        type: grid
        cards:
          - type: custom:button-card
            entity: sensor.zmieszane_odpady_komunalne_fbservice
            icon: mdi:recycle
            aspect_ratio: 1/1
            show_name: false
            styles:
              grid:
                - grid-template-areas: '"i" "days"'
                - grid-template-columns: 1fr
                - grid-template-rows: 1fr 0.2fr
              icon:
                - color: |-
                    [[[
                      if (entity.attributes['days_until_collection'] == 0) return '#FF0000'; // Dzisiaj - czerwony
                      else if (entity.attributes['days_until_collection'] == 1) return '#FFA500'; // Jutro - pomarańczowy
                      else if (entity.attributes['days_until_collection'] > 1) return '#00CCFF'; // Za kilka dni - niebieski
                      else return '#808080'; // Nigdy - szary
                    ]]]
                - width: 70%
              custom_fields:
                days:
                  - padding: 2px
            custom_fields:
              days: |
                [[[
                  if (entity.attributes['days_until_collection'] == 0) return "Dzisiaj";
                  else if (entity.attributes['days_until_collection'] == 1) return "Jutro";
                  else if (entity.attributes['days_until_collection'] == 2) return "Pojutrze";
                  else if (entity.attributes['days_until_collection'] > 2)
                    return "Za " + entity.attributes['days_until_collection'] + " dni";
                  else
                    return "Nigdy";
                ]]]
          - type: custom:button-card
            entity: sensor.papier_fbservice
            icon: mdi:file-document
            aspect_ratio: 1/1
            show_name: false
            styles:
              grid:
                - grid-template-areas: '"i" "days"'
                - grid-template-columns: 1fr
                - grid-template-rows: 1fr 0.2fr
              icon:
                - color: |-
                    [[[
                      if (entity.attributes['days_until_collection'] == 0) return '#FF0000';
                      else if (entity.attributes['days_until_collection'] == 1) return '#FFA500';
                      else if (entity.attributes['days_until_collection'] > 1) return '#00CCFF';
                      else return '#808080';
                    ]]]
                - width: 70%
              custom_fields:
                days:
                  - padding: 2px
            custom_fields:
              days: |
                [[[
                  if (entity.attributes['days_until_collection'] == 0) return "Dzisiaj";
                  else if (entity.attributes['days_until_collection'] == 1) return "Jutro";
                  else if (entity.attributes['days_until_collection'] == 2) return "Pojutrze";
                  else if (entity.attributes['days_until_collection'] > 2)
                    return "Za " + entity.attributes['days_until_collection'] + " dni";
                  else
                    return "Nigdy";
                ]]]
          - type: custom:button-card
            entity: sensor.metale_i_tworzywa_sztuczne_fbservice
            icon: mdi:bottle-soda
            aspect_ratio: 1/1
            show_name: false
            styles:
              grid:
                - grid-template-areas: '"i" "days"'
                - grid-template-columns: 1fr
                - grid-template-rows: 1fr 0.2fr
              icon:
                - color: |-
                    [[[
                      if (entity.attributes['days_until_collection'] == 0) return '#FF0000';
                      else if (entity.attributes['days_until_collection'] == 1) return '#FFA500';
                      else if (entity.attributes['days_until_collection'] > 1) return '#00CCFF';
                      else return '#808080';
                    ]]]
                - width: 70%
              custom_fields:
                days:
                  - padding: 2px
            custom_fields:
              days: |
                [[[
                  if (entity.attributes['days_until_collection'] == 0) return "Dzisiaj";
                  else if (entity.attributes['days_until_collection'] == 1) return "Jutro";
                  else if (entity.attributes['days_until_collection'] == 2) return "Pojutrze";
                  else if (entity.attributes['days_until_collection'] > 2)
                    return "Za " + entity.attributes['days_until_collection'] + " dni";
                  else
                    return "Nigdy";
                ]]]
          - type: custom:button-card
            entity: sensor.szklo_fbservice
            icon: mdi:glass-cocktail
            aspect_ratio: 1/1
            show_name: false
            styles:
              grid:
                - grid-template-areas: '"i" "days"'
                - grid-template-columns: 1fr
                - grid-template-rows: 1fr 0.2fr
              icon:
                - color: |-
                    [[[
                      if (entity.attributes['days_until_collection'] == 0) return '#FF0000';
                      else if (entity.attributes['days_until_collection'] == 1) return '#FFA500';
                      else if (entity.attributes['days_until_collection'] > 1) return '#00CCFF';
                      else return '#808080';
                    ]]]
                - width: 70%
              custom_fields:
                days:
                  - padding: 2px
            custom_fields:
              days: |
                [[[
                  if (entity.attributes['days_until_collection'] == 0) return "Dzisiaj";
                  else if (entity.attributes['days_until_collection'] == 1) return "Jutro";
                  else if (entity.attributes['days_until_collection'] == 2) return "Pojutrze";
                  else if (entity.attributes['days_until_collection'] > 2)
                    return "Za " + entity.attributes['days_until_collection'] + " dni";
                  else
                    return "Nigdy";
                ]]]
      - type: grid
        square: false
        columns: 1
        cards:
          - type: custom:mushroom-title-card
            title: Salon
            alignment: justify
          - type: custom:mushroom-chips-card
            chips:
              - type: entity
                entity: sensor.zhimi_mc1_1903_indoor_temperature_2
                icon_color: orange
              - type: entity
                entity: sensor.zhimi_mc1_1903_relative_humidity_2
                icon_color: indigo
              - type: entity
                entity: sensor.zhimi_mc1_1903_pm25_density_2
                icon_color: indigo
              - type: entity
                entity: binary_sensor.czujnik_ruchu_occupancy
                icon_color: indigo
              - type: entity
                entity: binary_sensor.drzwi_balkon_contact
                icon_color: indigo
              - type: entity
                entity: binary_sensor.motion_sensor_livingroom_occupancy
                icon_color: indigo
          - type: custom:button-card
            template: card_media_player
            entity: media_player.media_player_mpd
            variables:
              ulm_card_media_player_name: Livingroom Nvidia Shield
          - type: media-control
            entity: media_player.media_player_mpd
          - type: entities
            entities:
              - entity: switch.socket_pc
                type: custom:multiple-entity-row
                state_header: Master
                toggle: true
                state_color: true
                name: Komputer
                entities:
                  - entity: sensor.pc_energy_today
                    name: Zużycie dzisiaj
                    unit: Wh
              - entity: switch.socket_1
                type: custom:multiple-entity-row
                name: Głośniki
                state_header: Master
                toggle: true
                state_color: true
                entities:
                  - entity: input_button.speaker_vol_plus
                    icon: mdi:plus-circle
                    name: Głośniej
                    tap_action:
                      action: call-service
                      service: script.speakers_volume
                  - entity: input_button.speaker_vol_minus
                    icon: mdi:minus-circle
                    name: Ciszej
                    tap_action:
                      action: call-service
                      service: script.speakers_volume_2
                  - entity: input_boolean.glosniki
                    name: Stan
                    toggle: true
              - entity: switch.socket_2
                type: custom:multiple-entity-row
                name: TV
                state_header: Master
                toggle: true
                state_color: true
                entities:
                  - entity: sensor.power_strip_tv_energy_today
                    name: Dzisiaj
                    unit: Wh
                  - entity: input_button.speaker_vol_plus
                    icon: mdi:power-plug
                    name: TVBox
                    tap_action:
                      action: call-service
                      service: script.tv_hdmi_1
                  - entity: input_button.speaker_vol_plus
                    icon: mdi:power-plug
                    name: PC
                    tap_action:
                      action: call-service
                      service: script.tv_hdmi_3
                  - entity: input_boolean.telewizor
                    name: Stan
                    toggle: true
                  - entity: switch.socket_3
                    name: TVBox
                    toggle: true
              - entity: switch.usb
                type: custom:multiple-entity-row
                state_header: Master
                toggle: true
                state_color: true
                name: Urządzenia USB
                entities: null
              - type: custom:mushroom-select-card
                entity: input_select.led
                primary_info: name
                secondary_info: state
                layout: horizontal
              - entity: input_boolean.red
                type: custom:multiple-entity-row
                name: Led
                state_header: Stan
                toggle: true
                state_color: true
                entities:
                  - entity: input_button.led_2
                    icon: mdi:plus-circle
                    name: Jaśniej
                    tap_action:
                      action: call-service
                      service: script.led_light
                  - entity: input_button.led
                    icon: mdi:minus-circle
                    name: Ciemniej
                    tap_action:
                      action: call-service
                      service: script.led_light_2
              - entity: sensor.sonoff_2_action
                type: custom:multiple-entity-row
                name: Światło
                show_state: false
                entities:
                  - entity: light.yeelink_monoa_0ec8_light
                    name: Przełącz
                    icon: mdi:light-switch
                    tap_action:
                      action: call-service
                      service: script.livingroom_lights_switch
                  - entity: light.yeelink_monoa_0ec8_light
                    name: Lewa
                    toggle: true
                  - entity: light.yeelink_monoa_0559_light
                    name: Prawa
                    toggle: true
                  - entity: switch.fire_lamp
                    name: Płomień
                    toggle: true
              - type: custom:mushroom-fan-card
                entity: fan.zhimi_mc1_1903_air_purifier_2
                show_oscillate_control: false
                show_percentage_control: true
                collapsible_controls: false
                layout: horizontal
              - type: custom:fold-entity-row
                head: sensor.hp_deskjet_2640_series_hpcups_3_18_12
                entities:
                  - entity: counter.last_print_days
                  - entity: sensor.hp_fax4_hpcups
            state_color: false
            show_header_toggle: false
          - type: custom:mushroom-title-card
            subtitle: Kwiatki
            alignment: justify
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                entity: sensor.fc_28_soil_moisture_level
                content: >-
                  {% set value = states.sensor.fc_28_soil_moisture_level.state
                  %}

                  {% if value == 'unavailable' %}
                    {% set value = 'nieznany' %}
                  {% endif %}

                  Dracena: {{value}}
                tap_action:
                  action: more-info
                icon: mdi:flower
                icon_color: green
          - type: custom:mushroom-title-card
            subtitle: Media
            alignment: justify
          - type: media-control
            entity: media_player.lg_webos_smart_tv
          - type: media-control
            entity: media_player.salon
          - type: media-control
            entity: media_player.tv_smart_4k_box
      - type: grid
        square: false
        columns: 1
        cards:
          - type: custom:weather-card
            entity: weather.dom
            name: Pogoda
            current: true
            details: true
            forecast: true
            hourly_forecast: false
            number_of_forecasts: '5'
          - type: conditional
            conditions:
              - condition: state
                entity: camera.ipcam_profile1
                state: unavailable
            card:
              show_state: true
              show_name: true
              camera_view: auto
              type: picture-entity
              entity: camera.camera_front_door_profile
              name: Wejście
          - type: conditional
            conditions:
              - condition: state
                entity: camera.camera_front_door_profile
                state: unavailable
            card:
              show_state: true
              show_name: true
              camera_view: auto
              type: picture-entity
              entity: camera.ipcam_profile1
              name: Wejście
          - show_state: true
            show_name: true
            camera_view: auto
            type: picture-entity
            entity: camera.zewntrzna_sub
            name: Podwórko
      - square: false
        columns: 3
        type: grid
        cards:
          - type: custom:stack-in-card
            mode: vertical
            cards:
              - type: custom:button-card
