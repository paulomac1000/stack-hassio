- id: '1705687772079'
  alias: Notify - Kontomierz Scheduled Transactions
  description: Wysyła codzienne przypomnienia o nadchodzących i zaległych płatnościach.
  mode: single
  trigger:
  - at: 09:30:00
    trigger: time
  condition: []
  action:
  - variables:
      report_message: "{% set ns = namespace(overdue=[], upcoming=[]) %} {% set today
        = now().date() %} {% set all_items = state_attr('todo.platnosci_kontomierz',
        'todo_items') or [] %} {% for item in all_items %}\n  {% if item.status ==
        'needs_action' %}\n    {% set date_str = item.summary | regex_findall_index('\\((\\d{4}-\\d{2}-\\d{2})\\)')
        %}\n    {% if date_str %}\n      {% set transaction_date = (date_str | as_datetime
        | as_local).date() %}\n      {% set days_diff = (transaction_date - today).days
        %}\n      {% set payment_name = item.summary.split('(')[0].strip() %}\n      {%
        if days_diff < 0 %}\n        {% set ns.overdue = ns.overdue + [payment_name]
        %}\n      {% elif 0 <= days_diff <= 3 %}\n        {% set ns.upcoming = ns.upcoming
        + [payment_name] %}\n      {% endif %}\n    {% endif %}\n  {% endif %}\n{%
        endfor %} {% set message_parts = [] %} {% if ns.overdue %}\n  {% set message_parts
        = message_parts + ['Zaległe płatności:\\n- ' + (ns.overdue | sort | join('\\n-
        '))] %}\n{% endif %} {% if ns.upcoming %}\n  {% set message_parts = message_parts
        + ['Płatności do 3 dni:\\n- ' + (ns.upcoming | sort | join('\\n- '))] %}\n{%
        endif %} {{ message_parts | join('\\n\\n') }}\n"
  - if:
    - condition: template
      value_template: '{{ report_message | length > 0 }}'
    then:
    - data:
        title: Przypomnienie o płatnościach
        message: '{{ report_message }}'
        use_tts: true
      action: script.universal_notifier
- id: powiadomienie_o_stanie_urzadzenia
  alias: Notify - Samsung Washer & Dryer
  description: Handles cycle notifications with debounce logic to ignore short pauses
    and unavailable states.
  triggers:
  - alias: Washer started
    trigger: state
    entity_id: select.pralka
    to: run
    for: 00:00:30
    id: washer_start
  - alias: Washer finished
    trigger: state
    entity_id: select.pralka
    from: run
    to: stop
    for: 00:01:00
    id: washer_finish
  - alias: Dryer started
    trigger: state
    entity_id: select.suszarka
    to: run
    for: 00:00:30
    id: dryer_start
  - alias: Dryer finished
    trigger: state
    entity_id: select.suszarka
    from: run
    to: stop
    for: 00:01:00
    id: dryer_finish
  - alias: Washer idle reminder
    trigger: state
    entity_id: select.pralka
    from: run
    to: stop
    for: 03:00:00
    id: washer_reminder
  actions:
  - choose:
    - alias: Process Start/Finish events
      conditions:
      - condition: trigger
        id:
        - washer_start
        - washer_finish
        - dryer_start
        - dryer_finish
      sequence:
      - variables:
          is_washer: '{{ ''washer'' in trigger.id }}'
          device_name: '{{ ''Pralka'' if is_washer else ''Suszarka'' }}'
          is_finished: '{{ ''finish'' in trigger.id }}'
          duration_str: "{% if is_finished %}\n  {% set start = as_timestamp(trigger.from_state.last_changed)
            %}\n  {% set end = as_timestamp(trigger.to_state.last_changed) %}\n  {%
            set seconds = (end - start) | int %}\n  {% set minutes = (seconds // 60)
            %}\n  {% set hours = (minutes // 60) %}\n  {% if hours > 0 %}\n    {{
            hours }}h {{ minutes % 60 }}m\n  {% else %}\n    {{ minutes }} min\n  {%
            endif %}\n{% else %}\n  0 min\n{% endif %}"
      - alias: Audio and TTS notification
        action: script.universal_notifier
        data:
          title: '{{ device_name }}'
          message: "{% if is_finished %}\n  {{ device_name }} zakończyła pracę.\n
            \ {% if is_washer %}Możesz teraz przełożyć ubrania do suszarki.{% endif
            %}\n{% else %}\n  {{ device_name }} rozpoczęła pracę.\n{% endif %}"
          use_tts: '{{ is_finished }}'
          phone_pawel: false
          phone_magdalena: false
          use_pushbullet: false
      - alias: Mobile push notification
        action: script.universal_notifier
        data:
          title: '{{ device_name }}'
          message: "{% if is_finished %}\n  ✅ {{ device_name }} zakończyła pracę.\n
            \ ⏱ Czas: {{ duration_str }}\n  {% if is_washer %}\U0001F449 Pamiętaj
            o suszarce.{% endif %}\n{% else %}\n  ▶️ {{ device_name }} ruszyła.\n{%
            endif %}"
          use_tts: false
          phone_pawel: true
          phone_magdalena: true
          use_pushbullet: false
    - alias: Process Washer reminder
      conditions:
      - condition: trigger
        id: washer_reminder
      - alias: Dryer is not running
        condition: state
        entity_id: select.suszarka
        state: stop
      - alias: Washer was the last one to finish
        condition: template
        value_template: "{{ as_timestamp(states.select.suszarka.last_changed) < \n
          \  as_timestamp(states.select.pralka.last_changed) }}"
      sequence:
      - action: script.universal_notifier
        data:
          title: Przypomnienie
          message: Pranie zakończyło się 3 godziny temu. Proszę opróżnić pralkę.
          use_tts: true
          phone_pawel: false
          phone_magdalena: false
          use_pushbullet: false
      - action: script.universal_notifier
        data:
          title: Przypomnienie o praniu
          message: ⏰ Pranie leży w bębnie od 3 godzin! Nie zapomnij go wyjąć.
          use_tts: false
          phone_pawel: true
          phone_magdalena: true
          use_pushbullet: false
  mode: queued
