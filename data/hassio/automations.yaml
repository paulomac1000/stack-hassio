- id: '1769365568659'
  alias: OpenHASP - Bedroom - Screensaver v4.0.1
  description: '═══════════════════════════════════════════════════════════════════════════
    SCREENSAVER / BACKLIGHT CONTROLLER v4.0.1 ═══════════════════════════════════════════════════════════════════════════

    RULES: 1. DARKNESS PRIORITY: Never auto-wake in Sen or Cinema Mode. 2. USER OVERRIDE:
    Touch always wakes, but brightness is capped at 80 in special modes. 3. PROACTIVE
    WAKE: Bed vibration and motion wake only in Auto/Manual modes. 4. IDLE STATES:
    Short (30s) = Dim, Long (120s) = Off or Minimal. 5. ENERGY SAVING: Immediate OFF
    after 10m of no presence.

    VERSION: 4.0.1 | LAST UPDATED: 25.01.2026 ═══════════════════════════════════════════════════════════════════════════'
  triggers:
  - trigger: mqtt
    topic: hasp/plate/state/idle
    payload: 'off'
    id: touch
    alias: 'PANEL: Touched'
  - trigger: mqtt
    topic: hasp/plate/state/idle
    payload: short
    id: idle_short
    alias: 'PANEL: Short idle 30s'
  - trigger: mqtt
    topic: hasp/plate/state/idle
    payload: long
    id: idle_long
    alias: 'PANEL: Long idle 120s'
  - trigger: state
    entity_id: binary_sensor.vibration_bedroom_bed_vibration
    to: 'on'
    id: bed
    alias: 'SENSOR: Bed vibration'
  - trigger: state
    entity_id: binary_sensor.presence_bedroom_presence
    to: 'on'
    id: presence
    alias: 'SENSOR: Presence detected'
  - trigger: state
    entity_id: binary_sensor.motion_sensor_bedroom_extended
    to: 'on'
    id: motion
    alias: 'SENSOR: Motion detected'
  - trigger: state
    entity_id: binary_sensor.presence_bedroom_presence
    to: 'off'
    for:
      minutes: 10
    id: no_presence
    alias: 'SENSOR: No presence 10min'
  - trigger: state
    entity_id: input_select.bedroom_lighting_mode
    to:
    - Sen
    - Cinema Mode
    id: special_mode
    alias: 'MODE: Special mode activated'
  actions:
  - alias: Calculate Context Variables
    variables:
      mode: '{{ states(''input_select.bedroom_lighting_mode'') }}'
      is_special: '{{ mode in [''Sen'', ''Cinema Mode''] }}'
      is_night: '{{ now().hour >= 22 or now().hour < 7 }}'
  - choose:
    - alias: Handle Panel Touch
      conditions:
      - condition: trigger
        id: touch
      sequence:
      - alias: 'MQTT: Wake backlight'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/backlight
          payload: '{{ 80 if is_special else 255 }}'
      - if:
        - condition: template
          value_template: '{{ is_special }}'
        then:
        - alias: 'LOG: Manual wake'
          action: system_log.write
          data:
            level: debug
            message: 'OpenHASP Screensaver: Manual wake in {{ mode }}. Brightness
              capped at 80.'
    - alias: Handle Bed Vibration
      conditions:
      - condition: trigger
        id: bed
      - condition: template
        value_template: '{{ not is_special }}'
      sequence:
      - alias: 'MQTT: Soft wake for bed'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/backlight
          payload: '{{ 40 if is_night else 150 }}'
      - if:
        - condition: template
          value_template: '{{ is_night }}'
        then:
        - alias: 'LOG: Night bed wake'
          action: system_log.write
          data:
            level: debug
            message: 'OpenHASP Screensaver: Bed vibration at night. Soft wake (40).'
    - alias: Handle Presence or Motion
      conditions:
      - condition: trigger
        id:
        - presence
        - motion
      - condition: template
        value_template: '{{ not is_special }}'
      sequence:
      - alias: 'MQTT: Wake for activity'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/backlight
          payload: '{{ 30 if is_night else 180 }}'
    - alias: Handle Short Idle
      conditions:
      - condition: trigger
        id: idle_short
      sequence:
      - alias: 'MQTT: Dim on short idle'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/backlight
          payload: '{{ 5 if is_special else 50 }}'
    - alias: Handle Long Idle
      conditions:
      - condition: trigger
        id: idle_long
      sequence:
      - alias: 'MQTT: Off or minimal'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/backlight
          payload: '{{ 0 if is_special or is_night else 15 }}'
    - alias: Handle No Presence
      conditions:
      - condition: trigger
        id: no_presence
      sequence:
      - alias: 'MQTT: Off - room empty'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/backlight
          payload: '0'
      - alias: 'LOG: Room empty'
        action: system_log.write
        data:
          level: debug
          message: 'OpenHASP Screensaver: Room empty for 10m. Backlight OFF.'
    - alias: Handle Special Mode
      conditions:
      - condition: trigger
        id: special_mode
      sequence:
      - alias: 'MQTT: Dim for special mode'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/backlight
          payload: '10'
      - alias: 'LOG: Special mode'
        action: system_log.write
        data:
          level: info
          message: 'OpenHASP Screensaver: {{ mode }} activated. Immediate dimming
            to 10.'
  mode: restart
  variables:
    plate: plate
- id: '1769365612899'
  alias: OpenHASP - Bedroom Panel - Watchdog
  description: "═══════════════════════════════════════════════════════════════════════════
    OPENHASP BEDROOM PANEL - WATCHDOG & HEALTH MONITOR v3.2.1 ═══════════════════════════════════════════════════════════════════════════\nPURPOSE:
    Monitors panel health and connectivity. Automatically resyncs state after connection
    issues or Home Assistant restarts.\nFUNCTIONS: 1. PERIODIC CHECK: Requests status
    update every 5 minutes to verify life. 2. MQTT RECOVERY: Forces full UI resync
    when HA MQTT broker reconnects. 3. VISUAL FEEDBACK: Updates status bar (p0b2)
    color based on connection state.\n   - Green (#4CAF50): Online / Connected\n   -
    Red (#F44336): Offline / Disconnected\n\nASSUMPTIONS: - Panel LWT topic: hasp/plate/LWT
    - Connection indicator: p0b2 (Status bar object) - Main Controller: automation.openhasp_bedroom_panel_main_controller\nVERSION:
    3.2.1 | LAST UPDATED: 25.01.2026 ═══════════════════════════════════════════════════════════════════════════"
  triggers:
  - trigger: time_pattern
    minutes: /5
    id: health_check
    alias: 'TIMER: Periodic health check'
  - trigger: mqtt
    topic: homeassistant/status
    payload: online
    id: ha_online
    alias: 'MQTT: HA Broker online'
  - trigger: mqtt
    topic: hasp/plate/LWT
    payload: offline
    id: panel_offline
    alias: 'MQTT: Panel LWT offline'
  - trigger: mqtt
    topic: hasp/plate/LWT
    payload: online
    id: panel_online
    alias: 'MQTT: Panel LWT online'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: health_check
      sequence:
      - action: mqtt.publish
        alias: 'MQTT: Request status update'
        data:
          topic: hasp/{{ plate }}/command/statusupdate
          payload: ''
    - conditions:
      - condition: trigger
        id: ha_online
      sequence:
      - delay:
          seconds: 5
      - action: mqtt.publish
        alias: 'MQTT: Set status bar to Green'
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p0b2.bg_color=#4CAF50"]'
      - action: system_log.write
        alias: 'LOG: HA Reconnected'
        data:
          level: info
          message: 'OpenHASP Watchdog: HA MQTT reconnected. Triggering full resync.'
      - action: automation.trigger
        alias: 'TRIGGER: Main Controller Resync'
        target:
          entity_id: automation.openhasp_bedroom_panel_main_controller
        data:
          skip_condition: true
    - conditions:
      - condition: trigger
        id: panel_offline
      sequence:
      - action: system_log.write
        alias: 'LOG: Panel Offline'
        data:
          level: warning
          message: 'OpenHASP Watchdog: Bedroom panel went OFFLINE (LWT).'
    - conditions:
      - condition: trigger
        id: panel_online
      sequence:
      - action: system_log.write
        alias: 'LOG: Panel Online'
        data:
          level: info
          message: 'OpenHASP Watchdog: Bedroom panel is ONLINE. Initializing UI.'
      - action: mqtt.publish
        alias: 'MQTT: Set status bar to Green'
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p0b2.bg_color=#4CAF50"]'
  mode: single
  variables:
    plate: plate
- id: '1769366872064'
  alias: Light - Bedroom - Enter Sleep Mode
  description: 'Comprehensive logic for transitioning the bedroom into Sleep Mode.
    Assumptions & Logic: 1. Bedside Button (Double Press): Always turns off all lights.
    - If performed after 23:00 or before 06:00, it activates ''Sleep'' (Sen) mode.
    - If performed during the day, it sets mode to ''Manual'' to prevent ''Auto''
    mode from re-triggering lights. 2. Manual Light Off (App/Wall Switch): If the
    last light is turned off manually after 23:00 while occupancy is detected, the
    system assumes the user is going to sleep and activates ''Sleep'' mode. 3. UI
    Selection: Manually selecting ''Sleep'' mode in the dashboard forces all lights
    to turn off. 4. Logging: Every entry into Sleep Mode is logged to the system log
    with the specific trigger reason.'
  triggers:
  - alias: Bedside button double-pressed
    id: trigger_button_double
    device_id: fb2c81a6706f9ac4cb9412bc98c78eb4
    domain: mqtt
    type: action
    subtype: double
    trigger: device
  - alias: Any bedroom light turned off
    id: trigger_lights_off
    entity_id:
    - light.light_bedroom_1
    - light.light_bedroom_2
    - light.yeelink_monoa_0559_light
    - light.yeelink_monoa_0ec8_light
    to: 'off'
    trigger: state
  - alias: Sleep Mode selected via UI
    id: trigger_mode_sen_ui
    entity_id: input_select.bedroom_lighting_mode
    to: Sen
    trigger: state
  actions:
  - choose:
    - alias: Handle physical button double-press
      conditions:
      - alias: Triggered by button
        condition: trigger
        id: trigger_button_double
      sequence:
      - alias: Turn off all bedroom lights
        action: light.turn_off
        target:
          entity_id:
          - light.light_bedroom_1
          - light.light_bedroom_2
          - light.yeelink_monoa_0559_light
          - light.yeelink_monoa_0ec8_light
      - alias: Determine mode based on time
        choose:
        - alias: 'Night time: Set to Sleep Mode'
          conditions:
          - alias: Is between 23:00 and 06:00
            condition: time
            after: '23:00:00'
            before: 06:00:00
          sequence:
          - alias: Set mode to Sleep
            action: input_select.select_option
            target:
              entity_id: input_select.bedroom_lighting_mode
            data:
              option: Sen
          - alias: Log Sleep Mode activation (Button)
            action: system_log.write
            data:
              message: Bedroom Sleep Mode activated via Button Double-Press at {{
                now().strftime('%H:%M:%S') }}.
              level: info
              logger: bedroom_automation
        - alias: 'Day time: Set to Manual Mode'
          conditions: []
          sequence:
          - alias: Set mode to Manual
            action: input_select.select_option
            target:
              entity_id: input_select.bedroom_lighting_mode
            data:
              option: Manual
          - alias: Log Manual Mode activation (Button)
            action: system_log.write
            data:
              message: Bedroom Manual Mode activated via Button Double-Press at {{
                now().strftime('%H:%M:%S') }}.
              level: info
              logger: bedroom_automation
    - alias: Handle manual light off detection
      conditions:
      - alias: Triggered by light state change
        condition: trigger
        id: trigger_lights_off
      - alias: Is late night (after 23:00)
        condition: time
        after: '23:00:00'
        before: 06:00:00
      - alias: Action was performed by a user (not automation)
        condition: template
        value_template: '{{ trigger.to_state.context.user_id is not none }}'
      - alias: Occupancy is detected in bedroom
        condition: state
        entity_id: binary_sensor.presence_bedroom_presence
        state: 'on'
      - alias: All lights are now off
        condition: and
        conditions:
        - condition: state
          entity_id: light.light_bedroom_1
          state: 'off'
        - condition: state
          entity_id: light.light_bedroom_2
          state: 'off'
        - condition: state
          entity_id: light.yeelink_monoa_0559_light
          state: 'off'
        - condition: state
          entity_id: light.yeelink_monoa_0ec8_light
          state: 'off'
      sequence:
      - alias: Set mode to Sleep
        action: input_select.select_option
        target:
          entity_id: input_select.bedroom_lighting_mode
        data:
          option: Sen
      - alias: Log Sleep Mode activation (Manual Off)
        action: system_log.write
        data:
          message: Bedroom Sleep Mode activated via Manual Light Off detection at
            {{ now().strftime('%H:%M:%S') }}.
          level: info
          logger: bedroom_automation
    - alias: Handle UI mode selection
      conditions:
      - alias: Triggered by UI mode change
        condition: trigger
        id: trigger_mode_sen_ui
      sequence:
      - alias: Ensure all lights are off
        action: light.turn_off
        target:
          entity_id:
          - light.light_bedroom_1
          - light.light_bedroom_2
          - light.yeelink_monoa_0559_light
          - light.yeelink_monoa_0ec8_light
      - alias: Log Sleep Mode activation (UI)
        action: system_log.write
        data:
          message: Bedroom Sleep Mode activated via UI Selection at {{ now().strftime('%H:%M:%S')
            }}.
          level: info
          logger: bedroom_automation
  mode: parallel
- id: '1769373442911'
  alias: OpenHASP - Bedroom - Spinner Watchdog v4.1
  description: '═══════════════════════════════════════════════════════════════════════════
    SPINNER WATCHDOG v4.1 (Event-Driven) ═══════════════════════════════════════════════════════════════════════════
    PURPOSE: Failsafe that hides the loading spinner if it gets stuck. Logic: Triggers
    on timestamp change, waits 8s. If not reset by then, forces hide.

    OPTIMIZATION: Removed time_pattern polling. Uses ''mode: restart'' for efficiency.

    VERSION: 4.1 | LAST UPDATED: 25.01.2026 ═══════════════════════════════════════════════════════════════════════════'
  triggers:
  - trigger: state
    entity_id: input_datetime.hasp_spinner_shown
    alias: Trigger when spinner timestamp updates
  conditions:
  - condition: template
    alias: Ignore reset value and invalid states
    value_template: '{{ trigger.to_state.state not in [reset_value, ''unknown'', ''unavailable'',
      ''none''] }}'
  - condition: state
    entity_id: binary_sensor.motion_sensor_bedroom_extended
    state: 'on'
    alias: Only run if someone is in the room (Optional Safety)
  actions:
  - delay:
      seconds: 8
    alias: Wait for Main Controller to finish its job
  - action: mqtt.publish
    alias: 'MQTT: Force hide spinner'
    data:
      topic: hasp/{{ plate }}/command/json
      payload: '["p0b240.hidden=1","p0b241.hidden=1","p0b242.hidden=1"]'
  - action: input_datetime.set_datetime
    alias: 'WATCHDOG: Reset timestamp to idle'
    target:
      entity_id: input_datetime.hasp_spinner_shown
    data:
      datetime: '{{ reset_value }}'
  - action: system_log.write
    alias: 'LOG: Watchdog intervention'
    data:
      level: warning
      message: 'OpenHASP Watchdog: Spinner was stuck for >8s (Triggered by: {{ trigger.to_state.state
        }}). Forced hide.

        '
  mode: restart
  variables:
    plate: plate
    reset_value: '1970-01-01 00:00:00'
- id: '1769375366852'
  alias: OpenHASP - Bedroom - Health Watchdog v4.0.1
  description: '═══════════════════════════════════════════════════════════════════════════
    HEALTH & CONNECTION WATCHDOG v4.0.1 ═══════════════════════════════════════════════════════════════════════════
    PURPOSE: - Periodic health check (heartbeat) every 5 minutes. - Automatic UI resynchronization
    on HA or Panel reconnection. - Visual connection status feedback on the status
    bar (p0b2).

    VERSION: 4.0.1 | LAST UPDATED: 25.01.2026 ═══════════════════════════════════════════════════════════════════════════'
  triggers:
  - trigger: time_pattern
    minutes: /5
    id: health_check
    alias: 'SYS: Periodic heartbeat'
  - trigger: mqtt
    topic: homeassistant/status
    payload: online
    id: ha_online
    alias: 'SYS: HA MQTT reconnected'
  - trigger: mqtt
    topic: homeassistant/status
    payload: offline
    id: ha_offline
    alias: 'SYS: HA MQTT disconnected'
  - trigger: mqtt
    topic: hasp/{{ plate }}/LWT
    payload: offline
    id: panel_offline
    alias: 'SYS: Panel lost connection'
  - trigger: mqtt
    topic: hasp/{{ plate }}/LWT
    payload: online
    id: panel_online
    alias: 'SYS: Panel restored connection'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: health_check
      sequence:
      - action: mqtt.publish
        alias: 'MQTT: Request status update'
        data:
          topic: hasp/{{ plate }}/command/statusupdate
          payload: ''
    - conditions:
      - condition: trigger
        id: ha_online
      sequence:
      - delay:
          seconds: 5
      - action: mqtt.publish
        alias: 'MQTT: Set status bar GREEN'
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p0b2.bg_color=#4CAF50"]'
      - action: system_log.write
        data:
          level: info
          message: 'OpenHASP Watchdog: HA reconnected. Triggering full resync.'
      - action: automation.trigger
        target:
          entity_id: automation.openhasp_bedroom_panel_main_controller
        data:
          skip_condition: true
    - conditions:
      - condition: trigger
        id: ha_offline
      sequence:
      - action: mqtt.publish
        alias: 'MQTT: Set status bar RED'
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p0b2.bg_color=#F44336"]'
      - action: system_log.write
        data:
          level: warning
          message: 'OpenHASP Watchdog: HA is going offline!'
    - conditions:
      - condition: trigger
        id: panel_offline
      sequence:
      - action: system_log.write
        data:
          level: warning
          message: 'OpenHASP Watchdog: Panel {{ plate }} went OFFLINE (LWT).'
    - conditions:
      - condition: trigger
        id: panel_online
      sequence:
      - delay:
          seconds: 2
      - action: mqtt.publish
        alias: 'MQTT: Restore status bar GREEN'
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p0b2.bg_color=#4CAF50"]'
      - action: system_log.write
        data:
          level: info
          message: 'OpenHASP Watchdog: Panel {{ plate }} is back ONLINE. Triggering
            resync.'
      - action: automation.trigger
        target:
          entity_id: automation.openhasp_bedroom_panel_main_controller
        data:
          skip_condition: true
  mode: single
  variables:
    plate: plate
- id: '1769384737879'
  alias: System - Debug Logger Ruchu (Spy)
  description: Loguje zdarzenia ruchu, plików i MQTT do logów systemowych w celu diagnostyki.
  triggers:
  - event_type: folder_watcher
    id: file_created
    trigger: event
  - topic: yolov5/results
    id: mqtt_response
    trigger: mqtt
  - entity_id:
    - binary_sensor.rlc_410w_person
    - binary_sensor.rlc_410w_pet
    - binary_sensor.rlc_410w_vehicle
    to: 'on'
    id: backyard_sensor
    trigger: state
  - entity_id:
    - input_number.motion_count_front_door
    - input_number.motion_count_livingroom
    - input_number.motion_count_gate
    - input_number.motion_count_backyard
    id: counter_change
    trigger: state
  - entity_id:
    - input_text.recent_snapshots_front_door
    - input_text.recent_snapshots_livingroom
    - input_text.recent_snapshots_gate
    - input_text.recent_snapshots_backyard
    id: list_update
    trigger: state
  actions:
  - data:
      level: warning
      logger: debug.motion_spy
      message: "[DEBUG] Zdarzenie: {{ trigger.id }} {% if trigger.id == 'file_created'
        %}\n  >>> UTWORZONO PLIK: {{ trigger.event.data.path }}\n{% elif trigger.id
        == 'mqtt_response' %}\n  >>> ODPOWIEDŹ AI: Kamera: {{ trigger.payload_json.get('camera',
        'nieznana') }} | Wykryto: {{ trigger.payload_json.get('detections', []) }}\n{%
        elif trigger.id == 'backyard_sensor' %}\n  >>> SENSOR PODWÓRKA: {{ trigger.entity_id
        }} zmienił stan na ON\n{% elif trigger.id == 'counter_change' %}\n  >>> LICZNIK:
        {{ trigger.entity_id }} wzrósł z {{ trigger.from_state.state }} na {{ trigger.to_state.state
        }}\n{% elif trigger.id == 'list_update' %}\n  >>> SUKCES LISTY: {{ trigger.entity_id
        }} zaktualizowana! Nowa zawartość (fragment): {{ trigger.to_state.state[:50]
        }}...\n{% endif %}\n"
    action: system_log.write
  mode: parallel
- id: '1771528022728'
  alias: Light - Stairs Attic
  description: ''
  triggers:
  - entity_id:
    - binary_sensor.presence_attic_presence
    trigger: state
  - trigger: homeassistant
    event: start
  conditions:
  - condition: or
    conditions:
    - condition: numeric_state
      entity_id: sensor.ws2900_v2_02_02_solar_lux
      below: input_number.light_stairs_solar_lux_lvl
    - condition: numeric_state
      entity_id: sensor.presence_livingroom_illuminance
      below: input_number.light_stairs_illuminance_lvl
    - condition: device
      type: is_on
      device_id: 4d4887a9cd84558a92e6677684134a40
      entity_id: 290f807adb57a5fbfb8e10fdd6d4096c
      domain: light
    - condition: and
      conditions:
      - condition: state
        entity_id: sensor.ws2900_v2_02_02_solar_lux
        state: unavailable
      - condition: sun
        before: sunrise
        after: sunset
    enabled: true
  actions:
  - if:
    - condition: state
      entity_id: binary_sensor.presence_attic_presence
      state: 'on'
    then:
    - action: light.turn_on
      metadata: {}
      target:
        entity_id: light.yeelink_monoa_b2dc_light
      data: {}
    else:
    - action: light.turn_off
      metadata: {}
      target:
        entity_id: light.yeelink_monoa_b2dc_light
      data: {}
  mode: single
- id: '1760649350000'
  alias: Light - Bedroom - Switch to Manual Mode
  description: Przełącza tryb oświetlenia z Auto na Manual, gdy użytkownik ręcznie  włączy
    główne światła sypialni. Zapobiega automatycznemu wyłączeniu  światła przez system.
  triggers:
  - entity_id:
    - light.light_bedroom_1
    - light.light_bedroom_2
    - light.yeelink_monoa_0559_light
    - light.yeelink_monoa_0ec8_light
    to: 'on'
    for: 00:00:02
    trigger: state
  conditions:
  - condition: state
    entity_id: input_select.bedroom_lighting_mode
    state: Auto
  - condition: template
    value_template: "{% set known_automation_ids = [\n  states.automation.light_bedroom_automatic_control.attributes.id,\n
      \ states.automation.light_bedroom_button_control.attributes.id,\n  states.automation.light_bedroom_cinema_mode_management.attributes.id,\n
      \ states.automation.light_bedroom_reset_to_auto_mode.attributes.id,\n  states.automation.light_bedroom_exit_sleep_mode.attributes.id,\n
      \ states.automation.light_bedroom_enter_sleep_mode.attributes.id\n] %} {{ \n
      \ trigger.to_state.context.parent_id not in known_automation_ids \n  and (\n
      \   trigger.to_state.context.user_id is not none \n    or trigger.to_state.context.id
      is not none\n  )\n}}"
  - condition: state
    entity_id: binary_sensor.device_bedroom_projector
    state: 'off'
  actions:
  - action: input_select.select_option
    target:
      entity_id: input_select.bedroom_lighting_mode
    data:
      option: Manual
  - action: persistent_notification.create
    data:
      title: 'Sypialnia: Tryb Manual'
      message: Wykryto ręczne włączenie światła. Tryb zmieniony na Manual. Automatyczne
        wyłączanie zostało wstrzymane.
      notification_id: bedroom_manual_mode
  mode: single
- id: '1771973921917'
  alias: ' Light - Bedroom - Switch to Manual Mode'
  description: Detects manual light changes (via UI/App) and switches the system from
    'Auto' to 'Manual' mode to give the user priority.
  triggers:
  - entity_id:
    - light.light_bedroom_1
    - light.light_bedroom_2
    trigger: state
  conditions:
  - condition: state
    entity_id: input_select.bedroom_lighting_mode
    state: Auto
  - condition: template
    value_template: '{{ trigger.to_state.context.user_id is not none }}'
  actions:
  - target:
      entity_id: input_select.bedroom_lighting_mode
    data:
      option: Manual
    action: input_select.select_option
  mode: single
