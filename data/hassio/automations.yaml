- id: '1768770820459'
  alias: WC - Fan Light & RF Control
  description: 'Controls WC fan via Light switch and RF Remote. Modes: Auto-overrun
    (5m), RF Modes (7/15/20m + Biohazard). Replaced Helper Timer with script delay
    logic (mode: restart).

    '
  mode: restart
  trigger:
  - id: light_off
    entity_id: light.light_wc_1
    to: 'off'
    trigger: state
  - id: rf
    topic: tele/tasmota_DF83AE/RESULT
    trigger: mqtt
  condition: []
  action:
  - variables:
      rf_data: "{% if trigger.id == 'rf'\n       and trigger.payload_json is defined\n
        \      and 'RfReceived' in trigger.payload_json %}\n  {{ trigger.payload_json.RfReceived.Data
        }}\n{% else %}\n  \"\"\n{% endif %}"
  - choose:
    - conditions:
      - condition: trigger
        id: light_off
      - condition: state
        entity_id: fan.switch_wc_mirror
        state: 'on'
      sequence:
      - action: system_log.write
        data:
          level: info
          message: 'WC Fan: Light OFF. Starting 5 min overrun.'
      - delay: 00:05:00
      - action: fan.turn_off
        target:
          entity_id: fan.switch_wc_mirror
      - action: system_log.write
        data:
          level: info
          message: 'WC Fan: Overrun complete. Fan OFF.'
    - conditions:
      - condition: trigger
        id: rf
      - condition: template
        value_template: '{{ rf_data in [''0xFC5D02'',''0xFC5D04'',''0xFC5D01''] }}

          '
      sequence:
      - variables:
          duration: '{% if rf_data == ''0xFC5D02'' %} 00:07:00 {% elif rf_data ==
            ''0xFC5D04'' %} 00:15:00 {% elif rf_data == ''0xFC5D01'' %} 00:20:00 {%
            else %} 00:05:00 {% endif %}'
          mode_name: '{% if rf_data == ''0xFC5D01'' %}BIOHAZARD (20m) {% elif rf_data
            == ''0xFC5D04'' %}Medium (15m) {% else %}Short (7m){% endif %}'
      - action: system_log.write
        data:
          level: info
          message: 'WC Fan: RF Signal received. Mode: {{ mode_name }}.'
      - action: fan.turn_on
        target:
          entity_id: fan.switch_wc_mirror
      - if:
        - condition: template
          value_template: '{{ rf_data == ''0xFC5D01'' }}'
        then:
        - action: system_log.write
          data:
            level: warning
            message: 'WC Fan: ☢️ BIOHAZARD MODE ACTIVATED ☢️'
        - parallel:
          - repeat:
              count: 5
              sequence:
              - action: light.toggle
                target:
                  entity_id: light.switch_wc_mirror
              - delay:
                  milliseconds: 500
              - action: light.toggle
                target:
                  entity_id: light.light_wc_1
              - delay:
                  milliseconds: 500
          - if:
            - condition: state
              entity_id: binary_sensor.can_play_livingroom_audio
              state: 'on'
            then:
            - action: media_player.play_media
              target:
                entity_id: media_player.googlehome0122
              data:
                media:
                  media_content_id: media-source://media_source/local/wc_biohazard.wav
                  media_content_type: audio/x-wav
                  metadata:
                    title: wc_biohazard.wav
          - if:
            - condition: state
              entity_id: binary_sensor.can_play_bedroom_audio
              state: 'on'
            then:
            - action: media_player.play_media
              target:
                entity_id: media_player.lenovo_cd_4n341y7990
              data:
                media:
                  media_content_id: media-source://media_source/local/wc_biohazard.wav
                  media_content_type: audio/x-wav
                  metadata:
                    title: wc_biohazard.wav
      - delay: '{{ duration }}'
      - action: fan.turn_off
        target:
          entity_id: fan.switch_wc_mirror
      - action: system_log.write
        data:
          level: info
          message: 'WC Fan: RF Cycle finished. Fan OFF.'
- id: '1768955586443'
  alias: Motion & Notify - Backyard Camera
  description: Zapisuje zdjęcia i aktualizuje helpery przy każdym wykryciu. Powiadamia
    TYLKO w trybie nieobecności.
  mode: single
  trigger:
  - entity_id: binary_sensor.rlc_410w_person
