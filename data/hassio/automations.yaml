        <= bearing < 292.5 %} zachodni (W) {% elif 292.5 <= bearing < 337.5 %} północno-zachodni
        (NW) {% else %} zmienny {% endif %}'
      meteo_active: '{{ is_state(''binary_sensor.meteoalarm'', ''on'') }}'
      meteo_event: '{{ state_attr(''binary_sensor.meteoalarm'', ''Event'') | default(''Brak'')
        }}'
      meteo_instruction: '{{ state_attr(''binary_sensor.meteoalarm'', ''Instruction'')
        | default('''') }}'
      hydro_alert: '{{ states(''sensor.warta_poznan_most_rocha_alert_hydrologiczny'')
        }}'
      hydro_level: '{{ states(''sensor.warta_poznan_most_rocha_poziom_wody'') }}'
      prompt_text: "Jesteś zarządcą dnia. Wygeneruj 3 sekcje odpowiedzi, oddzielone
        separatorami.\n--- DANE POGODOWE:  - BIEŻĄCE (TERAZ - przy wyjściu): {{ current_cond
        }}, {{ current_temp }}°C  - PROGNOZA (PÓŹNIEJ): {{ forecast_today.condition
        }}, Max {{ forecast_today.temperature }}°C  - OPADY: {{ forecast_today.precipitation
        }} mm (Szansa: {{ forecast_today.precipitation_probability }}%)  - WIATR:
        {{ forecast_today.wind_speed }} km/h (kierunek: {{ wind_direction }})\n---
        OSTRZEŻENIA (METEOALARM): - Status: {{ 'AKTYWNE!' if meteo_active else 'Brak'
        }} {% if meteo_active %} - Zdarzenie: {{ meteo_event }} - Instrukcja bezpieczeństwa:
        {{ meteo_instruction }} {% endif %}\n--- HYDRO (WARTA): - Alert: {{ hydro_alert
        }} - Poziom: {{ hydro_level }} cm ---\nINSTRUKCJE DLA SEKCJI:\n###TTS### (PRO
        MORNING SHOW - RADIO)  Jesteś energicznym gospodarzem porannego pasma. ZASADY:
        1. **Start \"Bezpieczeństwo\"**: Jeśli Meteoalarm jest aktywny, zacznij od
        ostrzeżenia. Jeśli nie ma alarmu - zacznij optymistycznie. 2. **Ewolucja Dnia**:
        Porównaj \"Teraz\" z \"Później\". 3. **Rzeka**: Wspomnij o Warcie TYLKO jeśli
        jest alert hydrologiczny. 4. **ZASADA KLUCZOWA - ODMIANA LICZB**: To tekst
        do syntezatora mowy. WSZYSTKIE liczby, godziny i jednostki (stopnie, km/h)
        musisz zapisać SŁOWNIE i odmienić je przez przypadki. Nie używaj cyfr!\n   *
        \  ŹLE: \"Jest 5°C i wiatr 20 km/h.\"\n   *   DOBRZE: \"Jest pięć stopni Celsjusza,
        a wiatr wieje z prędkością dwudziestu kilometrów na godzinę.\"\n\n###PAWEL###
        (DEPLOYMENT CHECKLIST - INŻYNIER) Styl: \"Checklista Startowa\". Używaj CYFR
        (np. 15°C). ZASADY: - \U0001F321️ Delta T: Pokaż \"Teraz vs Max\". - ⚠️ Ryzyko:
        Jeśli Meteoalarm aktywny - podaj instrukcję. - \U0001F6B4 Rower: Wspomnij
        tylko przy dobrej pogodzie popołudniu. - ❌ **HYDRO**: W tej sekcji NIE pisz
        nic o stanie rzeki.\n###MAGDA### (DAILY CONFIG - INŻYNIER) Styl: \"Konfiguracja
        Ubioru\". Używaj CYFR (np. 15°C). ZASADY: - \U0001F9E3 Feel: Jak dobrać warstwy
        (np. \"Rano czapka, po południu okulary\"). - \U0001F6E1️ Ochrona: Jeśli wiatr/deszcz
        - przypomnij o parasolu/kapturze. - ☀️ UV: Czy brać okulary. - ❌ **HYDRO**:
        W tej sekcji NIE pisz nic o stanie rzeki.\nFORMAT ODPOWIEDZI:  ###TTS### [Treść
        Pro Morning Show]  ###PAWEL### [Treść dla Pawła]  ###MAGDA### [Treść dla Magdy]"
  - alias: Generate AI Response
    data:
      text: '{{ prompt_text }}'
      agent_id: conversation.google_ai_conversation
    response_variable: ai_response
    action: conversation.process
  - alias: Safe Parse Logic
    variables:
      raw_text: '{{ ai_response.response.speech.plain.speech }}'
      valid_format: '{{ ''###TTS###'' in raw_text and ''###PAWEL###'' in raw_text
        and ''###MAGDA###'' in raw_text }}'
      msg_tts: '{% if valid_format %} {{ raw_text.split(''###TTS###'')[1].split(''###PAWEL###'')[0]
        | trim }} {% else %} {{ raw_text }} {% endif %}'
      msg_pawel: '{% if valid_format %} {{ raw_text.split(''###PAWEL###'')[1].split(''###MAGDA###'')[0]
        | trim }} {% else %} Błąd danych. {% endif %}'
      msg_magda: '{% if valid_format %} {{ raw_text.split(''###MAGDA###'')[1] | trim
        }} {% else %} Błąd danych. {% endif %}'
  - alias: 1. Play TTS (Morning Energy)
    data:
      message: '{{ msg_tts }}'
      title: Dzień dobry! ☕
      use_tts: true
    action: script.universal_notifier
  - alias: 2. Notify Pawel (Deployment)
    data:
      message: '{{ msg_pawel }}'
      title: "Start Dnia \U0001F680"
      phone_pawel: true
    action: script.universal_notifier
  - alias: 3. Notify Magda (Config)
    data:
      message: '{{ msg_magda }}'
      title: Start Dnia ☀️
      phone_magdalena: true
    action: script.universal_notifier
  mode: single
- id: '1763763698340'
  alias: OpenHASP - Bedroom - Main Controller v4.0.1
  description: '═══════════════════════════════════════════════════════════════════════════
    OPENHASP BEDROOM PANEL - MAIN CONTROLLER v4.0.1 ═══════════════════════════════════════════════════════════════════════════

    MAJOR CHANGES v4.0.x: - Single dynamic status panel (p1b100-103) replaces overlapping
    layers. - Chunked MQTT commands (max 5 properties) with 200ms delays for stability.
    - Spinner auto-hide failsafe (8s timeout) via input_datetime tracking. - Throttled
    sensor updates (30s) to reduce MQTT congestion. - Full variable names restored:
    purifier_on, humidifier_on, water_color. - Polish diacritics restored (supported
    by fonts). - Enhanced logging with variable state dumps for debugging.

    ARCHITECTURE: - Pages: 1=Lighting, 2=Climate, 3=Thermostat, 4=Blinds, 5=Cinema.
    - Status Panel: Dynamic content based on input_select.bedroom_lighting_mode. -
    Watchdog: input_datetime.hasp_spinner_shown monitors UI lockups.

    VERSION: 4.0.1 | LAST UPDATED: 25.01.2026 ═══════════════════════════════════════════════════════════════════════════'
  triggers:
  - trigger: homeassistant
    event: start
    id: init
    alias: 'SYS: HA started'
  - trigger: mqtt
    topic: hasp/plate/status
    payload: online
    id: init
    alias: 'SYS: Panel online'
  - trigger: mqtt
    topic: hasp/plate/state/p0b3
    id: nav_1
    alias: 'NAV: Page 1 (Lighting)'
  - trigger: mqtt
    topic: hasp/plate/state/p0b4
    id: nav_2
    alias: 'NAV: Page 2 (Climate)'
  - trigger: mqtt
    topic: hasp/plate/state/p0b5
    id: nav_3
    alias: 'NAV: Page 3 (Thermostat)'
  - trigger: mqtt
    topic: hasp/plate/state/p0b6
    id: nav_4
    alias: 'NAV: Page 4 (Blinds)'
  - trigger: mqtt
    topic: hasp/plate/state/p0b7
    id: nav_5
    alias: 'NAV: Page 5 (Cinema)'
  - trigger: mqtt
    topic: hasp/plate/state/p1b11
    id: mode_auto
    alias: 'P1: Mode Auto'
  - trigger: mqtt
    topic: hasp/plate/state/p1b12
    id: mode_sleep
    alias: 'P1: Mode Sleep'
  - trigger: mqtt
    topic: hasp/plate/state/p1b13
    id: mode_cinema
    alias: 'P1: Mode Cinema'
  - trigger: mqtt
    topic: hasp/plate/state/p1b14
    id: mode_manual
    alias: 'P1: Mode Manual'
  - trigger: mqtt
    topic: hasp/plate/state/p1b21
    id: light_1
    alias: 'P1: Light 1'
  - trigger: mqtt
    topic: hasp/plate/state/p1b22
    id: light_2
    alias: 'P1: Light 2'
  - trigger: mqtt
    topic: hasp/plate/state/p1b31
    id: light_3
    alias: 'P1: Light 3'
  - trigger: mqtt
    topic: hasp/plate/state/p1b32
    id: light_4
    alias: 'P1: Light 4'
  - trigger: mqtt
    topic: hasp/plate/state/p1b33
    id: light_slider
    alias: 'P1: Brightness Slider'
  - trigger: mqtt
    topic: hasp/plate/state/p3b87
    id: temp_down
    alias: 'P3: Temp Decrease'
  - trigger: mqtt
    topic: hasp/plate/state/p3b88
    id: temp_up
    alias: 'P3: Temp Increase'
  - trigger: mqtt
    topic: hasp/plate/state/p4b41
    id: blinds_open
    alias: 'P4: Open Blinds'
  - trigger: mqtt
    topic: hasp/plate/state/p4b42
    id: blinds_stop_o
    alias: 'P4: Stop (Opening)'
  - trigger: mqtt
    topic: hasp/plate/state/p4b43
    id: blinds_close
    alias: 'P4: Close Blinds'
  - trigger: mqtt
    topic: hasp/plate/state/p4b44
    id: blinds_stop_c
    alias: 'P4: Stop (Closing)'
  - trigger: mqtt
    topic: hasp/plate/state/p4b45
    id: blinds_stop
    alias: 'P4: Main Stop'
  - trigger: mqtt
    topic: hasp/plate/state/p5b51
    id: proj_toggle
    alias: 'P5: Projector Toggle'
  - trigger: mqtt
    topic: hasp/plate/state/p5b52
    id: spk_toggle
    alias: 'P5: Speakers Toggle'
  - trigger: mqtt
    topic: hasp/plate/state/p5b53
    id: cinema_mode_btn
    alias: 'P5: Cinema Mode Button'
  - trigger: mqtt
    topic: hasp/plate/state/p5b54
    id: cinema_off
    alias: 'P5: Cinema Shutdown'
  - trigger: state
    entity_id: input_select.bedroom_lighting_mode
    id: ha_mode
    alias: 'HA: Mode Changed'
  - trigger: state
    entity_id:
    - light.light_bedroom_1
    - light.light_bedroom_2
    - light.yeelink_monoa_0559_light
    - light.yeelink_monoa_0ec8_light
    id: ha_lights
    alias: 'HA: Lights Changed'
  - trigger: state
    entity_id:
    - binary_sensor.motion_sensor_bedroom_extended
    - binary_sensor.presence_bedroom_presence
    id: ha_presence
    alias: 'HA: Presence Changed'
  - trigger: state
    entity_id: sensor.presence_bedroom_illuminance
    id: ha_lux
    alias: 'HA: Lux Changed (Throttled)'
    for:
      seconds: 30
  - trigger: state
    entity_id:
    - sensor.temphum_bedroom_temperature
    - sensor.temphum_bedroom_humidity
    id: ha_temp_hum
    alias: 'HA: Temp/Hum Changed (Throttled)'
    for:
      seconds: 30
  - trigger: state
    entity_id:
    - sensor.zhimi_mb4a_e02f_pm25_density_2
    - sensor.zhimi_ca4_e6f6_water_level_2
    - sensor.zhimi_mb4a_e02f_filter_life_level_2
    - fan.zhimi_mb4a_e02f_air_purifier_2
    - humidifier.zhimi_ca4_e6f6_humidifier_2
    id: ha_climate
    alias: 'HA: Climate Changed (Throttled)'
    for:
      seconds: 30
  - trigger: state
    entity_id:
    - input_number.thermostat_bedroom_virtual
    - climate.bedroom_ac_better_thermostat
    - climate.bedroom_better_thermostat
    - binary_sensor.contact_bedroom_contact
    id: ha_thermo
    alias: 'HA: Thermostat Changed'
  - trigger: state
    entity_id:
    - switch.curtains_bedroom_open
    - switch.curtains_bedroom_close
    id: ha_blinds
    alias: 'HA: Blinds Changed'
  - trigger: state
    entity_id:
    - binary_sensor.device_bedroom_projector
    - switch.power_strip_3
    - switch.power_strip_2
    id: ha_cinema
    alias: 'HA: Cinema Changed'
  actions:
  - choose:
    - alias: Initialization Sequence
      conditions:
      - condition: trigger
        id: init
      sequence:
      - alias: 'LOG: Init Start'
        action: system_log.write
        data:
          level: info
          message: 'OpenHASP v4.0.1: Initialization sequence started.'
      - alias: Wait for panel boot
        delay:
          milliseconds: 1500
      - alias: 'MQTT: Show Spinner'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p0b240.hidden=0","p0b241.hidden=0","p0b242.hidden=0","p0b242.text=Inicjalizacja..."]'
      - alias: 'WATCHDOG: Set timestamp'
        action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.hasp_spinner_shown
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      - delay:
          milliseconds: 300
      - alias: 'MQTT: Init Page 1'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/page
          payload: '1'
      - delay:
          milliseconds: 200
      - alias: 'MQTT: Init Nav Colors'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p0b3.bg_color=#FF9800","p0b3.text_color=#FFFFFF","p0b4.bg_color=#1A1A1A","p0b4.text_color=#808080","p0b5.bg_color=#1A1A1A"]'
      - delay:
          milliseconds: 200
      - alias: 'MQTT: Init Nav Colors 2'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p0b5.text_color=#808080","p0b6.bg_color=#1A1A1A","p0b6.text_color=#808080","p0b7.bg_color=#1A1A1A","p0b7.text_color=#808080"]'
      - delay:
          milliseconds: 200
      - alias: Calculate Mode Variables
        variables:
          mode: '{{ states(''input_select.bedroom_lighting_mode'') }}'
          is_auto: '{{ mode == ''Auto'' }}'
          is_sleep: '{{ mode == ''Sen'' }}'
          is_cinema: '{{ mode == ''Cinema Mode'' }}'
          is_manual: '{{ mode == ''Manual'' }}'
          panel_bg: '{% if is_auto %}#1B5E20{% elif is_sleep %}#1A237E{% elif is_cinema
            %}#4A148C{% else %}#1A1A1A{% endif %}'
          panel_title: '{% if is_auto %}TRYB AUTOMATYCZNY{% elif is_sleep %}TRYB SENNY{%
            elif is_cinema %}TRYB KINO{% else %}STEROWANIE RĘCZNE{% endif %}'
          panel_icon: '{% if is_auto %}[ A ]{% elif is_sleep %}z z Z{% elif is_cinema
            %}KINO{% else %}{% endif %}'
          panel_desc: '{% if is_auto %}Światła sterowane automatycznie{% elif is_sleep
            %}Światła wyłączone{% elif is_cinema %}Sterowanie projektorem{% else %}{%
            endif %}'
          title_color: '{% if is_auto %}#A5D6A7{% elif is_sleep %}#9FA8DA{% elif is_cinema
            %}#CE93D8{% else %}#888888{% endif %}'
          desc_color: '{% if is_auto %}#81C784{% elif is_sleep %}#7986CB{% elif is_cinema
            %}#BA68C8{% else %}#666666{% endif %}'
      - alias: 'MQTT: Sync Mode Buttons'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p1b11.val={{ 1 if is_auto else 0 }}","p1b12.val={{ 1 if is_sleep
            else 0 }}","p1b13.val={{ 1 if is_cinema else 0 }}","p1b14.val={{ 1 if
            is_manual else 0 }}"]'
      - delay:
          milliseconds: 200
      - alias: 'MQTT: Sync Status Panel 1'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p1b100.bg_color={{ panel_bg }}","p1b100.hidden={{ 1 if is_manual
            else 0 }}","p1b101.text={{ panel_title }}","p1b101.text_color={{ title_color
            }}"]'
      - delay:
          milliseconds: 200
      - alias: 'MQTT: Sync Status Panel 2'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p1b102.text={{ panel_icon }}","p1b103.text={{ panel_desc }}","p1b103.text_color={{
            desc_color }}"]'
      - delay:
          milliseconds: 200
      - alias: 'MQTT: Sync Manual Controls'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p1b201.hidden={{ 0 if is_manual else 1 }}","p1b21.hidden={{
            0 if is_manual else 1 }}","p1b22.hidden={{ 0 if is_manual else 1 }}","p1b202.hidden={{
            0 if is_manual else 1 }}","p1b31.hidden={{ 0 if is_manual else 1 }}","p1b32.hidden={{
            0 if is_manual else 1 }}","p1b33.hidden={{ 0 if is_manual else 1 }}"]'
      - delay:
          milliseconds: 200
      - alias: Calculate Presence Variables
        variables:
          has_presence: '{{ is_state(''binary_sensor.presence_bedroom_presence'',
            ''on'') }}'
          has_motion: '{{ is_state(''binary_sensor.motion_sensor_bedroom_extended'',
            ''on'') }}'
          presence_text: '{% if has_motion and has_presence %}Ruch + Obecność{% elif
            has_motion %}Ruch{% elif has_presence %}Obecność{% else %}Brak{% endif
            %}'
          presence_color: '{{ ''#4CAF50'' if has_motion or has_presence else ''#666666''
            }}'
          lux: '{{ states(''sensor.presence_bedroom_illuminance'') | int(0) }}'
      - alias: 'MQTT: Sync Presence'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p1b51.text_color={{ presence_color }}","p1b53.text={{ presence_text
            }}","p1b53.text_color={{ presence_color }}","p1b58.text={{ lux }} lx"]'
      - delay:
          milliseconds: 200
      - alias: Calculate Projector Variables
        variables:
          proj_on: '{{ is_state(''binary_sensor.device_bedroom_projector'', ''on'')
            }}'
          proj_pwr: '{{ is_state(''switch.power_strip_3'', ''on'') }}'
          proj_text: '{% if proj_on %}Ogląda{% elif proj_pwr %}Czuwanie{% else %}Wyłączony{%
            endif %}'
          proj_color: '{% if proj_on %}#9C27B0{% elif proj_pwr %}#FF9800{% else %}#555555{%
            endif %}'
      - alias: 'MQTT: Sync Projector Status'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p1b61.text_color={{ proj_color }}","p1b63.text={{ proj_text
            }}","p1b63.text_color={{ proj_color }}"]'
      - delay:
          milliseconds: 200
      - alias: Calculate Climate Variables
        variables:
          temp: '{{ states(''sensor.temphum_bedroom_temperature'') | float(0) | round(1)
            }}'
          hum: '{{ states(''sensor.temphum_bedroom_humidity'') | int(0) }}'
          pm25: '{{ states(''sensor.zhimi_mb4a_e02f_pm25_density_2'') | int(0) }}'
          water: '{{ states(''sensor.zhimi_ca4_e6f6_water_level_2'') | int(0) }}'
          water_color: '{% if water < 15 %}#F44336{% elif water < 35 %}#FF9800{% else
            %}#03A9F4{% endif %}'
      - alias: 'MQTT: Sync Climate 1'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p2b102.text={{ temp }}°C","p2b104.text={{ hum }}%","p2b111.val={{
            [pm25,150]|min }}","p2b113.text={{ pm25 }}"]'
      - delay:
          milliseconds: 200
      - alias: 'MQTT: Sync Climate 2'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p2b121.val={{ water }}","p2b121.line_color={{ water_color }}","p2b123.text={{
            water }}%","p2b123.text_color={{ water_color }}"]'
      - delay:
          milliseconds: 200
      - alias: Calculate Thermostat Variables
        variables:
          temp_target: '{{ states(''input_number.thermostat_bedroom_virtual'') | float(0)
            | round(1) }}'
          ac: '{{ states(''climate.bedroom_ac_better_thermostat'') }}'
          trv: '{{ is_state(''climate.bedroom_better_thermostat'', ''heat'') }}'
          hvac_text: '{% if ac == ''cool'' %}Chłodzenie{% elif ac == ''heat'' and
            trv %}TURBO{% elif ac == ''heat'' %}AC{% elif trv %}TRV{% else %}Wyłączony{%
            endif %}'
          hvac_color: '{% if ac == ''cool'' %}#2196F3{% elif ac == ''heat'' and trv
            %}#F44336{% elif ac == ''heat'' or trv %}#FF9800{% else %}#666666{% endif
            %}'
          window: '{{ is_state(''binary_sensor.contact_bedroom_contact'', ''on'')
            }}'
          win_text: '{% if window %}OKNO OTWARTE{% else %}Okno zamknięte{% endif %}'
          win_color: '{{ ''#F44336'' if window else ''#4CAF50'' }}'
      - alias: 'MQTT: Sync Thermostat 1'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p3b102.text={{ temp }}","p3b111.text_color={{ hvac_color }}","p3b112.text={{
            hvac_text }}","p3b112.text_color={{ hvac_color }}"]'
      - delay:
          milliseconds: 200
      - alias: 'MQTT: Sync Thermostat 2'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p3b121.text={{ temp_target }}","p3b130.border_color={{ win_color
            }}","p3b131.text={{ win_text }}","p3b131.text_color={{ win_color }}"]'
      - delay:
          milliseconds: 200
      - alias: Calculate Blinds Variables
        variables:
          b_open: '{{ is_state(''switch.curtains_bedroom_open'', ''on'') }}'
          b_close: '{{ is_state(''switch.curtains_bedroom_close'', ''on'') }}'
          b_text: '{% if b_open %}OTWIERANIE{% elif b_close %}ZAMYKANIE{% else %}ZATRZYMANE{%
            endif %}'
          b_color: '{% if b_open %}#4CAF50{% elif b_close %}#FF9800{% else %}#9E9E9E{%
            endif %}'
      - alias: 'MQTT: Sync Blinds'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p4b100.border_color={{ b_color }}","p4b101.text_color={{ b_color
            }}","p4b102.text={{ b_text }}","p4b41.hidden={{ 1 if b_open else 0 }}","p4b42.hidden={{
            0 if b_open else 1 }}","p4b43.hidden={{ 1 if b_close else 0 }}","p4b44.hidden={{
            0 if b_close else 1 }}"]'
      - delay:
          milliseconds: 200
      - alias: Calculate Cinema Variables
        variables:
          spk_on: '{{ is_state(''switch.power_strip_2'', ''on'') }}'
      - alias: 'MQTT: Sync Cinema'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p5b101.text_color={{ proj_color }}","p5b103.text={{ proj_text
            }}","p5b103.text_color={{ proj_color }}","p5b51.val={{ 1 if proj_pwr else
            0 }}","p5b52.val={{ 1 if spk_on else 0 }}"]'
      - delay:
          milliseconds: 300
      - alias: 'MQTT: Hide Spinner'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p0b240.hidden=1","p0b241.hidden=1","p0b242.hidden=1"]'
      - alias: 'LOG: Init Complete'
        action: system_log.write
        data:
          level: info
          message: 'OpenHASP v4.0.1: Initialization completed successfully.'
    - alias: Navigation Handler
      conditions:
      - condition: trigger
        id:
        - nav_1
        - nav_2
        - nav_3
        - nav_4
        - nav_5
      - condition: template
        value_template: '{{ trigger.payload_json.event == ''up'' }}'
      sequence:
      - alias: Calculate Navigation Variables
        variables:
          nav:
            nav_1:
              p: 1
              c: '#FF9800'
              n: Oświetlenie
            nav_2:
              p: 2
              c: '#03A9F4'
              n: Klimat
            nav_3:
              p: 3
              c: '#FF9800'
              n: Termostat
            nav_4:
              p: 4
              c: '#9E9E9E'
              n: Rolety
            nav_5:
              p: 5
              c: '#9C27B0'
              n: Kino
          cfg: '{{ nav[trigger.id] }}'
      - alias: 'MQTT: Show Nav Spinner'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p0b240.hidden=0","p0b241.hidden=0","p0b242.hidden=0","p0b242.text={{
            cfg.n }}..."]'
      - alias: 'WATCHDOG: Update timestamp'
        action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.hasp_spinner_shown
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      - delay:
          milliseconds: 100
      - alias: 'MQTT: Change Page'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/page
          payload: '{{ cfg.p }}'
      - delay:
          milliseconds: 150
      - alias: 'MQTT: Update Nav Colors 1'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p0b3.bg_color={{ cfg.c if trigger.id == "nav_1" else "#1A1A1A"
            }}","p0b3.text_color={{ "#FFFFFF" if trigger.id == "nav_1" else "#808080"
            }}","p0b4.bg_color={{ cfg.c if trigger.id == "nav_2" else "#1A1A1A" }}","p0b4.text_color={{
            "#FFFFFF" if trigger.id == "nav_2" else "#808080" }}"]'
      - delay:
          milliseconds: 100
      - alias: 'MQTT: Update Nav Colors 2'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p0b5.bg_color={{ cfg.c if trigger.id == "nav_3" else "#1A1A1A"
            }}","p0b5.text_color={{ "#FFFFFF" if trigger.id == "nav_3" else "#808080"
            }}","p0b6.bg_color={{ cfg.c if trigger.id == "nav_4" else "#1A1A1A" }}","p0b6.text_color={{
            "#FFFFFF" if trigger.id == "nav_4" else "#808080" }}","p0b7.bg_color={{
            cfg.c if trigger.id == "nav_5" else "#1A1A1A" }}","p0b7.text_color={{
            "#FFFFFF" if trigger.id == "nav_5" else "#808080" }}"]'
      - delay:
          milliseconds: 200
      - alias: 'MQTT: Hide Nav Spinner'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p0b240.hidden=1","p0b241.hidden=1","p0b242.hidden=1"]'
    - alias: Mode Selection Handler
      conditions:
      - condition: trigger
        id:
        - mode_auto
        - mode_sleep
        - mode_cinema
        - mode_manual
      - condition: template
        value_template: '{{ trigger.payload_json.val == 1 }}'
      sequence:
      - alias: Calculate Mode Variables
        variables:
          modes:
            mode_auto: Auto
            mode_sleep: Sen
            mode_cinema: Cinema Mode
            mode_manual: Manual
          new_mode: '{{ modes[trigger.id] }}'
      - alias: Set Lighting Mode
        action: input_select.select_option
        target:
          entity_id: input_select.bedroom_lighting_mode
        data:
          option: '{{ new_mode }}'
      - alias: 'LOG: Mode Change'
        action: system_log.write
        data:
          level: info
          message: 'OpenHASP: Mode changed to {{ new_mode }} via Panel.'
    - alias: HA Mode Sync Handler
      conditions:
      - condition: trigger
        id: ha_mode
      sequence:
      - alias: Calculate Mode Variables
        variables:
          mode: '{{ states(''input_select.bedroom_lighting_mode'') }}'
          is_auto: '{{ mode == ''Auto'' }}'
          is_sleep: '{{ mode == ''Sen'' }}'
          is_cinema: '{{ mode == ''Cinema Mode'' }}'
          is_manual: '{{ mode == ''Manual'' }}'
          panel_bg: '{% if is_auto %}#1B5E20{% elif is_sleep %}#1A237E{% elif is_cinema
            %}#4A148C{% else %}#1A1A1A{% endif %}'
          panel_title: '{% if is_auto %}TRYB AUTOMATYCZNY{% elif is_sleep %}TRYB SENNY{%
            elif is_cinema %}TRYB KINO{% else %}STEROWANIE RĘCZNE{% endif %}'
          panel_icon: '{% if is_auto %}[ A ]{% elif is_sleep %}z z Z{% elif is_cinema
            %}KINO{% else %}{% endif %}'
          panel_desc: '{% if is_auto %}Światła sterowane automatycznie{% elif is_sleep
            %}Światła wyłączone{% elif is_cinema %}Sterowanie projektorem{% else %}{%
            endif %}'
          title_color: '{% if is_auto %}#A5D6A7{% elif is_sleep %}#9FA8DA{% elif is_cinema
            %}#CE93D8{% else %}#888888{% endif %}'
          desc_color: '{% if is_auto %}#81C784{% elif is_sleep %}#7986CB{% elif is_cinema
            %}#BA68C8{% else %}#666666{% endif %}'
      - alias: 'MQTT: Update Mode Buttons'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p1b11.val={{ 1 if is_auto else 0 }}","p1b12.val={{ 1 if is_sleep
            else 0 }}","p1b13.val={{ 1 if is_cinema else 0 }}","p1b14.val={{ 1 if
            is_manual else 0 }}"]'
      - delay:
          milliseconds: 150
      - alias: 'MQTT: Update Status Panel 1'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p1b100.bg_color={{ panel_bg }}","p1b100.hidden={{ 1 if is_manual
            else 0 }}","p1b101.text={{ panel_title }}","p1b101.text_color={{ title_color
            }}"]'
      - delay:
          milliseconds: 150
      - alias: 'MQTT: Update Status Panel 2'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p1b102.text={{ panel_icon }}","p1b103.text={{ panel_desc }}","p1b103.text_color={{
            desc_color }}"]'
      - delay:
          milliseconds: 150
      - alias: 'MQTT: Update Manual Controls'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p1b201.hidden={{ 0 if is_manual else 1 }}","p1b202.hidden={{
            0 if is_manual else 1 }}","p1b21.hidden={{ 0 if is_manual else 1 }}","p1b22.hidden={{
            0 if is_manual else 1 }}","p1b31.hidden={{ 0 if is_manual else 1 }}","p1b32.hidden={{
            0 if is_manual else 1 }}","p1b33.hidden={{ 0 if is_manual else 1 }}"]'
      - if:
        - alias: Check Manual Mode
          condition: template
          value_template: '{{ is_manual }}'
        then:
        - delay:
            milliseconds: 150
        - alias: 'MQTT: Sync Manual Lights'
          action: mqtt.publish
          data:
            topic: hasp/{{ plate }}/command/json
            payload: '["p1b21.val={{ 1 if is_state("light.light_bedroom_1","on") else
              0 }}","p1b22.val={{ 1 if is_state("light.light_bedroom_2","on") else
              0 }}","p1b31.val={{ 1 if is_state("light.yeelink_monoa_0559_light","on")
              else 0 }}","p1b32.val={{ 1 if is_state("light.yeelink_monoa_0ec8_light","on")
              else 0 }}"]'
    - alias: Light Control Handler
      conditions:
      - condition: trigger
        id:
        - light_1
        - light_2
        - light_3
        - light_4
      - condition: template
        value_template: '{{ trigger.payload_json.val is defined }}'
      sequence:
      - alias: Calculate Light Entities
        variables:
          entities:
            light_1: light.light_bedroom_1
            light_2: light.light_bedroom_2
            light_3: light.yeelink_monoa_0559_light
            light_4: light.yeelink_monoa_0ec8_light
      - alias: Toggle Light
        action: light.turn_{{ 'on' if trigger.payload_json.val == 1 else 'off' }}
        target:
          entity_id: '{{ entities[trigger.id] }}'
    - alias: Light Slider Handler
      conditions:
      - condition: trigger
        id: light_slider
      - condition: template
        value_template: '{{ trigger.payload_json.event in [''up'',''changed''] }}'
      sequence:
      - alias: Set Brightness
        action: light.turn_on
        target:
          entity_id:
          - light.yeelink_monoa_0559_light
          - light.yeelink_monoa_0ec8_light
        data:
          brightness: '{{ trigger.payload_json.val | int }}'
    - alias: HA Lights Sync Handler
      conditions:
      - condition: trigger
        id: ha_lights
      - condition: state
        entity_id: input_select.bedroom_lighting_mode
        state: Manual
      sequence:
      - alias: 'MQTT: Update Light States'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p1b21.val={{ 1 if is_state("light.light_bedroom_1","on") else
            0 }}","p1b22.val={{ 1 if is_state("light.light_bedroom_2","on") else 0
            }}","p1b31.val={{ 1 if is_state("light.yeelink_monoa_0559_light","on")
            else 0 }}","p1b32.val={{ 1 if is_state("light.yeelink_monoa_0ec8_light","on")
            else 0 }}"]'
    - alias: Presence & Lux Sync Handler
      conditions:
      - condition: trigger
        id:
        - ha_presence
        - ha_lux
      sequence:
      - alias: Calculate Presence Variables
        variables:
          has_presence: '{{ is_state(''binary_sensor.presence_bedroom_presence'',
            ''on'') }}'
          has_motion: '{{ is_state(''binary_sensor.motion_sensor_bedroom_extended'',
            ''on'') }}'
          presence_text: '{% if has_motion and has_presence %}Ruch + Obecność{% elif
            has_motion %}Ruch{% elif has_presence %}Obecność{% else %}Brak{% endif
            %}'
          presence_color: '{{ ''#4CAF50'' if has_motion or has_presence else ''#666666''
            }}'
          lux: '{{ states(''sensor.presence_bedroom_illuminance'') | int(0) }}'
      - alias: 'MQTT: Update Presence'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p1b51.text_color={{ presence_color }}","p1b53.text={{ presence_text
            }}","p1b53.text_color={{ presence_color }}","p1b58.text={{ lux }} lx"]'
    - alias: Temp/Hum Sync Handler
      conditions:
      - condition: trigger
        id: ha_temp_hum
      sequence:
      - alias: Calculate Temp/Hum Variables
        variables:
          temp: '{{ states(''sensor.temphum_bedroom_temperature'') | float(0) | round(1)
            }}'
          hum: '{{ states(''sensor.temphum_bedroom_humidity'') | int(0) }}'
      - alias: 'MQTT: Update Temp/Hum'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p2b102.text={{ temp }}°C","p2b104.text={{ hum }}%","p3b102.text={{
            temp }}"]'
    - alias: Climate Sync Handler
      conditions:
      - condition: trigger
        id: ha_climate
      sequence:
      - alias: Calculate Climate Variables
        variables:
          pm25: '{{ states(''sensor.zhimi_mb4a_e02f_pm25_density_2'') | int(0) }}'
          water: '{{ states(''sensor.zhimi_ca4_e6f6_water_level_2'') | int(0) }}'
          filter: '{{ states(''sensor.zhimi_mb4a_e02f_filter_life_level_2'') | int(0)
            }}'
          purifier_on: '{{ is_state(''fan.zhimi_mb4a_e02f_air_purifier_2'', ''on'')
            }}'
          humidifier_on: '{{ is_state(''humidifier.zhimi_ca4_e6f6_humidifier_2'',
            ''on'') }}'
          pm_color: '{% if pm25 <= 12 %}#4CAF50{% elif pm25 <= 35 %}#8BC34A{% elif
            pm25 <= 55 %}#FFC107{% else %}#FF9800{% endif %}'
          water_color: '{% if water < 15 %}#F44336{% elif water < 35 %}#FF9800{% else
            %}#03A9F4{% endif %}'
          filter_color: '{% if filter < 10 %}#F44336{% elif filter < 30 %}#FF9800{%
            else %}#4CAF50{% endif %}'
      - alias: 'MQTT: Update Climate 1'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p2b111.val={{ [pm25,150]|min }}","p2b111.line_color={{ pm_color
            }}","p2b113.text={{ pm25 }}","p2b113.text_color={{ pm_color }}"]'
      - delay:
          milliseconds: 100
      - alias: 'MQTT: Update Climate 2'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p2b115.text=Oczyszczacz: {{ "Pracuje" if purifier_on else "Wył."
            }}","p2b121.val={{ water }}","p2b121.line_color={{ water_color }}","p2b123.text={{
            water }}%","p2b123.text_color={{ water_color }}"]'
      - delay:
          milliseconds: 100
      - alias: 'MQTT: Update Climate 3'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p2b124.text={{ "UZUPEŁNIJ" if water < 15 else "" }}","p2b125.text=Nawilżacz:
            {{ "Pracuje" if humidifier_on else "Wył." }}","p2b132.text={{ filter }}%","p2b132.text_color={{
            filter_color }}"]'
    - alias: Thermostat Sync Handler
      conditions:
      - condition: trigger
        id: ha_thermo
      sequence:
      - alias: Calculate Thermostat Variables
        variables:
          temp_target: '{{ states(''input_number.thermostat_bedroom_virtual'') | float(0)
            | round(1) }}'
          ac: '{{ states(''climate.bedroom_ac_better_thermostat'') }}'
          trv: '{{ is_state(''climate.bedroom_better_thermostat'', ''heat'') }}'
          hvac_text: '{% if ac == ''cool'' %}Chłodzenie{% elif ac == ''heat'' and
            trv %}TURBO{% elif ac == ''heat'' %}AC{% elif trv %}TRV{% else %}Wyłączony{%
            endif %}'
          hvac_color: '{% if ac == ''cool'' %}#2196F3{% elif ac == ''heat'' and trv
            %}#F44336{% elif ac == ''heat'' or trv %}#FF9800{% else %}#666666{% endif
            %}'
          window: '{{ is_state(''binary_sensor.contact_bedroom_contact'', ''on'')
            }}'
          win_text: '{% if window %}OKNO OTWARTE{% else %}Okno zamknięte{% endif %}'
          win_color: '{{ ''#F44336'' if window else ''#4CAF50'' }}'
          pres: '{{ is_state(''binary_sensor.presence_bedroom_presence'', ''on'')
            }}'
      - alias: 'MQTT: Update Thermostat 1'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p3b111.text_color={{ hvac_color }}","p3b112.text={{ hvac_text
            }}","p3b112.text_color={{ hvac_color }}","p3b121.text={{ temp_target }}"]'
      - delay:
          milliseconds: 100
      - alias: 'MQTT: Update Thermostat 2'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p3b130.border_color={{ win_color }}","p3b131.text={{ win_text
            }}","p3b131.text_color={{ win_color }}","p2b137.text={{ "Tak" if pres
            else "Nie" }}","p2b142.text={{ "OTWARTE" if window else "OK" }}","p2b142.text_color={{
            win_color }}"]'
    - alias: Temperature Control Handler
      conditions:
      - condition: trigger
        id:
        - temp_down
        - temp_up
      - condition: template
        value_template: '{{ trigger.payload_json.event == ''down'' }}'
      sequence:
      - alias: Adjust Temperature
        action: input_number.{{ 'decrement' if trigger.id == 'temp_down' else 'increment'
          }}
        target:
          entity_id: input_number.thermostat_bedroom_virtual
      - alias: 'LOG: Temp Change'
        action: system_log.write
        data:
          level: info
          message: 'OpenHASP: Temp {{ ''decreased'' if trigger.id == ''temp_down''
            else ''increased'' }} via Panel.'
    - alias: Blinds Control Handler
      conditions:
      - condition: trigger
        id:
        - blinds_open
        - blinds_close
        - blinds_stop
        - blinds_stop_o
        - blinds_stop_c
      - condition: template
        value_template: '{{ trigger.payload_json.event == ''down'' }}'
      sequence:
      - alias: Calculate Blinds Switches
