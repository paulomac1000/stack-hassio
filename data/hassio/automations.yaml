- id: '1746545180738'
  alias: Energy Control - Fridge intelligent mode management
  description: 'Intelligently manages fridge modes. Logs: Error on connectivity loss,
    Info on mode changes. Fixes: Added missing trigger keys and extended timeouts.'
  mode: restart
  trigger:
  - entity_id:
    - sensor.energy_price_state
    - input_number.temp_fridge_cheap_energy
    - input_number.temp_freezer_cheap_energy
    - input_number.temp_fridge_expensive_energy
    - input_number.temp_freezer_expensive_energy
    - input_number.temp_fridge_normal_energy
    - input_number.temp_freezer_normal_energy
    - input_select.kitchen_fridge_temperature_mode
    - binary_sensor.energy_is_cheapest_5h
    trigger: state
  - minutes: /15
    trigger: time_pattern
  - event: start
    trigger: homeassistant
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_select.kitchen_fridge_temperature_mode
        state: 'Off'
      sequence:
      - action: system_log.write
        data:
          level: info
          message: 'Fridge: Manual OFF requested.'
      - target:
          entity_id: select.fridge_none_5
        data:
          option: eco_fuzzy_passive
        action: select.select_option
        continue_on_error: true
      - target:
          entity_id: switch.fridge
        action: switch.turn_off
    - conditions:
      - condition: state
        entity_id: input_select.kitchen_fridge_temperature_mode
        state: Eko
      sequence:
      - action: system_log.write
        data:
          level: info
          message: 'Fridge: Setting Eco Mode.'
      - target:
          entity_id: switch.fridge
        action: switch.turn_on
      - wait_for_trigger:
        - trigger: state
          entity_id: binary_sensor.fridge_online
          to: 'on'
        timeout: 00:02:00
        continue_on_timeout: false
      - target:
          entity_id: select.fridge_none_5
        data:
          option: eco_fuzzy_active
        action: select.select_option
    - conditions:
      - condition: state
        entity_id: input_select.kitchen_fridge_temperature_mode
        state: Auto
      sequence:
      - target:
          entity_id: switch.fridge
        action: switch.turn_on
      - variables:
          target_temp_fridge: "{% if is_state('sensor.energy_price_state', 'cheap')
            %}\n  {{ states('input_number.temp_fridge_cheap_energy') }}\n{% elif is_state('sensor.energy_price_state',
            'expensive') and is_state('binary_sensor.energy_is_cheapest_5h', 'on')
            %}\n  {{ states('input_number.temp_fridge_normal_energy') }}\n{% elif
            is_state('sensor.energy_price_state', 'expensive') %}\n  {{ states('input_number.temp_fridge_expensive_energy')
            }}\n{% else %}\n  {{ states('input_number.temp_fridge_normal_energy')
            }}\n{% endif %}\n"
      - action: system_log.write
        data:
          level: info
          message: 'Fridge: Auto adjusting. Price: {{ states(''sensor.energy_price_state'')
            }}. Target: {{ target_temp_fridge }}C.'
      - wait_for_trigger:
        - trigger: state
          entity_id: binary_sensor.fridge_online
          to: 'on'
        timeout: 00:02:00
        continue_on_timeout: true
      - target:
          entity_id: select.fridge_none_2
        data:
          option: '{{ target_temp_fridge | int }}c'
        action: select.select_option
      - target:
          entity_id: select.fridge_none_3
        data:
          option: "{% if is_state('sensor.energy_price_state', 'cheap') %}\n  {{ states('input_number.temp_freezer_cheap_energy')
            | int }}c\n{% elif is_state('sensor.energy_price_state', 'expensive')
            and is_state('binary_sensor.energy_is_cheapest_5h', 'on') %}\n  {{ states('input_number.temp_freezer_normal_energy')
            | int }}c\n{% elif is_state('sensor.energy_price_state', 'expensive')
            %}\n  {{ states('input_number.temp_freezer_expensive_energy') | int }}c\n{%
            else %}\n  {{ states('input_number.temp_freezer_normal_energy') | int
            }}c\n{% endif %}\n"
        action: select.select_option
      - target:
          entity_id: select.fridge_none_5
        data:
          option: eco_fuzzy_passive
        action: select.select_option
    default:
    - action: system_log.write
      data:
        level: info
        message: 'Fridge: Default fallback action executed.'
    - target:
        entity_id: switch.fridge
      action: switch.turn_on
    - wait_for_trigger:
      - trigger: state
        entity_id: binary_sensor.fridge_online
        to: 'on'
      timeout: 00:02:00
      continue_on_timeout: false
    - target:
        entity_id: select.fridge_none_5
      data:
        option: eco_fuzzy_passive
      action: select.select_option
  - condition: template
    value_template: "{{ trigger.entity_id == 'input_select.kitchen_fridge_temperature_mode'
      and\n   not is_state('binary_sensor.fridge_online', 'on') and\n   states('input_select.kitchen_fridge_temperature_mode')
      != 'Off' }}\n"
  - action: system_log.write
    data:
      level: error
      message: 'Fridge: Connection ERROR. Mode change failed. Status: {{ states(''binary_sensor.fridge_online'')
        }}. Reverting to Auto.'
  - target:
      entity_id: input_select.kitchen_fridge_temperature_mode
    data:
      option: Auto
    action: input_select.select_option
  - data:
      title: Błąd połączenia z lodówką
      message: Nie udało się połączyć z lodówką. Przywrócono tryb 'Auto'.
    action: persistent_notification.create
- id: '1746545350172'
