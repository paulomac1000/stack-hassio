- id: '1719789290371'
  alias: Switch - socket switch for tablet charger in LivingRoom
  description: Turn on or off tablet charger depending from battery level or cheapest
    energy today
  trigger:
  - entity_id: sensor.wallpanel_downstairs_battery_level
    below: 30
    trigger: numeric_state
  - entity_id: sensor.wallpanel_downstairs_battery_level
    above: 99
    trigger: numeric_state
  - entity_id:
    - sensor.wallpanel_downstairs_battery_level
    to: unavailable
    trigger: state
  - trigger: state
    entity_id:
    - binary_sensor.energy_is_cheapest_3h
  action:
  - choose:
    - conditions:
      - condition: or
        conditions:
        - condition: numeric_state
          entity_id: sensor.wallpanel_downstairs_battery_level
          below: 30
        - condition: state
          entity_id: sensor.wallpanel_downstairs_battery_level
          state: unavailable
        - condition: state
          entity_id: binary_sensor.energy_is_cheapest_3h
          state: 'on'
      - condition: state
        entity_id: switch.socket_livingroom_tablet
        state: 'off'
      sequence:
      - target:
          entity_id: switch.socket_livingroom_tablet
        data: {}
        action: switch.turn_on
    - conditions:
      - condition: numeric_state
        entity_id: sensor.wallpanel_downstairs_battery_level
        above: 99
      - condition: state
        entity_id: switch.socket_livingroom_tablet
        state: 'on'
      sequence:
      - target:
          entity_id: switch.socket_livingroom_tablet
        data: {}
        action: switch.turn_off
    default:
    - type: turn_off
      device_id: 3d87c903fdb32e9f9dc857869cbae096
      entity_id: 7bb520d2de4802298384cf287cb67ae7
      domain: switch
- id: '1721145556788'
  alias: Light - switch off bathroom light
  description: Wyłącza oświetlenie luster, gdy główne światło w łazience zgaśnie
  triggers:
  - trigger: state
    entity_id: light.light_bathroom_1
    to: 'off'
  conditions: []
  actions:
  - target:
      entity_id:
      - light.light_bathroom_mirror_back
      - light.light_bathroom_mirror_top
