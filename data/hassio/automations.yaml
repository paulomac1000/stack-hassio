- id: '1760659891348'
  alias: Light - Downstairs - Decorative Control
  description: Manages decorative lights based on Motion and Vacuum status. Vacuum
    triggers only socket LEDs for navigation. Human motion triggers all decorative
    lights. Keeps lights on as long as vacuum operates.
  mode: restart
  trigger:
  - entity_id:
    - binary_sensor.motion_sensor_livingroom_extended
    - binary_sensor.guest_mode_condition_livingroom
    trigger: state
  - entity_id: vacuum.viomi_v8_9672_robot_cleaner_2
    to: cleaning
    trigger: state
  - event: start
    trigger: homeassistant
  condition: []
  action:
  - alias: Calculate Variables
    variables:
      is_guest_mode_off: '{{ is_state(''binary_sensor.guest_mode_condition_livingroom'',
        ''off'') }}'
      is_motion: '{{ is_state(''binary_sensor.motion_sensor_livingroom_extended'',
        ''on'') }}'
      is_vacuuming: '{{ is_state(''vacuum.viomi_v8_9672_robot_cleaner_2'', ''cleaning'')
        }}'
      is_dark_solar: '{{ states(''sensor.ws2900_v2_02_02_solar_lux'') | float(999)
        < states(''input_number.light_livingroom_solar_lux_lvl'') | float(0) }}'
      is_dark: '{{ is_dark_solar or is_state(''sun.sun'', ''below_horizon'') }}'
      all_decorative:
      - light.socket_led_kitchen
      - light.light_fire_light
      - light.socket_led_livingroom
      - light.led_kitchen_light
      - light.awtrix_51f608_matrix
      vacuum_lights:
      - light.socket_led_kitchen
      - light.socket_led_livingroom
  - alias: Execute Logic
    choose:
    - conditions:
      - condition: template
        value_template: '{{ is_guest_mode_off }}'
      sequence:
      - target:
          entity_id: '{{ all_decorative }}'
        action: light.turn_off
      - stop: Guest Mode OFF
    - conditions:
      - condition: template
        value_template: '{{ is_motion }}'
      sequence:
      - target:
          entity_id: '{{ all_decorative }}'
        action: light.turn_on
    - conditions:
      - condition: template
        value_template: '{{ is_vacuuming and is_dark }}'
      sequence:
      - target:
          entity_id: '{{ vacuum_lights }}'
        action: light.turn_on
    - conditions:
      - condition: template
        value_template: '{{ not is_motion and not is_vacuuming }}'
      sequence:
      - target:
          entity_id: '{{ all_decorative }}'
        action: light.turn_off
- id: '1760920378865'
  alias: Watchdog - Reload Pstryk Energy if prices are outdated
  description: 'Runs every hour at XX:02 and checks whether the current electricity
    price in the sensor state matches the price in the attribute list for the current
    hour. If not, it reloads the Pstryk Energy integration and notifies the user.

    '
  mode: single
  trigger:
  - minutes: 2
    trigger: time_pattern
  condition: []
  action:
  - variables:
      current_hour_iso: '{{ now().replace(minute=0, second=0, microsecond=0).isoformat()
        }}'
      prices_list: '{{ state_attr(''sensor.pstryk_buy_price'', ''prices'') or [] }}'
      current_entry: '{{ prices_list | selectattr(''time'', ''eq'', current_hour_iso)
        | list | first }}'
      expected_price: '{{ current_entry.price if current_entry is defined and current_entry
        else none }}'
      current_price: '{{ states(''sensor.pstryk_buy_price'') | float(0) }}'
      is_outdated: "{{ expected_price is none or\n   ((expected_price | float(0))
        - current_price) | abs > 0.001 }}"
  - if:
    - condition: template
      value_template: '{{ is_outdated }}'
    then:
    - action: homeassistant.reload_config_entry
      data:
        entry_id: 01JWB3B9AKSN4BKT2YQEXMTY53
    - delay: 00:00:10
    - data:
        name: Pstryk Energy Watchdog
        message: Integration reloaded because sensor.pstryk_buy_price was outdated.
      action: logbook.log
    - data:
        title: Pstryk Energy - Reloaded
        message: 'Automatyczne przeładowanie integracji wykonane o {{ now().strftime(''%H:%M'')
          }}. Poprzednia cena: {{ current_price }} PLN/kWh, poprawna cena: {{ expected_price
          if expected_price is not none else ''brak'' }} PLN/kWh.

          '
      action: persistent_notification.create
      enabled: false
    - action: script.universal_notifier
      data:
        title: Watchdog Pstryk Energy
        message: "Wykryłem nieaktualną cenę energii o {{ now().strftime('%H:%M') }}.
          Stan sensora: {{ states('sensor.pstryk_buy_price') }} PLN/kWh, poprawna
          cena powinna być: {{\n  (state_attr('sensor.pstryk_buy_price','prices')\n
          \ | selectattr('time','eq', now().replace(minute=0, second=0, microsecond=0).isoformat())\n
          \ | list | first).price\n  if (state_attr('sensor.pstryk_buy_price','prices')\n
          \ | selectattr('time','eq', now().replace(minute=0, second=0, microsecond=0).isoformat())\n
          \ | list | first) is defined else 'brak' }} PLN/kWh.\nIntegracja Pstryk
          została przeładowana.\n"
        use_tts: true
        phone_pawel: false
        phone_magdalena: false
        use_pushbullet: false
      enabled: false
- id: '1760920808529'
  alias: 'Watchdog: Awaria domofonu'
  description: Powiadamia głosowo, gdy kamera domofonu jest niedostępna przez 5 minut,
    instruując o potrzebie restartu urządzenia.
  mode: single
  trigger:
