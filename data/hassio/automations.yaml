- id: '1688404627427'
  alias: Notify - Water Leaks, Smoke, and Battery Status
  description: Sends critical alerts for water leaks/smoke and daily low battery warnings.
  mode: single
  variables:
    battery_sensors:
    - sensor.waterleak_wc_battery
    - sensor.waterleak_bathroom_battery
    - sensor.waterleak_entrance_battery
    - sensor.smoke_detector_livingroom_battery
    battery_threshold: 20
  trigger:
  - entity_id:
    - binary_sensor.waterleak_wc_water_leak
    - binary_sensor.waterleak_bathroom_occupancy
    - binary_sensor.waterleak_entrance_water_leak
    to: 'on'
    id: water_leak_detected
    trigger: state
  - entity_id:
    - binary_sensor.waterleak_wc_tamper
    - binary_sensor.waterleak_entrance_tamper
    to: 'on'
    id: tamper_detected
    trigger: state
  - entity_id:
    - binary_sensor.smoke_detector_livingroom_smoke
    to: 'on'
    id: smoke_detected
    trigger: state
  - at: '10:00:00'
    id: daily_battery_check
    trigger: time
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: water_leak_detected
      sequence:
      - data:
          title: 'ALARM: WYCIEK WODY!'
          message: 'Krytyczny alert! Wykryto wyciek wody w pomieszczeniu: {{ area_name(trigger.entity_id)
            or trigger.to_state.name }}.'
          use_tts: true
          phone_pawel: true
          phone_magdalena: true
          use_pushbullet: true
        action: script.universal_notifier
    - conditions:
      - condition: trigger
        id: tamper_detected
      sequence:
      - data:
          title: 'UWAGA: Naruszenie czujnika!'
          message: 'Wykryto naruszenie obudowy (tamper) w czujniku: {{ trigger.to_state.name
            }}.'
          use_tts: false
          phone_pawel: true
          phone_magdalena: true
          use_pushbullet: true
        action: script.universal_notifier
    - conditions:
      - condition: trigger
        id: smoke_detected
      sequence:
      - data:
          title: ALARM POŻAROWY!
          message: 'Krytyczny alert! Wykryto dym w lokalizacji: {{ area_name(trigger.entity_id)
            or trigger.to_state.name }}! Gaśnica znajduje się w korytarzu przy toalecie
            na parterze. '
          use_tts: true
          phone_pawel: true
          phone_magdalena: true
          use_pushbullet: true
        action: script.universal_notifier
    - conditions:
      - condition: trigger
        id: daily_battery_check
      sequence:
      - variables:
          low_battery_entities: '{{ expand(battery_sensors) | selectattr(''state'',
            ''is_number'') | selectattr(''state'', ''int'', ''<='', battery_threshold)
            | list }}'
      - condition: template
        value_template: '{{ low_battery_entities | count > 0 }}'
      - data:
          title: Niski poziom baterii
          message: 'Wykryto niski poziom baterii w następujących czujnikach: {{ low_battery_entities
            | map(attribute=''name'') | join('', '') }}. Proszę o wymianę.'
          use_tts: false
          phone_pawel: true
          phone_magdalena: true
          use_pushbullet: true
        action: script.universal_notifier
- id: '1698225188104'
  alias: Notify - PM2.5 Living Room
  description: Notifies when the PM2.5 level in the living room exceeds the threshold.
  mode: single
  trigger:
  - entity_id: sensor.zhimi_mc1_1903_pm25_density_2
    above: 15
    trigger: numeric_state
  condition:
  - condition: or
    alias: Run only if someone is home
    conditions:
    - condition: state
      entity_id: sensor.tracker_pawel_extended
      state: home
    - condition: state
      entity_id: sensor.tracker_magda_extended
      state: home
  - condition: template
    alias: 'Throttle: only notify once per hour'
    value_template: '{{ now() > (state_attr(''automation.notify_pm2_5_living_room'',
      ''last_triggered'') or (now() - timedelta(hours=2))) + timedelta(hours=1) }}'
  action:
  - data:
      title: Wysoki poziom PM2.5
      message: 'Poziom PM2.5 w salonie jest podwyższony: {{ states(''sensor.zhimi_mc1_1903_pm25_density_2'')
        | round(1) }} µg/m³.'
      use_pushbullet: true
    action: script.universal_notifier
- id: '1704813118787'
  alias: Notify - Garbage Collect
  description: Automation that sends notifications about garbage collection.
  mode: single
  trigger:
  - at: '15:00:00'
    trigger: time
  - at: '20:00:00'
    trigger: time
  condition:
  - condition: or
    alias: Check if there is any collection tomorrow
    conditions:
    - condition: state
      entity_id: sensor.odpady_odpady_zmieszane
      attribute: days_until_collection
      state: 1
    - condition: state
      entity_id: sensor.odpady_papier
      attribute: days_until_collection
      state: 1
    - condition: state
      entity_id: sensor.odpady_metale_i_tworzywa_sztuczne
      attribute: days_until_collection
      state: 1
    - condition: state
      entity_id: sensor.odpady_szklo
      attribute: days_until_collection
      state: 1
    - condition: state
      entity_id: sensor.odpady_bioodpady
      attribute: days_until_collection
      state: 1
    - condition: state
      entity_id: sensor.odpady_drzewka_swiateczne
      attribute: days_until_collection
      state: 1
  action:
  - data:
      title: Przypomnienie o wywozie śmieci
      message: '{% set types_to_collect = [] %} {% if state_attr(''sensor.odpady_odpady_zmieszane'',
        ''days_until_collection'') == 1 %}{% set types_to_collect = types_to_collect
        + [''odpadów zmieszanych''] %}{% endif %} {% if state_attr(''sensor.odpady_papier'',
        ''days_until_collection'') == 1 %}{% set types_to_collect = types_to_collect
        + [''papieru''] %}{% endif %} {% if state_attr(''sensor.odpady_metale_i_tworzywa_sztuczne'',
        ''days_until_collection'') == 1 %}{% set types_to_collect = types_to_collect
        + [''metali i tworzyw''] %}{% endif %} {% if state_attr(''sensor.odpady_szklo'',
        ''days_until_collection'') == 1 %}{% set types_to_collect = types_to_collect
        + [''szkła''] %}{% endif %} {% if state_attr(''sensor.odpady_bioodpady'',
        ''days_until_collection'') == 1 %}{% set types_to_collect = types_to_collect
        + [''bioodpadów''] %}{% endif %} {% if state_attr(''sensor.odpady_drzewka_swiateczne'',
        ''days_until_collection'') == 1 %}{% set types_to_collect = types_to_collect
        + [''drzewek świątecznych''] %}{% endif %} Jutro wywóz: {{ types_to_collect
        | join('', '') }}.'
      use_tts: true
      use_pushbullet: false
      phone_pawel: true
      phone_magdalena: true
    action: script.universal_notifier
- id: '1705017192752'
  alias: Switch curtains handle with preemptive repair and delay
  description: Automatyzacja do sterowania roletami z naprawą niedostępnych urządzeń
    przed otwarciem/zamknięciem oraz opóźnieniem zamknięcia
  mode: single
  trigger:
  - event: sunrise
    trigger: sun
  - event: sunset
    offset: 00:20:00
    trigger: sun
  action:
  - variables:
      open_entities:
      - switch.curtains_piesek_open
      - switch.curtains_bedroom_open
      - switch.curtains_kitchen_open
      - switch.curtains_livingroom_open
      close_entities:
      - switch.curtains_piesek_close
      - switch.curtains_bedroom_close
      - switch.curtains_kitchen_close
      - switch.curtains_livingroom_close
    enabled: true
  - choose:
    - conditions:
      - condition: sun
        after: sunrise
        before: sunset
        enabled: true
      sequence:
      - wait_template: '{% set unavailable_ips = open_entities | selectattr(''state'',
          ''eq'',

          ''unavailable'') | map(attribute=''entity_id'') | map(''state_attr'',

          ''configuration_url'') | map(''regex_replace'', ''^http[s]?://([^/]+)/.*$'',

          ''\\1'') | list %}

          {{ true }}'
        continue_on_timeout: false
        timeout: 00:01:00
      - if:
        - condition: template
          value_template: '{{ unavailable_ips | length > 0 }}'
        then:
        - data_template:
            ip: '{{ unavailable_ips | join('', '') }}

              '
          action: rest_command.openbk_restart
          enabled: true
        - delay:
            seconds: 30
          enabled: true
      - target:
          entity_id: '{{ open_entities }}'
        action: switch.turn_on
      - condition: template
        value_template: '{{ unavailable_ips | length > 0 }}'
        enabled: true
      - action: script.universal_notifier
        metadata: {}
        data:
          title: Problem z roletami
          message: 'Niektóre rolety mogą być niedostępne: {{ unavailable_ips | join('',
            '') }}. Próba naprawy została wykonana.'
          use_tts: true
          phone_pawel: true
          use_pushbullet: false
    - conditions:
      - condition: sun
        after: sunset
      sequence:
      - delay:
          minutes: 20
        enabled: false
      - wait_template: '{% set unavailable_ips = close_entities | selectattr(''state'',
          ''eq'',

          ''unavailable'') | map(attribute=''entity_id'') | map(''state_attr'',

          ''configuration_url'') | map(''regex_replace'', ''^http[s]?://([^/]+)/.*$'',

          ''\\1'') | list %}

          {{ true }}'
        continue_on_timeout: false
        timeout: 00:01:00
      - if:
        - condition: template
          value_template: '{{ unavailable_ips | length > 0 }}'
        then:
        - data_template:
            ip: '{{ unavailable_ips | join('', '') }}

              '
          action: rest_command.openbk_restart
          enabled: true
        - delay:
            seconds: 30
          enabled: true
      - target:
          entity_id: '{{ close_entities }}'
        action: switch.turn_on
      - condition: template
        value_template: '{{ unavailable_ips | length > 0 }}'
      - action: script.universal_notifier
        metadata: {}
        data:
          title: Problem z roletami
          message: 'Niektóre rolety mogą być niedostępne: {{ unavailable_ips | join('',
            '') }}. Próba naprawy została wykonana.'
          use_tts: true
          phone_pawel: true
          use_pushbullet: false
