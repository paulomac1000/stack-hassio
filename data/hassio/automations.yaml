- id: '1728755914885'
  alias: Notify - Motion Livingroom Camera
  description: Aktualizuje helpery przy każdym wykryciu. Powiadamia TYLKO w trybie
    nieobecności.
  triggers:
  - id: folder_watcher
    event_type: folder_watcher
    event_data:
      event_type: created
      folder: /config/www/archive/camera_livingroom
    trigger: event
  - id: mqtt
    topic: yolov5/results
    trigger: mqtt
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: folder_watcher
      sequence:
      - variables:
          trigger_file_name: '{{ trigger.event.data.path.split(''/'')[-1] }}'
      - data:
          topic: yolov5/detect
          payload: '{"url": "http://192.168.0.101:8123/local/archive/camera_livingroom/{{trigger_file_name}}",
            "camera": "camera_livingroom"}'
        action: mqtt.publish
    - conditions:
      - condition: trigger
        id: mqtt
      - condition: template
        value_template: '{% set relevant_objects = [''person'', ''dog'', ''cat'']
          %} {% set detected_names = trigger.payload_json.get(''detections'', [])
          | map(attribute=''name'') %} {{ (relevant_objects | select(''in'', detected_names)
          | list) | count > 0 }}'
      - condition: template
        value_template: '{{ trigger.payload_json[''camera''] == ''camera_livingroom''
          }}'
      sequence:
      - variables:
          payload_file_name: '{{ trigger.payload_json[''url''].split(''/'')[-1] }}'
          detected_list: "{% set names_map = {'person': 'człowieka', 'dog': 'psa',
            'cat': 'kota'} %} {% set detected_objects = trigger.payload_json.get('detections',
            []) | map(attribute='name') | unique | list %} {% set translated_names
            = namespace(items=[]) %} {% for obj in detected_objects %}\n  {% if obj
            in names_map %}\n    {% set translated_names.items = translated_names.items
            + [names_map[obj]] %}\n  {% endif %}\n{% endfor %} {{ translated_names.items
            | join(', ') }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.last_snapshot_livingroom
        data:
          value: '{{ payload_file_name }}'
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.last_motion_time_livingroom
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      - action: input_number.increment
        target:
          entity_id: input_number.motion_count_livingroom
      - action: input_text.set_value
        target:
          entity_id: input_text.recent_snapshots_livingroom
        data:
          value: "{% set current = states('input_text.recent_snapshots_livingroom')
            %} {% if current in ['unknown', 'unavailable', ''] %}\n  {% set current_list
            = [] %}\n{% else %}\n  {% set current_list = current.split(',') | reject('eq',
            '') | list %}\n{% endif %} {% set new_list = ([payload_file_name] + current_list)[:6]
            %} {{ new_list | join(',') }}\n"
      - if:
        - condition: state
          entity_id: input_boolean.mode_long_absence_mode
          state: 'on'
        then:
        - data:
            title: 'ALARM: Wykryto ruch w salonie!'
            message: 'Podczas Twojej nieobecności wykryto: {{ detected_list }}.'
            image_path: /local/archive/camera_livingroom/{{ payload_file_name }}
            phone_pawel: true
            phone_magdalena: true
            use_pushbullet: true
          action: script.universal_notifier
  mode: single
- id: '1730913795271'
  alias: Purifier - LivingRoom - Automatic Control
  description: Controls purifier based on Air Quality, Windows, and Absence modes.
    Prioritizes shutting down on open windows or long absence. Handles Guest Sleep
    Mode (Silent) when lights are off.
  mode: restart
  trigger:
  - entity_id: sensor.zhimi_mc1_1903_pm25_density_2
    trigger: state
  - entity_id:
    - binary_sensor.contact_livingroom_contact
    - binary_sensor.contact_kitchen_contact
    trigger: state
  - entity_id:
    - input_boolean.mode_long_absence_mode
    - binary_sensor.guest_mode_condition_livingroom
    trigger: state
  - entity_id:
    - light.light_livingroom_1
    - light.light_livingroom_2
    trigger: state
  condition: []
  action:
  - alias: Calculate Logic Variables
    variables:
      current_pm25: '{{ states(''sensor.zhimi_mc1_1903_pm25_density_2'') | int(0)
        }}'
      is_window_open: "{{ is_state('binary_sensor.contact_livingroom_contact', 'on')
        or \n   is_state('binary_sensor.contact_kitchen_contact', 'on') }}"
      is_long_absence: '{{ is_state(''input_boolean.mode_long_absence_mode'', ''on'')
        }}'
      is_guest_mode: '{{ is_state(''binary_sensor.guest_mode_condition_livingroom'',
        ''on'') }}'
      are_lights_off: "{{ is_state('light.light_livingroom_1', 'off') and \n   is_state('light.light_livingroom_2',
        'off') }}"
      should_be_off: '{{ is_window_open or is_long_absence or current_pm25 < 15 }}'
      should_be_silent: '{{ not should_be_off and is_guest_mode and are_lights_off
        }}'
  - alias: Execute Purifier Logic
    choose:
    - conditions:
      - condition: template
        value_template: '{{ should_be_off }}'
      sequence:
      - alias: Turn Off Purifier
        target:
          entity_id: fan.zhimi_mc1_1903_air_purifier_2
        action: fan.turn_off
    - conditions:
      - condition: template
        value_template: '{{ should_be_silent }}'
      sequence:
      - alias: Turn On (Silent)
        target:
          entity_id: fan.zhimi_mc1_1903_air_purifier_2
        action: fan.turn_on
      - alias: Set Speed to Sleep
        target:
          entity_id: fan.zhimi_mc1_1903_air_purifier_2
        data:
          preset_mode: Sleep
        action: fan.set_preset_mode
    - conditions: []
      sequence:
      - alias: Turn On (Auto)
        target:
          entity_id: fan.zhimi_mc1_1903_air_purifier_2
        action: fan.turn_on
      - alias: Set Speed to Auto
        target:
          entity_id: fan.zhimi_mc1_1903_air_purifier_2
        data:
          preset_mode: Auto
        action: fan.set_preset_mode
- id: '1731946926388'
  alias: Notify - Energy Usage Report
  description: Generates energy reports (Weekly on Sundays, Monthly on 1st). Separates
    rich text notifications for phones and concise summaries for TTS.
  mode: single
  trigger:
  - id: auto_trigger
    trigger: time
    at: '23:59:00'
  - id: manual_test
    trigger: event
    event_type: call_service
    event_data:
      domain: automation
      service: trigger
      service_data:
        entity_id: automation.notify_energy_usage_report
  condition: []
  action:
  - alias: Calculate Context and TTS Logic
    variables:
      is_sunday: '{{ now().weekday() == 6 }}'
      is_last_day_of_month: '{{ (now() + timedelta(days=1)).day == 1 }}'
      is_manual: '{{ trigger.id == ''manual_test'' }}'
  - alias: Collect Monthly Data
    variables:
      monthly_data: "{% set ns = namespace(devices=[]) %} {% for state in states.sensor
        %}\n  {% if (state.entity_id.endswith('_energy_monthly') or state.entity_id.endswith('_monthly_consumption'))
        %}\n     {% if state.state | float(0) > 0.01 %}\n        {% set clean_name
        = state.name \n            | replace('_energy_monthly', '') \n            |
        replace('_monthly_consumption', '') \n            | replace(' energy monthly',
        '') \n            | replace(' Energy monthly', '')\n            | replace('_',
        ' ') \n            | trim | title %}\n        {% set item = {'name': clean_name,
        'consumption': state.state | float(0)} %}\n        {% set ns.devices = ns.devices
        + [item] %}\n     {% endif %}\n  {% endif %}\n{% endfor %} {{ ns.devices |
        sort(attribute='consumption', reverse=true) }}"
      monthly_total: '{{ monthly_data | map(attribute=''consumption'') | sum | round(2)
        }}'
      monthly_top_device: '{{ monthly_data[0].name if monthly_data else ''Brak'' }}'
  - alias: Collect Weekly Data
    variables:
      weekly_data: "{% set ns = namespace(devices=[]) %} {% for state in states.sensor
        %}\n  {% if state.entity_id.endswith('_energy_weekly') %}\n     {% if state.state
        | float(0) > 0.01 %}\n        {% set clean_name = state.name \n            |
        replace('_energy_weekly', '') \n            | replace(' energy weekly', '')
        \n            | replace(' Energy weekly', '')\n            | replace('_',
        ' ') \n            | trim | title %}\n        {% set item = {'name': clean_name,
        'consumption': state.state | float(0)} %}\n        {% set ns.devices = ns.devices
        + [item] %}\n     {% endif %}\n  {% endif %}\n{% endfor %} {{ ns.devices |
        sort(attribute='consumption', reverse=true) }}"
      weekly_total: '{{ weekly_data | map(attribute=''consumption'') | sum | round(2)
        }}'
      weekly_top_device: '{{ weekly_data[0].name if weekly_data else ''Brak'' }}'
  - alias: Choose Report Type
    choose:
    - conditions:
      - condition: template
        value_template: '{{ is_last_day_of_month or is_manual }}'
      sequence:
      - alias: Notify Mobile (Monthly)
        action: script.universal_notifier
        data:
          title: "Raport Energii \U0001F4C5"
          message: "**Podsumowanie miesiąca** \U0001F50C Razem: **{{ monthly_total
            }} kWh**\n\U0001F3C6 Top 10 urządzeń: {% for item in monthly_data[:10]
            -%} {{ loop.index }}. {{ item.name }}: {{ item.consumption | round(1)
            }} kWh {% endfor %} {% if monthly_data | count > 10 %}... i {{ (monthly_data
            | count) - 10 }} innych.{% endif %}"
          phone_pawel: true
          phone_magdalena: true
          use_tts: false
          use_pushbullet: true
      - alias: Notify TTS (Monthly)
        action: script.universal_notifier
        data:
          title: Raport
          message: 'Koniec miesiąca. Raport energetyczny gotowy. Całkowite zużycie
            to {{ monthly_total | int }} kilowatogodzin. Najwięcej prądu zużyło urządzenie:
            {{ monthly_top_device }}.'
          use_tts: true
          phone_pawel: false
          phone_magdalena: false
    - conditions:
      - condition: template
        value_template: '{{ is_sunday }}'
      sequence:
      - alias: Notify Mobile (Weekly)
        action: script.universal_notifier
        data:
          title: "Raport Energii \U0001F5D3️"
          message: "**Podsumowanie tygodnia** \U0001F50C Razem: **{{ weekly_total
            }} kWh**\n\U0001F3C6 Top 10 urządzeń: {% for item in weekly_data[:10]
            -%} {{ loop.index }}. {{ item.name }}: {{ item.consumption | round(1)
            }} kWh {% endfor %}"
          phone_pawel: true
          phone_magdalena: true
          use_tts: false
          use_pushbullet: true
      - alias: Notify TTS (Weekly)
        action: script.universal_notifier
        data:
          title: Raport
          message: 'Podsumowanie tygodnia. Zużycie energii wyniosło {{ weekly_total
            | int }} kilowatogodzin. Liderem zużycia jest: {{ weekly_top_device }}.'
          use_tts: true
          phone_pawel: false
          phone_magdalena: false
