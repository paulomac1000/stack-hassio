- id: '1705621646420'
  alias: Notify - HP Printer Maintenance
  description: Manages printer health. Updates usage timestamp. Detects events (Revival,
    Drying Risk, Ink Levels) and sends specific notifications without AI.
  mode: single
  trigger:
  - id: printing_started
    trigger: state
    entity_id: sensor.hp_deskjet_4510_series
    to: printing
  - id: daily_check
    trigger: time
    at: '16:00:00'
  condition: []
  action:
  - alias: Calculate variables and determine event type
    variables:
      current_ink: '{{ states(''sensor.hp_deskjet_4510_series_black_ink'') | int(0)
        }}'
      last_print_str: '{{ states(''input_datetime.hp_deskjet_2640_last_print'') }}'
      days_since: '{{ (now() - (last_print_str | as_datetime | as_local)).days }}'
      event_type: "{% if trigger.id == 'printing_started' and days_since >= 14 %}\n
        \ REVIVAL\n{% elif trigger.id == 'daily_check' and days_since >= 21 %}\n  DRYING_RISK\n{%
        elif trigger.id == 'daily_check' and current_ink < 10 %}\n  INK_CRITICAL\n{%
        elif trigger.id == 'daily_check' and current_ink < 25 and now().weekday()
        == 0 %}\n  INK_LOW\n{% else %}\n  NONE\n{% endif %}"
  - alias: Update Last Print helper (only if printing started)
    if:
    - condition: trigger
      id: printing_started
    then:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.hp_deskjet_2640_last_print
      data:
        datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
  - alias: Stop execution if no important event detected
    condition: template
    value_template: '{{ event_type != ''NONE'' }}'
  - alias: Handle Notifications based on Event Type
    choose:
    - conditions:
      - condition: template
        value_template: '{{ event_type == ''REVIVAL'' }}'
      sequence:
      - alias: Notify Mobile
        action: script.universal_notifier
        data:
          title: "\U0001F5A8️ Drukarka HP"
          message: "✅ Drukarka rozpoczęła pracę. ⏱ Przestój: {{ days_since }} dni.
            \U0001F527 Ryzyko zaschnięcia głowicy zostało oddalone."
          phone_pawel: true
          phone_magdalena: true
          use_tts: false
      - alias: Notify TTS
        action: script.universal_notifier
        data:
          title: Drukarka
          message: Drukarka ruszyła po {{ days_since }} dniach przerwy. System sprawny.
          use_tts: true
          phone_pawel: false
          phone_magdalena: false
    - conditions:
      - condition: template
        value_template: '{{ event_type == ''DRYING_RISK'' }}'
      sequence:
      - alias: Notify Mobile
        action: script.universal_notifier
        data:
          title: ⚠️ Ryzyko awarii drukarki
          message: "\U0001F6D1 Drukarka nie była używana od {{ days_since }} dni!
            \U0001F4C9 Dysze mogą zaschnąć. \U0001F449 Wydrukuj stronę testową, aby
            przeczyścić głowicę."
          phone_pawel: true
          phone_magdalena: true
          use_tts: false
      - alias: Notify TTS
        action: script.universal_notifier
        data:
          title: Awaria
          message: Uwaga, drukarka nie była używana od {{ days_since }} dni. Wydrukuj
            coś, aby uniknąć awarii.
          use_tts: true
          phone_pawel: false
          phone_magdalena: false
    - conditions:
      - condition: template
        value_template: '{{ event_type == ''INK_CRITICAL'' }}'
      sequence:
      - alias: Notify Mobile
        action: script.universal_notifier
        data:
          title: "\U0001F534 Krytyczny poziom tuszu"
          message: "\U0001F4C9 Poziom tuszu: {{ current_ink }}% ⚠️ Drukarka zaraz
            przestanie działać. \U0001F6D2 Koniecznie zamów tusz HP 301."
          phone_pawel: true
          phone_magdalena: true
          use_tts: false
      - alias: Notify TTS
        action: script.universal_notifier
        data:
          title: Tusz
          message: Poziom czarnego tuszu jest krytyczny. Zostało tylko {{ current_ink
            }} procent.
          use_tts: true
          phone_pawel: false
          phone_magdalena: false
    - conditions:
      - condition: template
        value_template: '{{ event_type == ''INK_LOW'' }}'
      sequence:
      - alias: Notify Mobile
        action: script.universal_notifier
        data:
          title: "\U0001F7E1 Niski poziom tuszu"
          message: "\U0001F4C9 Poziom tuszu: {{ current_ink }}% \U0001F4DD Warto dodać
            tusz HP 301 do listy zakupów."
          phone_pawel: true
          phone_magdalena: true
          use_tts: false
      - alias: Notify TTS
        action: script.universal_notifier
        data:
          title: Tusz
          message: Przypomnienie. Kończy się czarny tusz. Poziom wynosi {{ current_ink
            }} procent.
          use_tts: true
          phone_pawel: false
          phone_magdalena: false
