- id: '1764892547311'
  alias: Notify - WatchDog Tracker Localization Azure (Advanced)
  description: Detects if Azure leaves home. Analyzes owners' movement timestamp to
    distinguish between a walk and an escape.
  triggers:
  - entity_id: device_tracker.azure
    from: home
    to: not_home
    trigger: state
  actions:
  - alias: Calculate Context Variables
    variables:
      time_threshold: 600
      pawel_entity: sensor.tracker_pawel_extended
      magda_entity: sensor.tracker_magda_extended
      last_seen_entity: sensor.fnr_6atag72r_ostatnio_widziany
      pawel_state: '{{ states(pawel_entity) }}'
      magda_state: '{{ states(magda_entity) }}'
      pawel_time_diff: '{{ as_timestamp(now()) - as_timestamp(states[pawel_entity].last_changed,
        0) }}'
      magda_time_diff: '{{ as_timestamp(now()) - as_timestamp(states[magda_entity].last_changed,
        0) }}'
      pawel_just_left: '{{ pawel_state != ''W domu'' and pawel_time_diff < time_threshold
        }}'
      magda_just_left: '{{ magda_state != ''W domu'' and magda_time_diff < time_threshold
        }}'
      walker: "{% if pawel_just_left and magda_just_left %}\n  z Pawłem i Magdą\n{%
        elif pawel_just_left %}\n  z Pawłem\n{% elif magda_just_left %}\n  z Magdą\n{%
        else %}\n  sam\n{% endif %}\n"
      is_escape: '{{ walker == ''sam'' }}'
  - alias: Execute Notification Logic
    choose:
    - conditions:
      - condition: template
        value_template: '{{ is_escape }}'
      sequence:
      - alias: Notify Phones (Escape Details)
        data:
          title: "\U0001F6A8 ALARM: Azure uciekł!"
          message: 'Pies opuścił posesję, a nikt z domowników ostatnio nie wychodził!
            Ostatnio widziany: {{ states(last_seen_entity) }}.'
          use_tts: false
          use_awtrix: false
          phone_pawel: true
          phone_magdalena: true
        action: script.universal_notifier
      - alias: Announce via TTS
        data:
          title: TTS Warning
          message: Uwaga! Azure uciekł z posesji. Sprawdź monitoring.
          use_tts: true
          use_pushbullet: false
          phone_pawel: false
          phone_magdalena: false
          use_awtrix: false
        action: script.universal_notifier
      - alias: Display on Awtrix
        data:
          title: Awtrix Alert
          message: PIES ZWIAŁ
          use_tts: false
          use_pushbullet: false
          phone_pawel: false
          phone_magdalena: false
          use_awtrix: true
        action: script.universal_notifier
    - conditions:
      - condition: template
        value_template: '{{ not is_escape }}'
      sequence:
      - alias: Notify Phones (Walk Info)
        data:
          title: "\U0001F9AE Azure: Spacer {{ walker }}"
          message: 'Azure wyszedł na spacer. Opiekun: {{ walker }}. (Lokalizacja Pawła:
            {{ pawel_state }}, Magdy: {{ magda_state }})'
          use_tts: false
          use_pushbullet: false
          phone_pawel: true
          phone_magdalena: true
          use_awtrix: false
        action: script.universal_notifier
      - alias: Display on Awtrix
        data:
          title: Awtrix Status
          message: SPACER
          use_tts: false
          use_pushbullet: false
          phone_pawel: false
          phone_magdalena: false
          use_awtrix: true
        action: script.universal_notifier
