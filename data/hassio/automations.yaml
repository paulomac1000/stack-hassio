- id: '1739280240607'
  alias: Enhanced Smart Control - Bedroom Humidifier Logic
  description: Controls humidifier state and mode based on humidity, presence and
    water level.
  triggers:
  - entity_id: binary_sensor.contact_bedroom_contact
    trigger: state
  - entity_id: input_boolean.mode_long_absence_mode
    trigger: state
  - entity_id: binary_sensor.motion_sensor_bedroom_extended
    trigger: state
  - entity_id: sensor.temphum_piesek_humidity
    trigger: state
  - entity_id: input_select.bedroom_lighting_mode
    trigger: state
  - entity_id: sensor.zhimi_ca4_e6f6_water_level_2
    trigger: state
  actions:
  - choose:
    - conditions:
      - condition: or
        conditions:
        - condition: state
          entity_id: input_boolean.mode_long_absence_mode
          state: 'on'
        - condition: state
          entity_id: binary_sensor.contact_bedroom_contact
          state: 'on'
      sequence:
      - alias: Turn Off Device
        target:
          entity_id: humidifier.zhimi_ca4_e6f6_humidifier_2
        action: humidifier.turn_off
    - conditions:
      - condition: state
        entity_id: input_boolean.mode_long_absence_mode
        state: 'off'
      - condition: state
        entity_id: binary_sensor.contact_bedroom_contact
        state: 'off'
      sequence:
      - alias: Turn On Device
        target:
          entity_id: humidifier.zhimi_ca4_e6f6_humidifier_2
        action: humidifier.turn_on
      - alias: Determine Operation Mode
        choose:
        - conditions:
          - condition: numeric_state
            entity_id: sensor.zhimi_ca4_e6f6_water_level_2
            below: 15
          sequence:
          - alias: Low Water Protection Mode
            data:
              mode: Level1
            target:
              entity_id: humidifier.zhimi_ca4_e6f6_humidifier_2
            action: humidifier.set_mode
          - data:
              humidity: 45
            target:
              entity_id: humidifier.zhimi_ca4_e6f6_humidifier_2
            action: humidifier.set_humidity
        - conditions:
          - condition: state
            entity_id: input_select.bedroom_lighting_mode
            state: Sen
          sequence:
          - alias: Night Mode
            data:
              mode: Level1
            target:
              entity_id: humidifier.zhimi_ca4_e6f6_humidifier_2
            action: humidifier.set_mode
          - data:
              humidity: 50
            target:
              entity_id: humidifier.zhimi_ca4_e6f6_humidifier_2
            action: humidifier.set_humidity
        - conditions:
          - condition: state
            entity_id: binary_sensor.motion_sensor_bedroom_extended
            state: 'on'
          sequence:
          - alias: Occupied Room Mode
            data:
              mode: Auto
            target:
              entity_id: humidifier.zhimi_ca4_e6f6_humidifier_2
            action: humidifier.set_mode
          - data:
              humidity: 60
            target:
              entity_id: humidifier.zhimi_ca4_e6f6_humidifier_2
            action: humidifier.set_humidity
        - conditions:
          - condition: numeric_state
            entity_id: sensor.temphum_piesek_humidity
            below: 50
          sequence:
          - alias: Turbo Mode for Whole Floor
            data:
              mode: Level3
            target:
              entity_id: humidifier.zhimi_ca4_e6f6_humidifier_2
            action: humidifier.set_mode
          - data:
              humidity: 80
            target:
              entity_id: humidifier.zhimi_ca4_e6f6_humidifier_2
            action: humidifier.set_humidity
        default:
        - alias: Default Maintenance Mode
          data:
            mode: Auto
          target:
            entity_id: humidifier.zhimi_ca4_e6f6_humidifier_2
          action: humidifier.set_mode
        - data:
            humidity: 60
          target:
            entity_id: humidifier.zhimi_ca4_e6f6_humidifier_2
          action: humidifier.set_humidity
  mode: restart
- id: '1739281946329'
  alias: Notify - Lidlomix Monsterek
  description: Detects when the device finishes cooking based on power usage (active
    > 5 min, finish when drops for 15s).
  mode: single
  trigger:
  - entity_id:
    - sensor.socket_kitchen_monsterek_power
    above: 10
    for:
      hours: 0
      minutes: 8
      seconds: 0
    trigger: numeric_state
  condition: []
  action:
  - alias: Wait for cooking to finish (power drop)
    wait_for_trigger:
    - entity_id: sensor.socket_kitchen_monsterek_power
      below: 10
      for: 00:00:15
      trigger: numeric_state
    timeout: 00:01:00
    continue_on_timeout: false
  - alias: Calculate duration
    variables:
      start_time: '{{ as_timestamp(trigger.from_state.last_changed) }}'
      end_time: '{{ as_timestamp(now()) }}'
      cycle_seconds: '{{ (end_time - start_time) | int }}'
      cycle_minutes: '{{ (cycle_seconds // 60) }}'
      cycle_hours: '{{ (cycle_minutes // 60) }}'
      cycle_display: "{% if cycle_hours|int > 0 %}\n  {{ cycle_hours }}h {{ (cycle_minutes
        % 60) }}m\n{% else %}\n  {{ cycle_minutes }} min\n{% endif %}"
  - alias: TTS Notification
    action: script.universal_notifier
    data:
      title: Lidlomix
      message: Lidlomix zakończył gotowanie. Smacznego.
      use_tts: true
      phone_pawel: false
      phone_magdalena: false
      use_pushbullet: false
  - alias: Phone Notification
    action: script.universal_notifier
    data:
      title: Lidlomix Monsterek
      message: "\U0001F468‍\U0001F373 Lidlomix zakończył gotowanie. ⏱ Czas pracy:
        {{ cycle_display }} \U0001F958 Możesz nakładać!"
      use_tts: false
      phone_pawel: true
      phone_magdalena: true
      use_pushbullet: false
- id: boiler_thermostat_sync
  alias: Boiler Control & Thermostat Synchronization
  description: 'Maintains synchronization between the physical boiler controller (climate.wthermostat)  and
    the virtual UI control (input_number.thermostat_livingroom_virtual).

    Logic Overview: 1. Demand Sync: Maps binary_sensor.heating_demand to HVAC modes
    (ON -> heat, OFF -> off). 2. Bi-directional Temp Sync: Synchronizes temperature
    changes between physical and virtual entities. 3. Loop Protection: Uses a 0.1°C
    threshold to prevent circular updates between entities. 4. Auto-Mode Override:
    Forces the thermostat back to manual ''heat'' mode if physically set to ''auto''.
    5. Safety: Full state synchronization is performed on Home Assistant startup.

    Warning: Setting HVAC mode to ''off'' during no demand may disable boiler anti-freeze
    protection  depending on the physical controller''s firmware.

    '
  triggers:
  - alias: Heating demand state change
    id: heating_demand_change
    entity_id: binary_sensor.heating_demand
    trigger: state
  - alias: Physical thermostat mode set to auto
    id: thermostat_mode_change
    trigger: state
    entity_id: climate.wthermostat
    to: auto
  - alias: Physical temperature attribute change
    id: thermostat_temperature_change
    entity_id: climate.wthermostat
    attribute: temperature
    trigger: state
  - alias: Virtual slider value change
    id: slider_temperature_change
    entity_id: input_number.thermostat_livingroom_virtual
    trigger: state
  - alias: System startup
    id: homeassistant_start
    event: start
    trigger: homeassistant
  actions:
  - alias: Route actions based on trigger
    choose:
    - alias: Process heating demand change
      conditions:
      - condition: trigger
        id: heating_demand_change
      sequence:
      - alias: Log demand change
        action: system_log.write
        data:
          level: info
          logger: automation.boiler_sync
          message: Boiler demand changed to {{ states('binary_sensor.heating_demand')
            }}. Updating HVAC mode.
      - alias: Update HVAC mode
        target:
          entity_id: climate.wthermostat
        data:
          hvac_mode: '{{ ''heat'' if is_state(''binary_sensor.heating_demand'', ''on'')
            else ''off'' }}'
        action: climate.set_hvac_mode
    - alias: Process auto-mode override
      conditions:
      - condition: trigger
        id: thermostat_mode_change
      sequence:
      - alias: Log mode override
        action: system_log.write
        data:
          level: warning
          logger: automation.boiler_sync
          message: Physical thermostat set to AUTO. Overriding to manual sync mode.
      - alias: Force manual sync
        target:
          entity_id: climate.wthermostat
        data:
          hvac_mode: '{{ ''heat'' if is_state(''binary_sensor.heating_demand'', ''on'')
            else ''off'' }}'
          temperature: '{{ states(''input_number.thermostat_livingroom_virtual'')
            | float(21) }}'
        action: climate.set_temperature
    - alias: Process physical to virtual sync
      conditions:
      - condition: trigger
        id: thermostat_temperature_change
      - condition: not
        conditions:
        - condition: state
          entity_id: climate.wthermostat
          state: auto
      - alias: Check temperature delta to prevent loops
        condition: template
        value_template: "{{ (state_attr('climate.wthermostat', 'temperature') | float(0)
          - \n    states('input_number.thermostat_livingroom_virtual') | float(0))
          | abs > 0.1 }}\n"
      sequence:
      - alias: Update virtual slider
        target:
          entity_id: input_number.thermostat_livingroom_virtual
        data:
          value: '{{ state_attr(''climate.wthermostat'', ''temperature'') }}'
        action: input_number.set_value
    - alias: Process virtual to physical sync
      conditions:
      - condition: trigger
        id: slider_temperature_change
      sequence:
      - alias: Check temperature delta to prevent loops
        condition: template
        value_template: "{{ (states('input_number.thermostat_livingroom_virtual')
          | float(0) - \n    state_attr('climate.wthermostat', 'temperature') | float(0))
          | abs > 0.1 }}\n"
      - alias: Update physical thermostat
        target:
          entity_id: climate.wthermostat
        data:
          temperature: '{{ states(''input_number.thermostat_livingroom_virtual'')
            | float(21) }}'
        action: climate.set_temperature
    - alias: Process startup synchronization
      conditions:
      - condition: trigger
        id: homeassistant_start
      sequence:
      - alias: Log startup sync
        action: system_log.write
        data:
          level: info
          logger: automation.boiler_sync
          message: System startup. Performing full boiler synchronization.
      - alias: Full sync
        target:
          entity_id: climate.wthermostat
        data:
          hvac_mode: '{{ ''heat'' if is_state(''binary_sensor.heating_demand'', ''on'')
            else ''off'' }}'
          temperature: '{{ states(''input_number.thermostat_livingroom_virtual'')
            | float(21) }}'
        action: climate.set_temperature
  mode: restart
- id: '1744891484460'
  alias: Enhanced Smart Control - Bedroom Projector (simple)
  description: Automatyzacja do sterowania głośnikami i rzutnikiem na podstawie sygnału
    IR oraz ręcznego włączenia/wyłączenia projektora.
