- id: '1723584214058'
  alias: Enhanced Smart Control - Garden Pump (Auto-Off Failsafe & Error Handling)
  description: 'Handles scheduled watering. Logs: CRITICAL on failsafe, ERROR on hardware
    failure, WARNING on skipped cycle.

    '
  mode: restart
  trigger:
  - at: 09:00:00
    id: scheduled_start
    trigger: time
  - entity_id: switch.water_pump
    to: 'on'
    for:
      minutes: 20
    id: auto_off
    trigger: state
  - entity_id: switch.water_pump
    to: 'on'
    for:
      minutes: 30
    id: failsafe_off
    trigger: state
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: scheduled_start
      sequence:
      - variables:
          season_start: 5
          season_end: 9
          is_season: '{{ season_start <= now().month <= season_end }}'
      - if:
        - condition: template
          value_template: '{{ is_season }}'
        - condition: state
          entity_id: switch.water_pump
          state:
          - unavailable
          - unknown
        then:
        - action: system_log.write
          data:
            level: error
            message: 'Garden Pump: Start failed. Hardware switch is UNAVAILABLE.'
        - action: script.universal_notifier
          data:
            title: ⚠️ Awaria pompy ogrodowej
            message: Włącznik pompy jest niedostępny (unavailable). Sprawdź zasilanie
              urządzenia.
            phone_pawel: true
            use_tts: false
            use_pushbullet: true
        - stop: Hardware unavailable
        else:
        - if:
          - condition: template
            value_template: '{{ not is_season }}'
          - condition: state
            entity_id: switch.water_pump
            state:
            - unavailable
            - unknown
          then:
          - action: system_log.write
            data:
              level: info
              message: 'Garden Pump: Pompa offline poza sezonem ({{ now().month }})
                – ignoruję.'
          - stop: Off-season, pump offline
      - variables:
          temp: '{% set ws = states(''sensor.ws2900_v2_02_02_outdoor_temperature'')|float(-100)
            %} {% set owm = states(''sensor.openweathermap_temperature'')|float(-100)
            %} {% set acc = state_attr(''weather.dom'', ''temperature'')|float(-100)
            %} {{ ws if ws > -50 else (owm if owm > -50 else acc) }}'
          humidity: '{% set ws = states(''sensor.ws2900_v2_02_02_humidity'')|float(-1)
            %} {% set owm = states(''sensor.openweathermap_humidity'')|float(-1) %}
            {% set acc = state_attr(''weather.dom'', ''humidity'')|float(-1) %} {{
            ws if ws >= 0 else (owm if owm >= 0 else acc) }}'
          rain_recent: '{% set ws_hour = states(''sensor.ws2900_v2_02_02_hourly_rain_rate'')|float(-1)
            %} {% set owm_rain = states(''sensor.openweathermap_rain'')|float(-1)
            %} {% set kind = states(''sensor.openweathermap_precipitation_kind'')
            %} {% set is_raining = kind in [''Rain'', ''Snow'', ''Thunderstorm'']
            %} {% if is_raining %}99.9{% elif ws_hour >= 0 %}{{ ws_hour }}{% elif
            owm_rain >= 0 %}{{ owm_rain }}{% else %}0.0{% endif %}'
          rain_today: '{% set ws_day = states(''sensor.ws2900_v2_02_02_daily_rain_rate'')|float(-1)
            %} {% set acc_pred = state_attr(''weather.dom'', ''forecast'')[0].precipitation
            if state_attr(''weather.dom'', ''forecast'') else 0 %} {{ ws_day if ws_day
            >= 0 else acc_pred|float(0) }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ is_season }}'
          - condition: template
            value_template: '{{ temp|float > 5 }}'
          - condition: template
            value_template: '{{ humidity|float < 85 }}'
          - condition: template
            value_template: '{{ rain_recent|float < 0.5 }}'
          - condition: template
            value_template: '{{ rain_today|float < 2 }}'
          sequence:
          - action: system_log.write
            data:
              level: info
              message: 'Garden Pump: STARTED. Temp: {{ temp }}C, Hum: {{ humidity
                }}%, RainToday: {{ rain_today }}mm.'
          - target:
              entity_id: switch.water_pump
            action: switch.turn_on
            continue_on_error: true
          - action: script.universal_notifier
            data:
              title: Pompa ogrodowa
              message: Pompa została uruchomiona automatycznie.
              phone_pawel: true
              use_tts: true
              use_pushbullet: true
        default:
        - if:
          - condition: template
            value_template: '{{ is_season }}'
          then:
          - action: system_log.write
            data:
              level: warning
              message: 'Garden Pump: SKIPPED. Conditions: Temp={{ temp }}C, Hum={{
                humidity }}%, RainKind={{ states(''sensor.openweathermap_precipitation_kind'')
                }}, RainToday={{ rain_today }}mm.'
          - action: script.universal_notifier
            data:
              title: Pompa ogrodowa - brak startu
              message: 'Pompa NIE ruszyła, bo: {% if temp|float <= 5 %} - jest za
                zimno ({{ temp }}°C){% endif %} {% if humidity|float >= 85 %} - jest
                zbyt wilgotno ({{ humidity }}%){% endif %} {% if rain_recent|float
                >= 0.5 %} - pada deszcz{% endif %} {% if rain_today|float >= 2 %}
                - gleba jest mokra ({{ rain_today }}mm){% endif %}'
              use_tts: true
              phone_pawel: true
              use_pushbullet: false
          else:
          - action: system_log.write
            data:
              level: info
              message: 'Garden Pump: Poza sezonem ({{ now().month }}) – brak startu.'
    - conditions:
      - condition: trigger
        id:
        - auto_off
        - failsafe_off
      sequence:
      - target:
          entity_id: switch.water_pump
        action: switch.turn_off
        continue_on_error: true
      - choose:
        - conditions:
          - condition: trigger
            id: auto_off
          sequence:
          - action: system_log.write
            data:
              level: info
              message: 'Garden Pump: Normal auto-off (20 min).'
          - action: script.universal_notifier
            data:
              title: Pompa ogrodowa
              message: Pompa została wyłączona po cyklu (20 min).
              use_tts: true
              phone_pawel: true
              use_pushbullet: false
        - conditions:
          - condition: trigger
            id: failsafe_off
          sequence:
          - action: system_log.write
            data:
              level: critical
              message: 'Garden Pump: CRITICAL FAILSAFE! Pump ran > 30 mins.'
          - action: script.universal_notifier
            data:
              title: ⚠️ Pompa ogrodowa - ZABEZPIECZENIE
              message: UWAGA! Pompa pracowała ponad 30 minut. Wymuszone wyłączenie
                awaryjne.
              use_tts: true
              phone_pawel: true
              use_pushbullet: true
