- id: '1765571468851'
  alias: Notify - Energy Price Alerts (Cache-Based)
  description: Sends notifications using cached AI content. Only generates NEW AI
    for tactical updates. Strategic notifications (13:15, 21:05) use cache from Dashboard
    automation.
  mode: single
  trigger:
  - id: strategic_plan
    trigger: time
    at: '13:20:00'
  - id: strategic_plan_reminder
    trigger: time
    at: '21:05:00'
  - id: tactical_update
    trigger: time
    at: 09:15:00
  condition: []
  action:
  - alias: Global Settings
    variables:
      thresh_super: 0.75
      thresh_high: 1.05
      is_tts_allowed: '{{ 9 <= now().hour < 23 and states(''input_select.bedroom_lighting_mode'')
        != ''Sen'' and  is_state(''binary_sensor.device_bedroom_projector'', ''off'')
        and  not is_state(''media_player.chromecast'', ''playing'') and  not is_state(''media_player.projector'',
        ''playing'') and  not is_state(''media_player.l018_5176'', ''playing'') }}'
  - choose:
    - conditions:
      - condition: trigger
        id:
        - strategic_plan
        - strategic_plan_reminder
      - condition: template
        value_template: "{{ states('sensor.energy_dashboard_cache') == 'success' and\n
          \  state_attr('sensor.energy_dashboard_cache', 'data_age_hours') | float(999)
          < 12 }}"
      sequence:
      - alias: Use Cached Data for Strategic Notifications
        variables:
          cache_today: '{{ state_attr(''sensor.energy_dashboard_cache'', ''summary_today'')
            }}'
          cache_night: '{{ state_attr(''sensor.energy_dashboard_cache'', ''summary_night'')
            }}'
          cache_tomorrow: '{{ state_attr(''sensor.energy_dashboard_cache'', ''summary_tomorrow'')
            }}'
          msg_tts: "{% if trigger.id == 'strategic_plan' %}\n  Nowe ceny energii na
            jutro. {{ cache_tomorrow.split('\U0001F4A1')[0] | replace('\U0001F4C9',
            '') | replace('\U0001F610', '') | replace('\U0001F534', '') | replace('**',
            '') | trim }}\n{% else %}\n  Przypomnienie o cenach jutro. {{ cache_tomorrow.split('\U0001F4A1')[1]
            if '\U0001F4A1' in cache_tomorrow else 'Sprawdź dashboard' }}\n{% endif
            %}"
          msg_pawel: "\U0001F4CA Analiza Rynku ({{ now().strftime('%H:%M') }})\n\n{{
            cache_tomorrow }}\n"
          msg_magda: "\U0001F3E0 Planer Domowy\n\n{% if 'Super Okazje' in cache_tomorrow
            %}\n  Jutro są tanie godziny - sprawdź dashboard i zaplanuj pranie/zmywarkę.\n{%
            elif 'Szczyt' in cache_tomorrow %}\n  Jutro drogie godziny wieczorem -
            gotuj wcześniej lub później.\n{% else %}\n  Jutro ceny standardowe - działaj
            normalnie.\n{% endif %}\n"
      - alias: Play TTS (Strategic)
        if:
        - condition: template
          value_template: '{{ is_tts_allowed and trigger.id == ''strategic_plan''
            }}'
        then:
        - action: script.universal_notifier
          data:
            message: '{{ msg_tts }}'
            title: Strategia Jutro ⚡
            use_tts: true
            phone_pawel: false
            phone_magdalena: false
      - alias: Notify Phones (Strategic)
        if:
        - condition: trigger
          id: strategic_plan
        then:
        - action: script.universal_notifier
          data:
            message: '{{ msg_pawel }}'
            title: "Analiza Rynku \U0001F4CA"
            phone_pawel: true
            phone_magdalena: false
            use_tts: false
        - action: script.universal_notifier
          data:
            message: '{{ msg_magda }}'
            title: "Planer Domowy \U0001F3E0"
            phone_pawel: false
            phone_magdalena: true
            use_tts: false
    - conditions:
      - condition: trigger
        id: tactical_update
      - condition: template
        value_template: '{{ state_attr(''sensor.pstryk_buy_price'', ''prices_today'')
          is not none }}'
      sequence:
      - alias: Calculate Tactical Metrics (Today Only)
        variables:
          pstryk_today: '{{ state_attr(''sensor.pstryk_buy_price'', ''prices_today'')
            or [] }}'
          current_hour: '{{ now().hour }}'
          remaining_prices: "{% set ns = namespace(items=[]) %}  {% for item in pstryk_today
            %}\n  {% set h = (item.time | as_timestamp | timestamp_custom('%H')) |
            int %}\n  {% if h >= current_hour %}\n    {% set ns.items = ns.items +
            [{'h': h, 'p': item.price}] %}\n  {% endif %}\n{% endfor %}  {{ ns.items
            }}\n"
          today_super: '{{ remaining_prices | selectattr(''p'', ''<'', thresh_super)
            | map(attribute=''h'') | list }}'
          today_peak: '{{ remaining_prices | selectattr(''p'', ''>'', thresh_high)
            | map(attribute=''h'') | list }}'
          today_normal: '{{ remaining_prices | selectattr(''p'', ''<'', thresh_high)
            | selectattr(''p'', ''>='', thresh_super) | map(attribute=''h'') | list
            }}'
          msg_tts: "{% if today_super | count > 0 %}\n  Dziś po południu tanio, korzystaj
            po {{ today_super | min }}:00.\n{% elif today_peak | count > 0 and today_peak
            | select('>=', 16) | list | count > 0 %}\n  Uwaga na wysokie ceny wieczorem.\n{%
            else %}\n  Dziś ceny stabilne.\n{% endif %}"
          msg_pawel: "\U0001F4C9 Status Dnia ({{ now().strftime('%H:%M') }})\n\nStatus:
            {% if today_super | count > 0 %}SUPER OKAZJA{% elif today_peak | count
            > 0 %}DROGO{% else %}STABILNIE{% endif %}\nNajlepsze okno: {% if today_super
            | count > 0 %}{{ today_super | min }}:00 - {{ (today_super | max) + 1
            }}:00{% else %}Teraz{% endif %}\nOstrzeżenie: {% if today_peak | count
            > 0 %}Szczyt {{ today_peak | min }}:00 - {{ (today_peak | max) + 1 }}:00{%
            else %}Brak{% endif %}\n"
          msg_magda: 'Pranie: {% if today_super | count > 0 %}Czekaj na {{ today_super
            | min }}:00{% else %}Dowolnie{% endif %}

            '
      - alias: Play TTS (Tactical)
        if:
        - condition: template
          value_template: '{{ is_tts_allowed }}'
        then:
        - action: script.universal_notifier
          data:
            message: '{{ msg_tts }}'
            title: Update Cen ⚡
            use_tts: true
            phone_pawel: false
            phone_magdalena: false
      - alias: Notify Phones (Tactical)
        action: script.universal_notifier
        data:
          message: '{{ msg_pawel }}'
          title: "Status Dnia \U0001F4C9"
          phone_pawel: true
          phone_magdalena: true
          use_tts: false
- id: '1765805788541'
  alias: Dashboard - Energy Daily Update (AI Generator)
  description: Generates AI content ONCE per day at 13:15 when tomorrow's data appears.
    Validates data before calling AI. Cache is used by other automations.
  mode: single
  trigger:
  - id: strategic_plan
    trigger: time
    at: '13:15:00'
  - id: pstryk_data_fixed
    trigger: template
    value_template: '{% set prices = state_attr(''sensor.pstryk_buy_price'', ''prices_tomorrow'')
      or [] %} {% set price_list = prices | map(attribute=''price'') | list %} {%
      set data_valid = prices | count >= 20 and price_list | unique | list != [0.0]
      %} {% set cache_age = state_attr(''sensor.energy_dashboard_cache'', ''data_age_hours'')
      | float(999) %} {{ data_valid and cache_age > 12 }}'
  - id: manual
    trigger: event
    event_type: call_service
    event_data:
      domain: automation
      service: trigger
      service_data:
        entity_id: automation.dashboard_energy_daily_update_ai_generator
  condition:
  - condition: or
    conditions:
    - condition: trigger
      id: manual
    - condition: and
      conditions:
      - condition: template
        value_template: '{% set prices = state_attr(''sensor.pstryk_buy_price'', ''prices_tomorrow'')
          or [] %} {% set price_list = prices | map(attribute=''price'') | list %}
          {{ prices | count >= 20 and price_list | unique | list != [0.0] }}'
  action:
  - if:
    - condition: trigger
      id: pstryk_data_fixed
    then:
    - delay:
        minutes: 2
  - alias: Calculate Metrics
    variables:
      thresh_super: 0.75
      thresh_high: 1.05
      pstryk_today: '{{ state_attr(''sensor.pstryk_buy_price'', ''prices_today'')
        or [] }}'
      pstryk_tomorrow_raw: '{{ state_attr(''sensor.pstryk_buy_price'', ''prices_tomorrow'')
        or [] }}'
      pstryk_tomorrow: "{% set ns = namespace(seen=[], result=[]) %}  {% for item
        in pstryk_tomorrow_raw %}\n  {% set hour = (item.time | as_timestamp | timestamp_custom('%H'))
        %}\n  {% if hour not in ns.seen %}\n    {% set ns.seen = ns.seen + [hour]
        %}\n    {% set ns.result = ns.result + [item] %}\n  {% endif %}\n{% endfor
        %}  {{ ns.result }}\n"
      tomorrow_prices_list: '{{ pstryk_tomorrow | map(attribute=''price'') | list
        }}'
      tomorrow_all_zero: '{{ pstryk_tomorrow | count > 0 and tomorrow_prices_list
        | unique | list == [0.0] }}

        '
      tomorrow_data_valid: '{{ pstryk_tomorrow | count >= 20 and not tomorrow_all_zero
        }}

        '
      current_hour: '{{ now().hour }}'
      today_prices: "{% set ns = namespace(items=[]) %} \n{% for item in pstryk_today
        %}\n  {% set h = (item.time | as_timestamp | timestamp_custom('%H')) | int
        %}\n  {% if h >= current_hour | int %}\n    {% set ns.items = ns.items + [{'h':
        h, 'p': item.price}] %}\n  {% endif %}\n{% endfor %} \n{{ ns.items }}\n"
      today_super: '{{ today_prices | selectattr(''p'', ''<'', thresh_super) | map(attribute=''h'')
        | list }}'
      today_normal: '{{ today_prices | selectattr(''p'', ''<'', thresh_high) | selectattr(''p'',
        ''>='', thresh_super) | map(attribute=''h'') | list }}'
      night_prices: "{% set ns = namespace(items=[]) %} \n{% if tomorrow_data_valid
        %}\n  {% for item in pstryk_tomorrow %}\n    {% set h = (item.time | as_timestamp
        | timestamp_custom('%H')) | int %}\n    {% if h < 6 %}\n      {% set ns.items
        = ns.items + [item.price] %}\n    {% endif %}\n  {% endfor %}\n{% endif %}\n{{
        ns.items }}\n"
      night_super_count: '{{ night_prices | select(''<'', thresh_super) | list | count
        }}'
      night_normal_count: '{{ night_prices | select(''<'', thresh_high) | list | count
        }}'
      is_night_full: '{{ night_normal_count >= 5 }}'
      night_best_hours: "{% if not tomorrow_data_valid %}\n  Brak danych\n{% elif
        not is_night_full %}\n  {% set ns = namespace(hs=[]) %}\n  {% for item in
        pstryk_tomorrow %}\n    {% set h = (item.time | as_timestamp | timestamp_custom('%H'))
        | int %}\n    {% if h < 6 and item.price < thresh_high %}\n      {% set ns.hs
        = ns.hs + [h ~ ':00'] %}\n    {% endif %}\n  {% endfor %}\n  {{ ns.hs | join(',
        ') }}\n{% else %}\n  00:00 - 06:00\n{% endif %}\n"
      day_prices: "{% set ns = namespace(items=[]) %} \n{% if tomorrow_data_valid
        %}\n  {% for item in pstryk_tomorrow %}\n    {% set h = (item.time | as_timestamp
        | timestamp_custom('%H')) | int %}\n    {% if h >= 6 %}\n      {% set ns.items
        = ns.items + [{'h': h, 'p': item.price}] %}\n    {% endif %}\n  {% endfor
        %}\n{% endif %}\n{{ ns.items }}\n"
      day_super: '{{ day_prices | selectattr(''p'', ''<'', thresh_super) | map(attribute=''h'')
        | list }}'
      day_normal: '{{ day_prices | selectattr(''p'', ''<'', thresh_high) | selectattr(''p'',
        ''>='', thresh_super) | map(attribute=''h'') | list }}'
      day_peak: '{{ day_prices | selectattr(''p'', ''>'', thresh_high) | map(attribute=''h'')
        | list }}'
  - alias: Generate Content via AI
    continue_on_error: true
    action: conversation.process
    data:
      text: "Jesteś redaktorem komunikatów dashboardu automatyki domowej. Tworzysz
        asystenta cen energii elektrycznej dla użytkownika końcowego. Twoim celem
        jest pisanie naturalnym, ludzkim językiem, bez konkretnych wartości cen, ale
        zachowując precyzję danych.\n--- DANE ANALITYCZNE (w PLN/kWh) --- \n1. DZIŚ
        (Reszta dnia):\n   - Super Okazje (<{{ thresh_super }} zł): {{ today_super
        }}.\n   - Ceny Standardowe ({{ thresh_super }}-{{ thresh_high }} zł): {{ today_normal
        }}.\n\n2. NOC (Jutro 00-06):\n   - Czy cała noc jest tania/w normie? {{ is_night_full
        }}.\n   - Najlepsze godziny: {{ night_best_hours }}.\n\n3. JUTRO DZIEŃ (06-23):\n
        \  - Super Okazje (<{{ thresh_super }} zł): {{ day_super }}.\n   - Ceny Standardowe
        ({{ thresh_super }}-{{ thresh_high }} zł): {{ day_normal }}.\n   - Szczyt
        (>{{ thresh_high }} zł): {{ day_peak }}.\n\n--- INSTRUKCJA ---  1. **Przedziały:**
        Łącz godziny (np. [13, 14] -> \"13:00 - 15:00\"). \n   Jeśli brak danych na
        jutro (tomorrow_data_valid = {{ tomorrow_data_valid }}), napisz \"Dane na
        jutro będą dostępne po 13:15\". \n2. **Styl DZIŚ:**\n   - Jeśli są Super ->
        \"Wieczór bardzo tani.\"\n   - Jeśli Standard -> \"Wieczór w cenach standardowych.\"\n\n3.
        **Styl NOC:**\n   - \"Cała noc (00:00 - 06:00) jest tania/w normie.\" (jeśli
        full).\n\n4. **Styl JUTRO (Etykiety):**\n   - Jeśli `day_super` (niepuste)
        -> \"\U0001F4C9 **Super Okazje:**\".\n   - Jeśli brak Super, ale jest `day_normal`
        -> \"\U0001F610 **Standard:**\".\n   - Jeśli tylko Szczyt -> \"\U0001F534
        **Tylko Szczyt:**\".\n   - **WERDYKT:**\n     - Jeśli Noc tania, a Dzień Standard
        -> \"Dzień przeciętny. Dla oszczędności wybierz noc.\"\n     - Jeśli w Dzień
        są Super Okazje -> \"Korzystaj w dzień.\"\n\nFORMAT ODPOWIEDZI:  ###DZIS###
        [Zdanie]  ###NOC### [Zdanie]  ###JUTRO### [Etykieta] [Przedziały]  \U0001F534
        **Szczyt:** [Przedziały lub \"Brak\"]  \U0001F4A1 **Werdykt:** [Strategia]\n"
      agent_id: conversation.google_ai_conversation
    response_variable: ai_response
  - alias: Parse and Save to Cache
    choose:
    - conditions:
      - condition: template
        value_template: '{{ ai_response is defined and ''###DZIS###'' in ai_response.response.speech.plain.speech
          }}'
      sequence:
      - event: update_energy_dashboard_daily
        event_data:
          status: success
          summary_today: '{{ ai_response.response.speech.plain.speech.split(''###NOC###'')[0]
            | replace(''###DZIS###'', '''') | trim }}'
          summary_night: '{{ ai_response.response.speech.plain.speech.split(''###NOC###'')[1].split(''###JUTRO###'')[0]
            | trim }}'
          summary_tomorrow: '{{ ai_response.response.speech.plain.speech.split(''###JUTRO###'')[1]
            | trim }}'
    default:
    - event: update_energy_dashboard_daily
      event_data:
        status: error_source
        summary_today: Brak danych źródłowych Pstryk.
        summary_night: '-'
        summary_tomorrow: Dane niedostępne.
- id: '1765892100435'
  alias: Dashboard - Weather Daily Update (3-Stage)
  description: 'Fetches weather data (Daily & Hourly). Calculates trends (Today vs
    Tomorrow). Generates 3 markdown sections: Today, Night, Tomorrow. Includes logic
    for Smog context but excludes River levels.'
  mode: single
  trigger:
  - id: schedule
    trigger: time
    at:
    - 07:00:00
    - '14:00:00'
    - '21:00:00'
  - id: startup
    trigger: homeassistant
    event: start
  - id: manual
    trigger: event
    event_type: call_service
    event_data:
      domain: automation
      service: trigger
      service_data:
        entity_id: automation.dashboard_weather_daily_update
  condition: []
  action:
  - alias: Fetch Forecasts
    action: weather.get_forecasts
    target:
      entity_id: weather.dom
    data:
      type: daily
    response_variable: daily_data
  - alias: Calculate Metrics
    variables:
      f_today: '{{ daily_data[''weather.dom''].forecast[0] }}'
      f_tmrw: '{{ daily_data[''weather.dom''].forecast[1] }}'
      current_temp: '{{ state_attr(''weather.dom'', ''temperature'') }}'
      current_cond: '{{ states(''weather.dom'') }}'
      pm25: '{{ states(''sensor.dom_pm2_5'') | int(0) }}'
      is_smog: '{{ pm25 > 25 }}'
      temp_diff_max: '{{ (f_tmrw.temperature - f_today.temperature) | round(1) }}'
      temp_diff_min: '{{ (f_tmrw.templow - f_today.templow) | round(1) }}'
      trend_desc: '{% if temp_diff_max > 2 %} Jutro cieplej o {{ temp_diff_max }}°C.
        {% elif temp_diff_max < -2 %} Jutro ochłodzenie o {{ temp_diff_max | abs }}°C.
        {% else %} Temperatura stabilna. {% endif %}'
      rain_desc: '{% if f_tmrw.precipitation > 0 and f_today.precipitation == 0 %}
        Jutro pojawi się deszcz. {% elif f_tmrw.precipitation == 0 and f_today.precipitation
        > 0 %} Jutro wypogodzenie (bez deszczu). {% else %} Bez dużych zmian w opadach.
        {% endif %}'
  - alias: Generate Content via AI
    continue_on_error: true
    action: conversation.process
    data:
      text: 'Jesteś osobistym meteorologiem dashboardu automatyki domowej aystenta
        pogody. Formatowanie: Czysty Markdown (bez bloków kodu).

        DANE: 1. DZIŚ: {{ current_cond }}, Teraz {{ current_temp }}°C. Max {{ f_today.temperature
        }}°C, Min {{ f_today.templow }}°C. 2. JUTRO: {{ f_tmrw.condition }}, Max {{
        f_tmrw.temperature }}°C, Min {{ f_tmrw.templow }}°C. 3. TREND (Porównanie):
        {{ trend_desc }} {{ rain_desc }} 4. SMOG (PM2.5): {{ pm25 }} (Jeśli > 25 to
        źle).

        INSTRUKCJA (Użyj separatorów):

        ###DZIS### [Opisz dzisiejszą pogodę. Jeśli jest smog - ostrzeż. komunikatem
        ale bez podawania wartości liczbowej]

        ###NOC### [Krótko o nocy: Temperatura i czy otwierać okna (zależnie od smogu
        i zimna).]

        ###JUTRO### [Prognoza na jutro ze szczególnym naciskiem na ZMIANĘ względem
        dzisiaj. Np. "Jutro znacznie chłodniej". Użyj emotikon.]'
      agent_id: conversation.google_ai_conversation
    response_variable: ai_response
  - alias: Validate and Save
    choose:
    - conditions:
      - condition: template
        value_template: '{{ ai_response is defined and ''###JUTRO###'' in ai_response.response.speech.plain.speech
          }}'
      sequence:
      - event: update_weather_dashboard_data
        event_data:
          status: success
          text_today: '{{ ai_response.response.speech.plain.speech.split(''###NOC###'')[0]
            | replace(''###DZIS###'', '''') | trim }}'
          text_night: '{{ ai_response.response.speech.plain.speech.split(''###NOC###'')[1].split(''###JUTRO###'')[0]
            | trim }}'
          text_tomorrow: '{{ ai_response.response.speech.plain.speech.split(''###JUTRO###'')[1]
            | trim }}'
    - conditions: []
      sequence:
      - event: update_weather_dashboard_data
        event_data:
          status: error
          text_today: Brak danych pogodowych.
          text_night: '-'
          text_tomorrow: Sprawdź integrację.
- id: '1766778013819'
  alias: Light - Corridor
  description: ''
  use_blueprint:
    path: homeassistant/motion_light.yaml
    input:
      motion_entity: binary_sensor.motion_sensor_corridor_occupancy
      light_target:
        entity_id: light.light_corridor_2
- id: '1767306026910'
  alias: Notify - Weekly Screen Time Report
  description: Sends weekly usage report for all devices to Pawel and Magda
  triggers:
  - at: '20:00:00'
    trigger: time
  - event: start
    trigger: homeassistant
  conditions:
  - condition: time
    weekday:
    - sun
  actions:
  - variables:
      last_week_start_obj: '{{ (now() - timedelta(days=7)).replace(hour=0, minute=0,
        second=0, microsecond=0) - timedelta(days=now().weekday()) }}'
      last_week_end_obj: '{{ now().replace(hour=0, minute=0, second=0, microsecond=0)
        - timedelta(days=now().weekday()) }}'
      date_range: '{{ last_week_start_obj.strftime(''%d.%m'') }} - {{ (last_week_end_obj
        - timedelta(days=1)).strftime(''%d.%m.%Y'') }}'
      tv_time: '{{ states(''sensor.tv_last_week_usage'') | float(0) }}'
      projector_time: '{{ states(''sensor.projector_last_week_usage'') | float(0)
        }}'
      pc_time: '{{ states(''sensor.pc_last_week_usage'') | float(0) }}'
      laptop_time: '{{ states(''sensor.laptop_last_week_usage'') | float(0) }}'
      total_time: '{{ (tv_time + projector_time + pc_time + laptop_time) | round(1)
        }}'
      tv_hours: '{{ (tv_time | int) }}'
      tv_minutes: '{{ ((tv_time % 1) * 60) | int }}'
      projector_hours: '{{ (projector_time | int) }}'
      projector_minutes: '{{ ((projector_time % 1) * 60) | int }}'
      pc_hours: '{{ (pc_time | int) }}'
      pc_minutes: '{{ ((pc_time % 1) * 60) | int }}'
      laptop_hours: '{{ (laptop_time | int) }}'
      laptop_minutes: '{{ ((laptop_time % 1) * 60) | int }}'
      total_hours: '{{ (total_time | int) }}'
      total_minutes: '{{ ((total_time % 1) * 60) | int }}'
      report_message: "Tydzień {{ date_range }}  \U0001F4FA Telewizor: {{ tv_hours
        }}h {{ tv_minutes }}min  \U0001F3AC Projektor: {{ projector_hours }}h {{ projector_minutes
        }}min  \U0001F4BB PC (Piesek): {{ pc_hours }}h {{ pc_minutes }}min  \U0001F4BC
        Laptop (Office): {{ laptop_hours }}h {{ laptop_minutes }}min  ⏱️ Łącznie:
        {{ total_hours }}h {{ total_minutes }}min\n"
  - data:
      title: "\U0001F4CA Raport Tygodniowy - Screen Time"
      message: '{{ report_message }}'
      phone_pawel: true
      phone_magdalena: true
      use_tts: false
      use_pushbullet: false
      use_awtrix: false
    action: script.universal_notifier
  mode: single
- id: '1767318218317'
  alias: Smart Vacuum Upstairs - Intelligent Scheduling
  description: 'Scoring-based upstairs vacuum. Max once daily. v3: Fixed empty_minutes,
    smart PC/laptop, unavailable protection.

    '
  triggers:
  - trigger: time_pattern
    minutes: /10
  - trigger: state
    entity_id:
    - binary_sensor.motion_sensor_piesek_extended
    - binary_sensor.motion_sensor_bedroom_extended
    to: 'off'
    for:
      minutes: 15
  - trigger: state
    entity_id:
    - binary_sensor.motion_sensor_kitchen_extended
    - binary_sensor.motion_sensor_livingroom_extended
    to: 'on'
    for:
      minutes: 5
  - trigger: state
    entity_id: binary_sensor.tv_enabled
    to: 'on'
    for:
      minutes: 5
  - trigger: homeassistant
    event: start
  conditions:
  - condition: template
    value_template: '{{ should_start }}'
  actions:
  - action: system_log.write
    data:
      level: warning
      message: "\U0001F7E2 Vacuum Upstairs START | Score: {{ total_score }}/40 | Empty={{
        score_upstairs_empty }} Down={{ score_downstairs_activity }} Work={{ score_workday
        }} Lunch={{ score_lunch_time }} Cook={{ score_cooking_time }} Pres={{ score_presence
        }} Long={{ score_long_empty }} Return={{ score_recent_return }} Marathon={{
        score_work_marathon }} Wknd={{ score_weekend }} Last={{ last_call_bonus }}
        | Piesek={{ piesek_empty_minutes | round(0) }}min Bedroom={{ bedroom_empty_minutes
        | round(0) }}min | PC={{ pc_on }} Laptop={{ laptop_on }}"
  - action: vacuum.start
    target:
      entity_id: vacuum.robot_vacuum
  mode: single
  max_exceeded: silent
  variables:
    piesek_available: '{{ states(''binary_sensor.motion_sensor_piesek_extended'')
      in [''on'',''off''] }}

      '
    bedroom_available: '{{ states(''binary_sensor.motion_sensor_bedroom_extended'')
      in [''on'',''off''] }}

      '
    stairs_available: '{{ states(''binary_sensor.motion_sensor_stairs_extended'')
      in [''on'',''off''] }}

      '
    sensors_ok: '{{ piesek_available and bedroom_available }}'
    piesek_on: '{{ is_state(''binary_sensor.motion_sensor_piesek_extended'', ''on'')
      }}

      '
    bedroom_on: '{{ is_state(''binary_sensor.motion_sensor_bedroom_extended'', ''on'')
      }}

      '
    stairs_on: '{{ is_state(''binary_sensor.motion_sensor_stairs_extended'', ''on'')
      }}

      '
    piesek_empty_minutes: '{% if not piesek_available or piesek_on %}0 {% else %}{{
      ((as_timestamp(now()) - as_timestamp(states.binary_sensor.motion_sensor_piesek_extended.last_changed))
      / 60) | float(0) }} {% endif %}

      '
    bedroom_empty_minutes: '{% if not bedroom_available or bedroom_on %}0 {% else
      %}{{ ((as_timestamp(now()) - as_timestamp(states.binary_sensor.motion_sensor_bedroom_extended.last_changed))
      / 60) | float(0) }} {% endif %}

      '
    stairs_empty_minutes: '{% if not stairs_available or stairs_on %}0 {% else %}{{
      ((as_timestamp(now()) - as_timestamp(states.binary_sensor.motion_sensor_stairs_extended.last_changed))
      / 60) | float(0) }} {% endif %}

      '
    bathroom_empty: '{{ is_state(''light.light_bathroom_1'', ''off'') }}'
    guest_sleeping: '{{ is_state(''input_boolean.sleeping_guest_piesek'', ''on'')
      }}'
    bedroom_sleep_mode: '{{ is_state(''input_select.bedroom_lighting_mode'', ''Sen'')
      }}'
    projector_active: '{{ is_state(''binary_sensor.device_bedroom_projector'', ''on'')
      }}'
    pc_on: '{{ is_state(''binary_sensor.device_piesek_pc'', ''on'') }}'
    laptop_on: '{{ is_state(''binary_sensor.device_office_laptop'', ''on'') }}'
    blocked: "{{ not sensors_ok\n   or guest_sleeping\n   or bedroom_sleep_mode\n
      \  or projector_active\n   or not bathroom_empty\n   or piesek_on\n   or bedroom_on
      }}\n"
    ran_today: '{% set lt = state_attr(''automation.smart_vacuum_upstairs_intelligent_scheduling'',
      ''last_triggered'') %} {{ lt is not none and (lt | as_datetime | as_local).date()
      == now().date() }}

      '
    score_upstairs_empty: "{{ (20 if piesek_empty_minutes | float > 20 else 0)\n +
      (15 if bedroom_empty_minutes | float > 20 else 0)\n + (5  if stairs_empty_minutes
      | float > 15 else 0)\n + (5  if bathroom_empty else 0) }}\n"
    score_downstairs_activity: "{{ (10 if is_state('binary_sensor.motion_sensor_kitchen_extended',
      'on') else 0)\n + (8  if is_state('binary_sensor.motion_sensor_livingroom_extended',
      'on') else 0)\n + (5  if is_state('light.light_wc_1', 'on') else 0)\n + (5  if
      is_state('binary_sensor.motion_sensor_corridor_occupancy', 'on') else 0)\n +
      (5  if is_state('binary_sensor.motion_sensor_entrance_occupancy', 'on') else
      0)\n + (15 if is_state('binary_sensor.tv_enabled', 'on') else 0) }}\n"
    score_lunch_time: '{{ 20 if (now().hour >= 13 and now().hour < 14) else 0 }}'
    score_workday: '{{ 15 if (now().weekday() < 5 and now().hour >= 9 and now().hour
      < 16) else 0 }}'
    score_cooking_time: '{{ 10 if (now().hour >= 17 and now().hour < 20) else 0 }}'
    score_weekend: '{{ 10 if (now().weekday() >= 5 and now().hour >= 10 and now().hour
      < 14) else 0 }}'
    score_presence: '{% set p = is_state(''person.pawel'', ''home'') %} {% set m =
      is_state(''person.magda'', ''home'') %} {{ 15 if (p != m) else (10 if (p and
      m) else 0) }}

      '
    score_long_empty: '{{ 15 if (piesek_empty_minutes | float > 60 and bedroom_empty_minutes
      | float > 60) else 0 }}

      '
    score_recent_return: '{% set p_home = is_state(''person.pawel'', ''home'') %}
      {% set m_home = is_state(''person.magda'', ''home'') %} {% set p_min = ((as_timestamp(now())
      - as_timestamp(states.person.pawel.last_changed)) / 60) | float(999) %} {% set
      m_min = ((as_timestamp(now()) - as_timestamp(states.person.magda.last_changed))
      / 60) | float(999) %} {{ -10 if ((p_home or m_home) and (p_min < 15 or m_min
      < 15)) else 0 }}

      '
    score_work_marathon: "{{ 10 if (\n     (pc_on and piesek_empty_minutes | float
      > 15)\n     or (laptop_on and piesek_empty_minutes | float > 15 and bedroom_empty_minutes
      | float > 15)\n   ) and now().hour >= 10 and now().hour < 18\nelse 0 }}\n"
    last_call_bonus: "{{ 10 if (now().hour >= 19 and now().hour < 21\n          and
      piesek_empty_minutes | float > 20\n          and bedroom_empty_minutes | float
      > 20\n          and (is_state('binary_sensor.motion_sensor_kitchen_extended',
      'on')\n               or is_state('binary_sensor.motion_sensor_livingroom_extended',
      'on')\n               or is_state('binary_sensor.tv_enabled', 'on')))\nelse
      0 }}\n"
    total_score: "{{ (score_upstairs_empty | int(0))\n + (score_downstairs_activity
      | int(0))\n + (score_lunch_time | int(0))\n + (score_workday | int(0))\n + (score_cooking_time
      | int(0))\n + (score_presence | int(0))\n + (score_long_empty | int(0))\n +
      (score_recent_return | int(0))\n + (score_work_marathon | int(0))\n + (score_weekend
      | int(0))\n + (last_call_bonus | int(0)) }}\n"
    should_start: '{{ not ran_today and not blocked and (total_score | int(0)) >=
      40 }}

      '
- id: '1768322757194'
  alias: Light - Bedroom - Automatic Control
  description: Smart lighting with mmWave presence sensor. Bed mode via position OR
    vibration. Exit via motion=near.
  triggers:
  - alias: Presence detected
    entity_id: binary_sensor.presence_bedroom_presence
    to: 'on'
    trigger: state
  - alias: Presence lost
    entity_id: binary_sensor.presence_bedroom_presence
    to: 'off'
    for:
      seconds: 8
    trigger: state
  - alias: Motion state changed
    entity_id: sensor.presence_bedroom_motion_state
    trigger: state
  - alias: Bed vibration impulse
    entity_id: binary_sensor.vibration_bedroom_bed_vibration
    to: 'on'
    trigger: state
  - alias: Extended helper changed
    entity_id: binary_sensor.motion_sensor_bedroom_extended
    trigger: state
  - alias: Lighting mode changed
    entity_id: input_select.bedroom_lighting_mode
    trigger: state
  conditions:
  - alias: Ensure Auto Mode is active
    condition: state
    entity_id: input_select.bedroom_lighting_mode
    state: Auto
  actions:
  - alias: Calculate Context Variables
    variables:
      trigger_entity: '{{ trigger.entity_id | default('''') }}'
      trigger_is_vibration: '{{ trigger_entity == ''binary_sensor.vibration_bedroom_bed_vibration''
        }}'
      trigger_is_motion: '{{ trigger_entity == ''sensor.presence_bedroom_motion_state''
        }}'
      trigger_to_state: '{{ trigger.to_state.state | default('''') }}'
      motion_state: '{{ states(''sensor.presence_bedroom_motion_state'') }}'
      distance: '{{ states(''sensor.presence_bedroom_target_distance'') | float(default=0)
        }}'
      is_present: '{{ is_state(''binary_sensor.presence_bedroom_presence'', ''on'')
        }}'
      is_extended: '{{ is_state(''binary_sensor.motion_sensor_bedroom_extended'',
        ''on'') }}'
      vib_last_ts: '{{ as_timestamp(states.binary_sensor.vibration_bedroom_bed_vibration.last_changed)
        | default(0) }}'
      vib_seconds_ago: '{{ (as_timestamp(now()) - vib_last_ts) | int(9999) }}'
      had_vibration_15min: '{{ vib_seconds_ago < 900 }}'
      had_vibration_5min: '{{ vib_seconds_ago < 300 }}'
      had_vibration_1min: '{{ vib_seconds_ago < 60 }}'
      are_main_lights_on: "{{ is_state('light.light_bedroom_1', 'on') or \n   is_state('light.light_bedroom_2',
        'on') }}"
      are_main_lights_off: '{{ not are_main_lights_on }}'
      is_bedside_on: "{{ is_state('light.yeelink_monoa_0559_light', 'on') or \n   is_state('light.yeelink_monoa_0ec8_light',
        'on') }}"
      is_bedside_available: "{{ not is_state('light.yeelink_monoa_0559_light', 'unavailable')
        \n   and not is_state('light.yeelink_monoa_0ec8_light', 'unavailable') }}"
      are_all_lights_off: '{{ not are_main_lights_on and not is_bedside_on }}'
      is_night: '{{ (now().hour >= 23) or (now().hour < 6) }}'
      is_evening: '{{ now().hour >= 21 }}'
      sleep_mode: '{{ is_state(''input_select.bedroom_lighting_mode'', ''Sen'') }}'
      illuminance: '{{ states(''sensor.presence_bedroom_illuminance'') | float(default=100)
        }}'
      dark_threshold: '{{ states(''input_number.light_bedroom_illuminance_lvl'') |
        float(100) }}'
      is_dark: '{{ illuminance < dark_threshold }}'
      is_in_bed_zone: '{{ distance >= 1.8 and distance <= 3.2 }}'
      is_in_bed_zone_wide: '{{ distance >= 1.5 and distance <= 3.5 }}'
      is_near_sensor: '{{ distance > 0 and distance < 2.0 }}'
      is_bed_motion: '{{ motion_state in [''small'', ''none''] }}'
      is_exit_motion: '{{ motion_state == ''near'' }}'
      is_entry_motion: '{{ motion_state in [''large'', ''far''] }}'
      bed_mode_by_lights: '{{ is_bedside_on and are_main_lights_off }}'
      bed_mode_by_vibration: "{{ had_vibration_5min \n   and is_in_bed_zone_wide \n
        \  and is_present \n   and not is_exit_motion }}"
      bed_mode_active: '{{ bed_mode_by_lights or bed_mode_by_vibration }}'
      should_enter_bed_mode: "{{ not bed_mode_active \n   and is_present\n   and is_bed_motion
        \n   and is_in_bed_zone }}"
      should_maintain_bed_mode: "{{ bed_mode_active \n   and is_present\n   and not
        is_exit_motion }}"
      should_exit_bed_mode: "{{ bed_mode_active \n   and is_exit_motion \n   and is_near_sensor\n
        \  and not had_vibration_1min }}"
      room_truly_empty: "{{ not is_present \n   and motion_state == 'none' \n   and
        not is_extended }}"
  - alias: Main Logic Controller
    choose:
    - alias: 'P1: Sleep Mode Active'
      conditions:
      - condition: template
        value_template: '{{ sleep_mode and is_night }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.light_bedroom_1
          - light.light_bedroom_2
          - light.yeelink_monoa_0559_light
          - light.yeelink_monoa_0ec8_light
    - alias: 'P2: Room Empty'
      conditions:
      - condition: template
        value_template: '{{ room_truly_empty }}'
      sequence:
      - delay:
          seconds: 3
      - condition: template
        value_template: "{{ not is_state('binary_sensor.presence_bedroom_presence',
          'on') \n   and states('sensor.presence_bedroom_motion_state') == 'none'
          }}"
      - action: light.turn_off
        target:
          entity_id:
          - light.light_bedroom_1
          - light.light_bedroom_2
          - light.yeelink_monoa_0559_light
          - light.yeelink_monoa_0ec8_light
    - alias: 'P3: Vibration - Enter Bed Mode'
      conditions:
      - condition: template
        value_template: '{{ trigger_is_vibration and is_in_bed_zone_wide and is_present
          }}'
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ is_bedside_available }}'
          sequence:
          - action: light.turn_on
            target:
              entity_id:
              - light.yeelink_monoa_0559_light
              - light.yeelink_monoa_0ec8_light
          - action: light.turn_off
            target:
              entity_id:
              - light.light_bedroom_1
              - light.light_bedroom_2
        default:
        - if:
          - condition: template
            value_template: '{{ are_main_lights_on }}'
          then:
          - action: light.turn_on
            target:
              entity_id:
              - light.light_bedroom_1
              - light.light_bedroom_2
            data:
              brightness_pct: 10
              transition: 3
    - alias: 'P4: Exit Bed Mode'
      conditions:
      - condition: template
        value_template: '{{ should_exit_bed_mode }}'
      sequence:
      - alias: Wait 3s debouncing
        delay:
          seconds: 3
      - alias: Re-check conditions
        variables:
          current_motion: '{{ states(''sensor.presence_bedroom_motion_state'') }}'
          current_distance: '{{ states(''sensor.presence_bedroom_target_distance'')
            | float(0) }}'
          still_near_or_active: '{{ current_motion in [''near'', ''large''] and current_distance
            < 2.0 and current_distance > 0 }}'
          back_in_bed: '{{ current_motion == ''small'' or current_distance >= 2.0
            }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ still_near_or_active and not back_in_bed }}'
          sequence:
          - action: light.turn_off
            target:
              entity_id:
              - light.yeelink_monoa_0559_light
              - light.yeelink_monoa_0ec8_light
          - if:
            - condition: template
              value_template: "{{ states('sensor.presence_bedroom_illuminance') |
                float(100) \n   < states('input_number.light_bedroom_illuminance_lvl')
                | float(100) \n   and is_state('binary_sensor.presence_bedroom_presence',
                'on') }}"
            then:
            - action: light.turn_on
              target:
                entity_id:
                - light.light_bedroom_1
                - light.light_bedroom_2
    - alias: 'P5: Maintain Bed Mode'
      conditions:
      - condition: template
        value_template: '{{ should_maintain_bed_mode }}'
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ are_main_lights_on and is_bedside_on }}'
          sequence:
          - action: light.turn_off
            target:
              entity_id:
              - light.light_bedroom_1
              - light.light_bedroom_2
        - conditions:
          - condition: template
            value_template: "{{ bed_mode_by_vibration \n   and not is_bedside_on \n
              \  and is_bedside_available }}"
          sequence:
          - action: light.turn_on
            target:
              entity_id:
              - light.yeelink_monoa_0559_light
              - light.yeelink_monoa_0ec8_light
          - action: light.turn_off
            target:
              entity_id:
              - light.light_bedroom_1
              - light.light_bedroom_2
    - alias: 'P6: Enter Bed Mode via Position'
      conditions:
      - condition: template
        value_template: "{{ should_enter_bed_mode \n   and (is_dark or are_main_lights_on)
          \n   and is_bedside_available }}"
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.yeelink_monoa_0559_light
          - light.yeelink_monoa_0ec8_light
      - action: light.turn_off
        target:
          entity_id:
          - light.light_bedroom_1
          - light.light_bedroom_2
    - alias: 'P7: Room Entry'
      conditions:
      - condition: template
        value_template: "{{ is_present \n   and is_entry_motion \n   and is_dark \n
          \  and are_all_lights_off \n   and not bed_mode_active \n   and not sleep_mode
          }}"
      - condition: or
        conditions:
        - condition: template
          value_template: '{{ not is_night }}'
        - condition: template
          value_template: '{{ is_extended }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.light_bedroom_1
          - light.light_bedroom_2
    - alias: 'P8: Night Safety'
      conditions:
      - condition: template
        value_template: "{{ not is_extended \n   and is_night \n   and not bed_mode_active
          \n   and not had_vibration_15min \n   and (are_main_lights_on or is_bedside_on)
          }}"
      sequence:
      - delay:
          seconds: 10
      - variables:
          recheck_bedside_on: "{{ is_state('light.yeelink_monoa_0559_light', 'on')
            or \n   is_state('light.yeelink_monoa_0ec8_light', 'on') }}"
          recheck_main_off: "{{ not (is_state('light.light_bedroom_1', 'on') or \n
            \  is_state('light.light_bedroom_2', 'on')) }}"
          recheck_bed_mode: '{{ recheck_bedside_on and recheck_main_off }}'
          recheck_vib_ago: '{{ (as_timestamp(now()) - as_timestamp(states.binary_sensor.vibration_bedroom_bed_vibration.last_changed)
            | default(0)) | int(9999) }}'
          recheck_bed_by_vib: "{{ recheck_vib_ago < 300 \n   and is_state('binary_sensor.presence_bedroom_presence',
            'on') }}"
      - condition: template
        value_template: "{{ not is_state('binary_sensor.motion_sensor_bedroom_extended',
          'on')\n   and not recheck_bed_mode\n   and not recheck_bed_by_vib }}"
      - action: light.turn_off
        target:
          entity_id:
          - light.light_bedroom_1
          - light.light_bedroom_2
          - light.yeelink_monoa_0559_light
          - light.yeelink_monoa_0ec8_light
  mode: queued
  max: 3
- id: '1768599267582'
  alias: Enhanced Smart Control - AC Power Manager (Predictive Standby Control v2)
  description: 'CRITICAL INFRASTRUCTURE. Manages AC power supply based on heating
    demand, energy prices, and outdoor temperature.

    LOGIC SUMMARY: 1. Boot: Powered OFF + (Demand OR Cheap Energy OR High Efficiency)
    + Cooldown expired + Temp > -10°C. 2. Shutdown: Powered ON + (Inefficient OR Expensive)
    + No Demand + Temp > -5°C. 3. Restart Sanity: If Booted with Power OFF -> Disable
    Integrations.

    SAFETY FEATURES: - Anti-Cycling: 10-minute cooldown after last run. - Deadlock
    Prevention: Soft-OFF -> Wait -> Disable Integration -> Cut Power. - Hardware Protection:
    Cuts power only if current < 0.06A (Standby). - Cloud Latency: Includes delays
    for Tuya/Gree cloud processing. - Better Thermostat Management: Disables BT entities
    during shutdown to prevent log errors. - Temperature Safety: Blocks boot below
    -10°C and shutdown below -5°C. - Current Filtering: Smooths sensor spikes to prevent
    false positives.

    REQUIREMENTS: - Correct Config Entry IDs for Gree/Tuya integrations. - script.universal_notifier
    for critical alerts. - Filter platform for sensor.fuse_air_conditioner_current
    (see configuration.yaml).

    '
  triggers:
  - minutes: '50'
    id: predictive_check
    trigger: time_pattern
  - minutes: '10'
    id: safety_check
    trigger: time_pattern
  - entity_id:
    - input_boolean.winter_mode
    - input_boolean.pre_winter_mode
    to: 'on'
    for: 00:00:30
    id: mode_activated
    trigger: state
  - value_template: "{% if has_value('switch.fuse_air_conditioner_1') and states('sensor.openweathermap_temperature')
      | float(0) > -10 %}\n  {% from 'heating_macros.jinja' import heating_force_logic
      %}\n  {% set force_l = heating_force_logic(\n      'sensor.temperature_livingroom_avg',\n
      \     'sensor.thermostat_livingroom_virtual_calibrated',\n      'guest_mode',
      'input_boolean.sleeping_guest_livingroom'\n  ) | trim | lower == 'true' %}\n
      \ {% set force_b = heating_force_logic(\n      'sensor.temphum_bedroom_temperature',\n
      \     'sensor.thermostat_bedroom_virtual_calibrated',\n      'sleep_mode', 'input_select.bedroom_lighting_mode'\n
      \ ) | trim | lower == 'true' %}\n  {{ (force_l or force_b) and is_state('switch.fuse_air_conditioner_1',
      'off') }}\n{% else %}\n  false\n{% endif %}"
    for: 00:01:00
    id: emergency_boot
    trigger: template
  - event: start
    id: ha_restart
    trigger: homeassistant
  conditions: []
  actions:
  - alias: 'Setup: Initialize Variables'
    variables:
      entry_id_bedroom: 01K7ZCDP2Y5EPYXKAB7NFQ51AR
      entry_id_livingroom: 01K7ZCF748JST928AX35X8MY2F
      clima_living: climate.livingroom_ac_better_thermostat
      clima_bedroom: climate.bedroom_ac_better_thermostat
      bt_living: climate.livingroom_ac_better_thermostat
      bt_bedroom: climate.bedroom_ac_better_thermostat
      cooldown_seconds: 600
      temp_outdoor: '{{ states(''sensor.openweathermap_temperature'') | float(0) }}'
      last_run: '{{ state_attr(this.entity_id, ''last_triggered'') | as_datetime |
        default(now() - timedelta(hours=1), true) }}'
      seconds_since_last_run: '{{ (now() - last_run | as_datetime).total_seconds()
        }}'
      is_cooldown_active: '{{ seconds_since_last_run < cooldown_seconds }}'
      is_power_on: "{{ has_value('switch.fuse_air_conditioner_1') and\n   is_state('switch.fuse_air_conditioner_1',
        'on') }}"
      current_amps: '{{ states(''sensor.fuse_air_conditioner_current'') | float(0)
        }}'
      winter_active: "{{ is_state('input_boolean.winter_mode', 'on') or\n   is_state('input_boolean.pre_winter_mode',
        'on') }}"
      force_heating: '{% from ''heating_macros.jinja'' import heating_force_logic
        %} {% set l = heating_force_logic(''sensor.temperature_livingroom_avg'',''sensor.thermostat_livingroom_virtual_calibrated'',''guest_mode'',''input_boolean.sleeping_guest_livingroom'')
        | trim | lower == ''true'' %} {% set b = heating_force_logic(''sensor.temphum_bedroom_temperature'',''sensor.thermostat_bedroom_virtual_calibrated'',''sleep_mode'',''input_select.bedroom_lighting_mode'')
        | trim | lower == ''true'' %} {{ l or b }}'
      current_eco_pct: '{{ states(''sensor.ac_heating_economical_percentage'') | float(150)
        }}'
      is_cheap_morning: '{{ is_state(''binary_sensor.energy_is_cheapest_1h_morning'',
        ''on'') }}'
      is_cheapest_5h: '{{ is_state(''binary_sensor.energy_is_cheapest_5h'', ''on'')
        }}'
      prediction_result: "{% from 'energy.jinja' import get_future_slots %} {% if
        not has_value('sensor.pstryk_buy_price') or not has_value('sensor.openweathermap_temperature')
        or not has_value('input_number.gas_price') %}\n  {{ {'error': true, 'profitable_slots':
        0, 'hours_until': 99, 'min_eco': 999} | to_json }}\n{% else %}\n  {% set slots_json
        = get_future_slots('sensor.pstryk_buy_price') %}\n  {% set slots = slots_json
        | from_json if slots_json else [] %}\n  {% if slots | count == 0 %}\n    {{
        {'error': true, 'profitable_slots': 0, 'hours_until': 99, 'min_eco': 999}
        | to_json }}\n  {% else %}\n    {% set temp_out = states('sensor.openweathermap_temperature')
        | float(10) %}\n    {% set gas_price = states('input_number.gas_price') |
        float(0.35) %}\n    {% set now_ts = as_timestamp(now()) %}\n    {% if temp_out
        <= -15 %}{% set cop = 2.25 %}\n    {% elif temp_out <= 0 %}{% set cop = 2.25
        + (temp_out + 15) * 0.0733 %}\n    {% elif temp_out <= 7 %}{% set cop = 3.35
        + temp_out * 0.0857 %}\n    {% elif temp_out < 15 %}{% set cop = 3.95 + (temp_out
        - 7) * 0.05 %}\n    {% else %}{% set cop = 4.35 %}{% endif %}\n    {% set
        ns = namespace(profitable_slots=0, first_profitable_ts=none, min_eco_pct=999)
        %}\n    {% for slot in slots[:4] %}\n      {% if slot.ts is defined and slot.price
        is defined and slot.ts >= now_ts and slot.ts <= (now_ts + 10800) %}\n        {%
        set price = slot.price | float(1.0) %}\n        {% if cop > 0 and gas_price
        > 0 %}\n          {% set eco_pct = ((price / cop) / (gas_price / 0.9)) * 100
        %}\n          {% if eco_pct < ns.min_eco_pct %}{% set ns.min_eco_pct = eco_pct
        %}{% endif %}\n          {% set threshold = 130 if is_state('input_boolean.winter_mode',
        'on') else 110 %}\n          {% if eco_pct < threshold %}\n            {%
        set ns.profitable_slots = ns.profitable_slots + 1 %}\n            {% if ns.first_profitable_ts
        is none %}{% set ns.first_profitable_ts = slot.ts %}{% endif %}\n          {%
        endif %}\n        {% endif %}\n      {% endif %}\n    {% endfor %}\n    {%
        set hours = ((ns.first_profitable_ts - now_ts) / 3600) | round(1) if ns.first_profitable_ts
        else 99 %}\n    {{ {'error': false, 'profitable_slots': ns.profitable_slots,
        'hours_until': hours, 'min_eco': ns.min_eco_pct | round(1)} | to_json }}\n
        \ {% endif %}\n{% endif %}"
      prediction: '{{ prediction_result | from_json }}'
      prediction_error: '{{ prediction.error | default(false) }}'
      data_valid: "{{ has_value('sensor.pstryk_buy_price') and\n   has_value('sensor.ac_heating_economical_percentage')
        and\n   has_value('switch.fuse_air_conditioner_1') }}"
      should_boot: "{{ not is_power_on and not is_cooldown_active and winter_active
        and\n   data_valid and not prediction_error and temp_outdoor > -10 and\n   (force_heating
        or\n    (is_cheapest_5h and current_eco_pct < 120) or\n    is_cheap_morning
        or\n    prediction.hours_until | default(99) <= 1.5) }}"
      should_shutdown: "{% if not is_power_on or not data_valid %} false {% elif not
        winter_active and temp_outdoor > -5 %} true {% elif not winter_active %} false
        {% else %}\n  {{ not force_heating and\n     ( (not is_cheapest_5h and not
        is_cheap_morning and current_eco_pct > 130) or\n       current_eco_pct > 140
        ) }}\n{% endif %}"
      force_disable_integrations: '{{ trigger.id == ''ha_restart'' and not is_power_on
        }}'
      emergency_boot_blocked: '{{ trigger.id == ''emergency_boot'' and temp_outdoor
        <= -10 }}'
  - alias: 'Log: Current State Snapshot'
    action: system_log.write
    data:
      level: info
      message: 'AC Manager [{{ trigger.id }}]: Power={{ is_power_on }}, Cooldown={{
        is_cooldown_active }} ({{ seconds_since_last_run|int }}s), Heat={{ force_heating
        }}, Eco={{ current_eco_pct }}%, Pred={{ prediction.min_eco }}%/{{ prediction.hours_until
        }}h, TempOut={{ temp_outdoor }}°C, BOOT={{ should_boot }}, OFF={{ should_shutdown
        }}, FORCE_DISABLE={{ force_disable_integrations }}, EMERGENCY_BLOCKED={{ emergency_boot_blocked
        }}'
  - alias: 'Execute: State Change'
    choose:
    - conditions:
      - condition: template
        value_template: '{{ emergency_boot_blocked }}'
      sequence:
      - alias: 'Log: Emergency Boot Blocked by Temperature'
        action: system_log.write
        data:
          level: warning
          message: 'AC Manager: EMERGENCY BOOT BLOCKED! Outdoor temp={{ temp_outdoor
            }}°C (< -10°C). Refusing to start AC. Check gas boiler!'
      - alias: 'Action: Notify Emergency Boot Blocked'
        action: script.universal_notifier
        data:
          title: AC Manager - Emergency Boot Blocked
          message: 'UWAGA: Automatyka AC zablokowała awaryjne włączenie z powodu niskiej
            temperatury ({{ temp_outdoor }}°C). Sprawdź kocioł gazowy!'
          use_tts: false
          use_pushbullet: true
          phone_pawel: true
          phone_magdalena: false
    - conditions:
      - condition: template
        value_template: '{{ should_boot }}'
      sequence:
      - alias: 'Log: Starting Boot'
        action: system_log.write
        data:
          level: info
          message: 'AC Manager: Starting Boot sequence. TempOut={{ temp_outdoor }}°C'
      - alias: 'Action: Turn ON Power Switch'
        action: switch.turn_on
        target:
          entity_id: switch.fuse_air_conditioner_1
      - alias: 'Wait: Hardware Init (10s)'
        delay: 00:00:10
      - alias: 'Action: Enable Integrations'
        action: homeassistant.enable_config_entry
        data:
          config_entry_id:
          - '{{ entry_id_bedroom }}'
          - '{{ entry_id_livingroom }}'
        continue_on_error: true
      - alias: 'Wait: Cloud Reconnect & Entity Discovery (15s + 2m max)'
        sequence:
        - delay: 00:00:15
        - wait_template: '{{ has_value(clima_living) or has_value(clima_bedroom) }}'
          timeout: 00:02:00
          continue_on_timeout: true
      - alias: 'Action: Enable Better Thermostat Entities'
        choose:
        - conditions:
          - condition: template
            value_template: '{{ has_value(bt_living) }}'
          sequence:
          - action: homeassistant.enable_entity
            target:
              entity_id: '{{ bt_living }}'
            continue_on_error: true
        - conditions:
          - condition: template
            value_template: '{{ has_value(bt_bedroom) }}'
          sequence:
          - action: homeassistant.enable_entity
            target:
              entity_id: '{{ bt_bedroom }}'
            continue_on_error: true
      - alias: 'Log: Boot Complete'
        action: system_log.write
        data:
          level: info
          message: 'AC Manager: Boot complete. Living={{ has_value(clima_living) }},
            Bedroom={{ has_value(clima_bedroom) }}, BT_Living={{ has_value(bt_living)
            }}, BT_Bedroom={{ has_value(bt_bedroom) }}, TempOut={{ temp_outdoor }}°C'
    - conditions:
      - condition: template
        value_template: '{{ force_disable_integrations }}'
      sequence:
      - alias: 'Log: Force Disable on Boot'
        action: system_log.write
        data:
          level: info
          message: 'AC Manager: Restart detected with Power OFF. Preventing log errors.
            TempOut={{ temp_outdoor }}°C'
      - alias: 'Action: Disable Better Thermostat Entities'
        choose:
        - conditions:
          - condition: template
            value_template: '{{ has_value(bt_living) }}'
          sequence:
          - action: homeassistant.disable_entity
            target:
              entity_id: '{{ bt_living }}'
            continue_on_error: true
        - conditions:
          - condition: template
            value_template: '{{ has_value(bt_bedroom) }}'
          sequence:
          - action: homeassistant.disable_entity
            target:
              entity_id: '{{ bt_bedroom }}'
            continue_on_error: true
      - alias: 'Action: Ensure Integrations Disabled'
        action: homeassistant.disable_config_entry
        data:
          config_entry_id:
          - '{{ entry_id_bedroom }}'
          - '{{ entry_id_livingroom }}'
        continue_on_error: true
    - conditions:
      - condition: template
        value_template: '{{ should_shutdown }}'
      sequence:
      - alias: 'Log: Starting Shutdown'
        action: system_log.write
        data:
          level: info
          message: 'AC Manager: Starting Shutdown sequence. TempOut={{ temp_outdoor
            }}°C'
      - alias: 'Step 1: Soft-OFF (Defensive - only if entities exist)'
        choose:
        - conditions:
          - condition: template
            value_template: '{{ has_value(clima_living) }}'
          sequence:
          - action: climate.turn_off
            target:
              entity_id: '{{ clima_living }}'
            continue_on_error: true
        - conditions:
          - condition: template
            value_template: '{{ has_value(clima_bedroom) }}'
          sequence:
          - action: climate.turn_off
            target:
              entity_id: '{{ clima_bedroom }}'
            continue_on_error: true
      - alias: 'Wait: Cloud Latency (5s)'
        delay: 00:00:05
      - alias: 'Wait: Compressor Stop (<0.2A)'
        wait_template: '{{ states(''sensor.fuse_air_conditioner_current'') | float(1)
          < 0.2 }}'
        timeout: 00:03:00
        continue_on_timeout: true
      - alias: 'Step 2: Disable Integrations'
        action: homeassistant.disable_config_entry
        data:
          config_entry_id:
          - '{{ entry_id_bedroom }}'
          - '{{ entry_id_livingroom }}'
        continue_on_error: true
      - alias: 'Wait: Integration Cleanup (5s)'
        delay: 00:00:05
      - alias: 'Action: Disable Better Thermostat Entities'
        choose:
        - conditions:
          - condition: template
            value_template: '{{ has_value(bt_living) }}'
          sequence:
          - action: homeassistant.disable_entity
            target:
              entity_id: '{{ bt_living }}'
            continue_on_error: true
        - conditions:
          - condition: template
            value_template: '{{ has_value(bt_bedroom) }}'
          sequence:
          - action: homeassistant.disable_entity
            target:
              entity_id: '{{ bt_bedroom }}'
            continue_on_error: true
      - alias: 'Wait: Electronics Standby (<0.06A)'
        wait_template: '{{ states(''sensor.fuse_air_conditioner_current'') | float(1)
          < 0.06 }}'
        timeout: 00:02:00
        continue_on_timeout: true
      - alias: 'Step 3: Power Cut or Critical Alert'
        choose:
        - conditions:
          - condition: template
            value_template: '{{ states(''sensor.fuse_air_conditioner_current'') |
              float(1) < 0.06 }}'
          sequence:
          - alias: 'Action: Cut Power'
            action: switch.turn_off
            target:
              entity_id: switch.fuse_air_conditioner_1
          - alias: 'Log: Cut Successful'
            action: system_log.write
            data:
              level: info
              message: 'AC Manager: Power CUT successful. BT entities disabled. TempOut={{
                temp_outdoor }}°C'
        default:
        - alias: 'Log: Abort Shutdown'
          action: system_log.write
          data:
            level: warning
            message: 'AC Manager: ABORT! Current={{ states(''sensor.fuse_air_conditioner_current'')
              }}A. Refusing to cut power. TempOut={{ temp_outdoor }}°C'
        - alias: 'Action: Notify Critical Failure'
          action: script.universal_notifier
          data:
            title: AWARIA AC MANAGER - Critical
            message: 'CRITICAL: Unable to safely cut AC power! Current load: {{ states(''sensor.fuse_air_conditioner_current'')
              }}A. Manual intervention required. TempOut={{ temp_outdoor }}°C'
            use_tts: false
            use_pushbullet: false
            phone_pawel: true
            phone_magdalena: false
    default:
    - alias: 'Log: No Action'
      action: system_log.write
      data:
        level: debug
        message: 'AC Manager: No action needed. TempOut={{ temp_outdoor }}°C'
  mode: single
  max_exceeded: silent
- id: '1768769049613'
  alias: Dashboard - Reset Daily Motion Counters
  description: Resetuje liczniki ruchu o północy
  triggers:
