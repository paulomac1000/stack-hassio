  mode: single
- id: '1721146071935'
  alias: Enhanced Smart Control - Vacuum - Night Silent Cleaning
  description: Triggers vacuum based on schedule. Checks availability before starting.
    Notifies if device is offline.
  mode: single
  trigger:
  - trigger: time
    at: sensor.vacuum_next_run_time
  condition:
  - condition: state
    entity_id: input_boolean.sleeping_guest_livingroom
    state: 'off'
  - condition: state
    entity_id: input_boolean.mode_long_absence_mode
    state: 'off'
  - alias: Avoid duplicate runs (within 60s)
    condition: template
    value_template: "{% set last_run = state_attr(this.entity_id, 'last_triggered')
      %} {% if last_run %}\n  {{ (now() - last_run).total_seconds() > 60 }}\n{% else
      %}\n  true\n{% endif %}"
  action:
  - alias: Set TTS Logic Variable
    variables:
      is_tts_allowed: "{{ now().hour >= 9 and now().hour < 23 and\n   states('input_select.bedroom_lighting_mode')
        != 'Sen' and \n   is_state('binary_sensor.device_bedroom_projector', 'off')
        and \n   not is_state('media_player.chromecast', 'playing') and \n   not is_state('media_player.projector',
        'playing') and \n   not is_state('media_player.l018_5176', 'playing') }}"
  - alias: Check Vacuum Availability
    choose:
    - conditions:
      - condition: or
        conditions:
        - condition: state
          entity_id: vacuum.viomi_v8_9672_robot_cleaner_2
          state: unavailable
        - condition: state
          entity_id: vacuum.viomi_v8_9672_robot_cleaner_2
          state: unknown
      sequence:
      - alias: Notify Mobile - Unavailable
        action: script.universal_notifier
        data:
          title: ⚠️ Odkurzacz niedostępny
          message: 'Harmonogram: Nie udało się uruchomić sprzątania. Odkurzacz jest
            offline.'
          phone_pawel: true
          phone_magdalena: true
          use_tts: false
      - alias: Notify TTS - Unavailable
        if:
        - condition: template
          value_template: '{{ is_tts_allowed }}'
        then:
        - action: script.universal_notifier
          data:
            title: Błąd harmonogramu
            message: Nie mogę rozpocząć sprzątania. Odkurzacz jest niedostępny.
            use_tts: true
      - stop: Vacuum unavailable - Aborting automation
    - conditions: []
      sequence:
      - alias: Set Silent Mode if Early Morning (before 8 AM)
        if:
        - condition: time
          before: 08:00:00
        then:
        - target:
            entity_id: select.viomi_v8_9672_mode
          action: select.select_option
          data:
            option: Silent
      - alias: Send Start Command
        target:
          entity_id: vacuum.viomi_v8_9672_robot_cleaner_2
        action: vacuum.start
        data: {}
- id: '1721820181570'
  alias: Camera snapshot on motion - Gate Camera (Smart Hybrid)
  description: 'Hybrid detection for Gate. Frontdoor Cam (Fast): Snaps immediately
    + 6s delay (30s cooldown). Doorbell Event (Slow): Snaps immediately + 5s delay
    (120s cooldown). Files saved to /config/www/archive/camera_gate/.

    '
  triggers:
  - entity_id: binary_sensor.frontdoor_eth_motion_alarm
    to: 'on'
    id: trigger_camera
    trigger: state
  - event_type: state_changed
    event_data:
      entity_id: event.security_camera_doorbell
    id: trigger_doorbell
    trigger: event
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: trigger_camera
      - condition: template
        value_template: '{{ (as_timestamp(now()) - last_db_event) > 15 }}'
      - condition: template
        value_template: '{{ seconds_since_run > 30 }}'
      sequence:
      - action: system_log.write
        data:
          level: info
          message: 'Gate Cam: Motion (Frontdoor). Starting Sequence A.'
      - action: camera.snapshot
        target:
          entity_id: camera.security_camera
        data:
          filename: '{{ base_folder }}/motion_front_trigger_1_{{ now().strftime("%Y%m%d-%H%M%S")
            }}.jpg'
      - delay: 00:00:06
      - action: camera.snapshot
        target:
          entity_id: camera.security_camera
        data:
          filename: '{{ base_folder }}/motion_front_trigger_2_{{ now().strftime("%Y%m%d-%H%M%S")
            }}.jpg'
    - conditions:
      - condition: trigger
        id: trigger_doorbell
      - condition: template
        value_template: '{{ (as_timestamp(now()) - last_cam_motion) > 15 }}'
      - condition: template
        value_template: '{{ seconds_since_run > 120 }}'
      sequence:
      - action: system_log.write
        data:
          level: info
          message: 'Gate Cam: Motion (Doorbell). Starting Sequence B.'
      - action: camera.snapshot
        target:
          entity_id: camera.security_camera
        data:
          filename: '{{ base_folder }}/motion_doorbell_trigger_1_{{ now().strftime("%Y%m%d-%H%M%S")
            }}.jpg'
      - delay: 00:00:05
      - action: camera.snapshot
        target:
          entity_id: camera.security_camera
        data:
          filename: '{{ base_folder }}/motion_doorbell_trigger_2_{{ now().strftime("%Y%m%d-%H%M%S")
            }}.jpg'
    default:
    - action: system_log.write
      data:
        level: info
        message: 'Gate Cam: Ignored (Duplicate/Cooldown). Source: {{ trigger.id }}.'
  mode: single
  max_exceeded: silent
  variables:
    base_folder: /config/www/archive/camera_gate
    last_run: '{{ state_attr(this.entity_id, ''last_triggered'') }}'
    seconds_since_run: '{{ (as_timestamp(now()) - as_timestamp(last_run, 0)) | int(0)
      }}'
    last_cam_motion: '{{ as_timestamp(states.binary_sensor.frontdoor_eth_motion_alarm.last_changed,
      0) }}'
    last_db_event: '{{ as_timestamp(states.event.security_camera_doorbell.last_changed,
      0) }}'
