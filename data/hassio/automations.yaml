    to:
    - unavailable
    - unknown
    for: 00:05:00
    trigger: state
  condition:
  - condition: template
    value_template: '{{ trigger.from_state.state not in [''unknown'', ''unavailable'']
      }}'
    alias: Ignoruj wyzwalacze, jeśli poprzedni stan był również stanem awarii
  action:
  - data:
      title: Awaria Domofonu
      message: Uwaga, domofon przestał odpowiadać. Spróbuj odłączyć go od zasilania
        i podłączyć ponownie.
      use_tts: true
      phone_pawel: true
      phone_magdalena: false
      use_pushbullet: false
    action: script.universal_notifier
- id: '1760921130070'
  alias: 'Watchdog: Restart integracji lodówki HomeWhiz'
  description: Monitoruje sensor lodówki. Jeśli jest niedostępny przez 5 minut,  automatycznie
    przeładowuje integrację HomeWhiz i wysyła powiadomienie głosowe.
  mode: single
  trigger:
  - trigger: state
    entity_id:
    - binary_sensor.fridge_online
    to: 'off'
    for:
      hours: 0
      minutes: 5
      seconds: 0
  condition:
  - condition: template
