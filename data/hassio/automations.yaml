      == None or (now() - state_attr(''automation.motion_notify_backyard_camera'',
      ''last_triggered'')) > timedelta(minutes=2) }}'
  action:
  - variables:
      filename: motion_{{ now().strftime('%Y%m%d-%H%M%S') }}.jpg
