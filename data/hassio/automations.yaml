- id: '1749346082237'
  alias: Energy Control - Smart Washer Manager (Pstryk)
  description: 'Starts washing at the cheapest allowed hour (03-23) using dynamic
    energy prices from Pstryk. Fully hardened against missing data, duplicates, and
    HA restarts.

    '
  mode: single
  trigger:
  - entity_id: binary_sensor.pralka_remote_control
    to: 'on'
    trigger: state
  - hours: /1
    trigger: time_pattern
    minutes: '5'
  condition:
  - condition: state
    entity_id: binary_sensor.pralka_remote_control
    state: 'on'
  - condition: not
    conditions:
    - condition: state
      entity_id: select.pralka
      state: run
  action:
  - variables:
      now_ts: '{{ as_timestamp(now()) }}'
      remote_changed_ts: "{{ as_timestamp(states.binary_sensor.pralka_remote_control.last_changed)\n
        \  | default(now_ts, true) }}"
      hours_waiting: '{{ (now_ts - remote_changed_ts) / 3600 }}'
      panic_mode: '{{ hours_waiting > 20 }}'
      future_slots_json: '{% from ''energy.jinja'' import get_future_slots %} {{ get_future_slots(''sensor.pstryk_buy_price'')
        }}'
      current_price: '{% set slots = future_slots_json | from_json %} {{ (slots |
        first).price if slots and slots is iterable else states(''sensor.pstryk_buy_price'')
        | float(99.99) }}'
  - variables:
      valid_slots: "{% set slots = future_slots_json | from_json %} {% set ns = namespace(items=[])
        %} {% if slots is iterable %}\n  {% for item in slots %}\n    {% set hour
        = item.ts | timestamp_custom('%H') | int %}\n    {% if panic_mode or (hour
        >= 3 and hour <= 23) %}\n      {% set ns.items = ns.items + [item] %}\n    {%
        endif %}\n  {% endfor %}\n{% endif %} {{ ns.items }}"
      target_price: "{{ valid_slots | map(attribute='price') | min \n   if valid_slots
        | count > 0 else 0.0 }}\n   "
      is_cheap_now: '{{ valid_slots | count > 0 and current_price <= (target_price
        + 0.08) }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ is_cheap_now }}'
      sequence:
      - target:
          entity_id: select.pralka
        data:
          option: run
        action: select.select_option
    - conditions:
      - condition: template
        value_template: '{{ panic_mode }}'
      sequence:
      - data:
          title: ⚠️ Pralka – Tryb Paniki
          message: 'Czekam już {{ hours_waiting | round(1) }}h. Wymuszony start (Cena:
            {{ current_price }} zł, Cel: {{ target_price }} zł).

            '
          phone_pawel: true
          phone_magdalena: true
          use_tts: false
        action: script.universal_notifier
      - target:
          entity_id: select.pralka
        data:
          option: run
        action: select.select_option
    default:
    - stop: 'Waiting. Current={{ current_price }}, Target={{ target_price }}, Panic={{
        panic_mode }}

        '
- id: '1751311183681'
  alias: Energy Control - Run dishwasher (Cheapest 3h Window)
  description: 'Starts dishwasher at the beginning of the cheapest 3-hour window derived
    directly from Pstryk prices. Hardened against JSON/String type conflicts.

    '
  mode: single
  trigger:
  - minutes: '0'
    trigger: time_pattern
  - entity_id: binary_sensor.403100517584028828_bsh_common_status_remotecontrolstartallowed
    to: 'on'
    trigger: state
  condition:
  - condition: state
    entity_id: binary_sensor.403100517584028828_bsh_common_status_remotecontrolstartallowed
    state: 'on'
  action:
  - variables:
      raw_window_data: '{% from ''energy.jinja'' import get_cheapest_window %} {{
        get_cheapest_window(''sensor.pstryk_buy_price'', 3) }}'
      best_window: "{% if raw_window_data is string %}\n  {{ raw_window_data | from_json
        }}\n{% else %}\n  {{ raw_window_data }}\n{% endif %}"
      now_ts: '{{ as_timestamp(now()) }}'
      should_start: "{% if best_window %}\n  {# Startujemy w pierwszej godzinie okna
        (z buforem 59 min) #}\n  {{ now_ts >= best_window.ts and now_ts < (best_window.ts
        + 3540) }}\n{% else %}\n  false\n{% endif %}"
  - if:
    - condition: template
      value_template: '{{ should_start }}'
    then:
    - target:
        entity_id: switch.403100517584028828_bsh_common_setting_powerstate
      action: switch.turn_on
    - delay: 00:00:05
    - target:
        entity_id: button.403100517584028828_start_pause
      action: button.press
- id: '1753177311262'
  alias: Bathroom Fan Smart Control (with 10-min manual overrun)
  description: 'Controls bathroom fan using humidity, dryer state and seasonal modes.
    If the fan was manually ON and the bathroom light turns OFF, start a 10-min overrun
    (once). Overrun is robust to HA restarts and is NOT restarted by subsequent light-OFF
    events. High humidity or dryer activity cancel/override the overrun and keep the
    fan ON.

    '
  mode: restart
  trigger:
  - entity_id: light.light_bathroom_1
    to: 'off'
    id: light_off
    trigger: state
  - entity_id: timer.bathroom_fan_overrun
    from: active
    to: idle
    id: overrun_finished
    trigger: state
  - entity_id: sensor.temphum_bathroom_humidity
    above: 70
    id: humidity_high
    trigger: numeric_state
  - entity_id: sensor.temphum_bathroom_humidity
    below: 70
    id: humidity_normal
    trigger: numeric_state
  - entity_id: sensor.suszarka_dryer_job_state
    id: dryer_changed
    trigger: state
  - entity_id:
    - input_boolean.winter_mode
    - input_boolean.pre_winter_mode
    id: season_changed
    trigger: state
  - event: start
    trigger: homeassistant
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: light_off
      - condition: state
        entity_id: fan.fan_bathroom_fan
        state: 'on'
      - condition: numeric_state
        entity_id: sensor.temphum_bathroom_humidity
        below: 70
      - condition: template
        value_template: '{{ states(''sensor.suszarka_dryer_job_state'') in [''none'',
          ''Finished''] }}

          '
      - condition: state
        entity_id: timer.bathroom_fan_overrun
        state: idle
      sequence:
      - target:
          entity_id: timer.bathroom_fan_overrun
        data:
          duration: 00:10:00
        action: timer.start
    - conditions:
      - condition: or
        conditions:
        - condition: numeric_state
          entity_id: sensor.temphum_bathroom_humidity
          above: 74
        - condition: and
          conditions:
          - condition: template
            value_template: '{{ states(''sensor.suszarka_dryer_job_state'') not in
              [''none'', ''Finished''] }}

              '
          - condition: state
            entity_id: input_boolean.winter_mode
            state: 'off'
          - condition: state
            entity_id: input_boolean.pre_winter_mode
            state: 'off'
      sequence:
      - if:
        - condition: state
          entity_id: timer.bathroom_fan_overrun
          state: active
        then:
        - target:
            entity_id: timer.bathroom_fan_overrun
          action: timer.cancel
      - target:
          entity_id: fan.fan_bathroom_fan
        action: fan.turn_on
    - conditions:
      - condition: trigger
        id:
        - humidity_normal
        - dryer_changed
        - season_changed
        - overrun_finished
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: timer.bathroom_fan_overrun
            state: active
          sequence:
          - stop: Overrun active — keep the fan ON
        default:
        - choose:
          - conditions:
            - condition: or
              conditions:
              - condition: numeric_state
                entity_id: sensor.temphum_bathroom_humidity
                above: 74
              - condition: and
                conditions:
                - condition: template
                  value_template: '{{ states(''sensor.suszarka_dryer_job_state'')
                    not in [''none'', ''Finished''] }}

                    '
                - condition: state
                  entity_id: input_boolean.winter_mode
                  state: 'off'
                - condition: state
                  entity_id: input_boolean.pre_winter_mode
                  state: 'off'
            sequence:
            - target:
                entity_id: fan.fan_bathroom_fan
              action: fan.turn_on
          default:
          - target:
              entity_id: fan.fan_bathroom_fan
            action: fan.turn_off
- id: '1755447022404'
  alias: Notify - Dishwasher
  description: Sends notifications about the dishwasher's status with duration calculation.
  mode: queued
  trigger:
  - entity_id: sensor.403100517584028828_bsh_common_status_operationstate
    trigger: state
  condition:
  - alias: Check if state is Run or Finished
    condition: template
    value_template: "{{ trigger.to_state.state in [\n  'BSH.Common.EnumType.OperationState.Run',\n
      \ 'BSH.Common.EnumType.OperationState.Finished'\n] }}"
  - alias: Ignore unavailable states
    condition: template
    value_template: '{{ trigger.from_state.state not in [''unknown'', ''unavailable'',
      ''none''] }}'
  action:
  - alias: Set variables for logic and duration
    variables:
      status_run: BSH.Common.EnumType.OperationState.Run
      status_finished: BSH.Common.EnumType.OperationState.Finished
      is_started: '{{ trigger.to_state.state == status_run }}'
      is_finished: '{{ trigger.to_state.state == status_finished }}'
      cycle_seconds: "{% if is_finished %}\n  {{ (as_timestamp(trigger.to_state.last_changed)
        - \n      as_timestamp(trigger.from_state.last_changed)) | int }}\n{% else
        %}\n  0\n{% endif %}"
      cycle_minutes: '{{ (cycle_seconds // 60) }}'
      cycle_hours: '{{ (cycle_minutes // 60) }}'
      cycle_display: "{% if cycle_hours|int > 0 %}\n  {{ cycle_hours }}h {{ (cycle_minutes
        % 60) }}m\n{% else %}\n  {{ cycle_minutes }} min\n{% endif %}"
  - alias: TTS Notification
    action: script.universal_notifier
    data:
      title: Zmywarka
      message: "{% if is_finished %}\n  Zmywarka zakończyła pracę. Możesz wyjąć naczynia.\n{%
        else %}\n  Zmywarka rozpoczęła pracę.\n{% endif %}"
      use_tts: true
      use_pushbullet: false
      phone_pawel: false
      phone_magdalena: false
  - alias: Phone Notification
    action: script.universal_notifier
    data:
      title: Zmywarka
      message: "{% if is_finished %}\n  ✅ Zmywarka zakończyła pracę.\n  ⏱ Czas trwania:
        {{ cycle_display }}\n  \U0001F37D Możesz wyładować czyste naczynia.\n{% else
        %}\n  ▶️ Zmywarka rozpoczęła pracę.\n{% endif %}"
      use_tts: false
      use_pushbullet: false
      phone_pawel: true
      phone_magdalena: true
- id: '1757618870548'
  alias: Notify - AI Window Recommendation (Smart Air Manager)
  description: Checks weather conditions (Temp, PM2.5, Rain) vs Open Windows at 21:15.
    Determines actionable advice (Close/Open) and uses AI to generate personalized
    notifications.
  mode: single
  trigger:
  - at: '20:30:00'
    trigger: time
  condition:
  - condition: state
    entity_id: input_boolean.mode_long_absence_mode
    state: 'off'
  action:
  - alias: Fetch Hourly Forecast
    target:
      entity_id: weather.dom
    data:
      type: hourly
    response_variable: weather_forecast_data
    action: weather.get_forecasts
  - alias: Calculate Variables & Determine Scenario
    variables:
      forecast: '{{ weather_forecast_data[''weather.dom''].forecast }}'
      current_pm25: '{{ states(''sensor.dom_pm2_5'') | int(0) }}'
      lowest_night_temp: "{% if forecast %}\n  {% set night_forecast = forecast |
        selectattr('datetime', 'search', 'T(0[0-5]|2[2-3]):') | list %}\n  {% if night_forecast
        %}\n    {{ night_forecast | map(attribute='temperature') | min }}\n  {% else
        %}\n    100\n  {% endif %}\n{% else %}\n  100\n{% endif %}"
      open_windows_list: "{% set window_map = {\n  'binary_sensor.contact_bedroom_contact':
        'sypialnia',\n  'binary_sensor.contact_kitchen_contact': 'kuchnia',\n  'binary_sensor.contact_livingroom_contact':
        'salon',\n  'binary_sensor.contact_piesek_left_contact': 'pokój pieska (lewe)',\n
        \ 'binary_sensor.contact_piesek_right_contact': 'pokój pieska (prawe)'\n}
        %} {% set ns = namespace(open=[]) %} {% for entity_id, friendly in window_map.items()
        %}\n  {% if is_state(entity_id, 'on') %}\n    {% set ns.open = ns.open + [friendly]
        %}\n  {% endif %}\n{% endfor %} {{ ns.open | join(', ') }}"
      forecast_cond: '{% if forecast %}{{ forecast[0].condition | lower }}{% else
        %}unknown{% endif %}'
      scenario: "{% set rain_conds = ['rainy', 'pouring', 'lightning-rainy', 'thunderstorm']
        %} {% set windows_open = (open_windows_list | length > 0) %}\n{% if windows_open
        %}\n  {# Scenariusze ZAMYKANIA #}\n  {% if lowest_night_temp < 10 %}\n    CLOSE_COLD\n
        \ {% elif current_pm25 >= 25 %}\n    CLOSE_SMOG\n  {% else %}\n    NONE\n
        \ {% endif %}\n{% else %}\n  {# Scenariusze OTWIERANIA #}\n  {% if forecast_cond
        in rain_conds and lowest_night_temp > 18 and current_pm25 < 25 %}\n    OPEN_RAIN_FRESH\n
        \ {% elif lowest_night_temp > 20 and current_pm25 < 25 %}\n    OPEN_HEAT_RELIEF\n
        \ {% else %}\n    NONE\n  {% endif %}\n{% endif %}"
  - alias: Stop if no action needed
    condition: template
    value_template: '{{ scenario != ''NONE'' }}'
  - alias: Prepare AI Prompt
    variables:
      prompt_text: "Jesteś \"Strażnikiem Powietrza\" w inteligentnym domu.  Na podstawie
        warunków wygeneruj komunikat o oknach w 3 stylach.\n--- KONTEKST SYTUACJI:
        - SCENARIUSZ: {{ scenario }} - OTWARTE OKNA: {{ open_windows_list if open_windows_list
        else \"Brak\" }} - TEMP NOCNA: {{ lowest_night_temp }}°C - PM2.5: {{ current_pm25
        }} ---\nINSTRUKCJE DLA SCENARIUSZA:\nA) JEŚLI \"CLOSE_COLD\" (Zamykamy bo
        zimno):\n   - TTS: \"Zamykamy twierdzę! Nocą temperatura spadnie do {{ lowest_night_temp
        }} stopni. Szkoda ciepła.\"\n   - PAWEL: \"\U0001F4C9 Delta T zbyt duża. Straty
        ciepła. Zamknij: {{ open_windows_list }}.\"\n   - MAGDA: \"Zamknijmy okna,
        żeby nie wychłodzić dzieciom pokoi.\"\n\nB) JEŚLI \"CLOSE_SMOG\" (Zamykamy
        bo smog):\n   - TTS: \"Alarm smogowy! Powietrze gęstnieje (PM2.5: {{ current_pm25
        }}). Odcinamy dopływ trucizny.\"\n   - PAWEL: \"⚠️ PM2.5 High ({{ current_pm25
        }}). Filtry HEPA on. Okna off.\"\n   - MAGDA: \"Powietrze jest brudne. Zamknij
        okna dla zdrowia: {{ open_windows_list }}.\"\n\nC) JEŚLI \"OPEN_RAIN_FRESH\"
        (Otwieramy na rześki deszcz):\n   - TTS: \"Nadchodzi rześkie powietrze z deszczem.
        Warto przewietrzyć, póki czysto i ciepło!\"\n   - PAWEL: \"\U0001F327️ Air
        Quality: Good. Zalecana krótka wentylacja (uwaga na parapety).\"\n   - MAGDA:
        \"Wpuśćmy trochę tlenu przed snem, powietrze jest teraz idealne.\"\n\nD) JEŚLI
        \"OPEN_HEAT_RELIEF\" (Otwieramy by schłodzić):\n   - TTS: \"Noc będzie ciepła
        ({{ lowest_night_temp }}°C). To idealny moment, by schłodzić dom.\"\n   -
        PAWEL: \"\U0001F321️ Passive Cooling Mode. Otwórz okna, by zbić temperaturę
        wewnętrzną.\"\n   - MAGDA: \"Otwórzmy okna na noc, będzie się lepiej spało
        w chłodzie.\"\n\nFORMAT ODPOWIEDZI: ###TTS### [Treść radiowa] ###PAWEL###
        [Treść dla Pawła] ###MAGDA### [Treść dla Magdy]"
  - alias: Generate AI Response
    data:
      text: '{{ prompt_text }}'
      agent_id: conversation.google_ai_conversation
    response_variable: ai_response
    action: conversation.process
  - alias: Safe Parse Logic
    variables:
      raw_text: '{{ ai_response.response.speech.plain.speech }}'
      valid_format: '{{ ''###TTS###'' in raw_text and ''###PAWEL###'' in raw_text
        and ''###MAGDA###'' in raw_text }}'
      msg_tts: '{% if valid_format %} {{ raw_text.split(''###TTS###'')[1].split(''###PAWEL###'')[0]
        | trim }} {% else %} Zalecenie dla okien: {{ scenario }} {% endif %}'
      msg_pawel: '{% if valid_format %} {{ raw_text.split(''###PAWEL###'')[1].split(''###MAGDA###'')[0]
        | trim }} {% else %} Window Check: {{ scenario }} {% endif %}'
      msg_magda: '{% if valid_format %} {{ raw_text.split(''###MAGDA###'')[1] | trim
        }} {% else %} Sprawdź okna: {{ scenario }} {% endif %}'
  - alias: Notify - TTS (Radio)
    data:
      message: '{{ msg_tts }}'
      title: "Zalecenie: Okna \U0001FA9F"
      use_tts: true
    action: script.universal_notifier
  - alias: Notify - Pawel (HVAC Tech)
    data:
      message: '{{ msg_pawel }}'
      title: "Wentylacja \U0001F4C9"
      phone_pawel: true
    action: script.universal_notifier
  - alias: Notify - Magda (Health)
    data:
      message: '{{ msg_magda }}'
      title: "Komfort Snu \U0001F319"
      phone_magdalena: true
    action: script.universal_notifier
