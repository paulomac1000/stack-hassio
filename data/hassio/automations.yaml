- id: '1761008528976'
  alias: Light - Kitchen - Automatic Control
  description: Hierarchical light control for the kitchen. Runs only in 'Auto' mode
    and is disabled when the vacuum is cleaning.
  mode: restart
  trigger:
  - entity_id: binary_sensor.motion_sensor_kitchen_extended
    trigger: state
  - entity_id: binary_sensor.guest_mode_condition_livingroom
    trigger: state
  - at:
    - '23:00:00'
    - 06:00:00
    trigger: time
  - trigger: state
    entity_id:
    - input_select.kitchen_lighting_mode
  condition:
  - condition: state
    entity_id: input_select.kitchen_lighting_mode
    state: Auto
  - condition: not
    conditions:
    - condition: state
      entity_id: vacuum.viomi_v8_9672_robot_cleaner_2
      state: cleaning
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: binary_sensor.motion_sensor_kitchen_extended
        state: 'off'
      sequence:
      - target:
          entity_id:
          - light.light_kitchen_1
          - light.light_kitchen_2
        action: light.turn_off
        data: {}
    - conditions:
      - condition: state
        entity_id: binary_sensor.guest_mode_condition_livingroom
        state: 'off'
      sequence:
      - target:
          entity_id:
          - light.light_kitchen_1
          - light.light_kitchen_2
        action: light.turn_off
    - conditions:
      - condition: template
        value_template: "{{ now().hour >= 23 and\n   (now() - states.binary_sensor.motion_sensor_kitchen_extended.last_changed).total_seconds()
          > 1200\n}}"
      sequence:
      - target:
          entity_id:
          - light.light_kitchen_1
          - light.light_kitchen_2
        action: light.turn_off
    - conditions:
      - condition: or
        conditions:
        - condition: numeric_state
          entity_id: sensor.ws2900_v2_02_02_solar_lux
          below: input_number.light_livingroom_solar_lux_lvl
        - condition: numeric_state
          entity_id: sensor.presence_livingroom_illuminance
          below: input_number.light_kitchen_illuminance_lvl
        - condition: and
          conditions:
          - condition: state
            entity_id: sensor.ws2900_v2_02_02_solar_lux
            state: unavailable
          - condition: sun
            after: sunset
      sequence:
      - target:
          entity_id: light.light_kitchen_1
        action: light.turn_on
      - target:
          entity_id:
          - light.light_kitchen_2
        action: light.turn_off
        data: {}
    default:
    - target:
        entity_id:
        - light.light_kitchen_1
        - light.light_kitchen_2
      action: light.turn_off
