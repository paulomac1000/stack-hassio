  - action: camera.snapshot
    target:
      entity_id: camera.rlc_410w_fluent
    data:
      filename: '{{ file_path }}'
  - action: input_text.set_value
    target:
      entity_id: input_text.last_snapshot_backyard
    data:
      value: '{{ filename }}'
  - action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.last_motion_time_backyard
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
  - action: input_number.increment
    target:
      entity_id: input_number.motion_count_backyard
  - action: input_text.set_value
    target:
      entity_id: input_text.recent_snapshots_backyard
    data:
      value: "{% set current = states('input_text.recent_snapshots_backyard') %} {%
        if current in ['unknown', 'unavailable', ''] %}\n  {% set current_list = []
        %}\n{% else %}\n  {% set current_list = current.split(',') | reject('eq',
        '') | list %}\n{% endif %} {% set new_list = ([filename] + current_list)[:6]
        %} {{ new_list | join(',') }}\n"
  - condition: state
    entity_id: input_boolean.mode_long_absence_mode
    state: 'on'
  - action: script.universal_notifier
    data:
      title: 'ALARM: Wykryto ruch na podwórku'
      message: Wykryto {{ detected_object }} podczas nieobecności.
      image_path: /local/archive/backyard_camera/{{ filename }}
      use_tts: false
      phone_pawel: true
      phone_magdalena: true
      use_pushbullet: true
- id: '1769173284410'
  alias: Weather AI Pack - Scheduler
  description: Generuje AI-pack rano (05:55) i wieczorem (20:00) + przy alertach
  triggers:
