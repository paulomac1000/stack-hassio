- id: '1761954116174'
  alias: Notify - AI Radio Weather Forecast (Evening Masterclass)
  description: At 21:30, waits for ideal conditions. Uses the "Masterclass" prompt
    including Meteoalarm and IMGW Hydro data for TTS and personalized briefs.
  mode: single
  trigger:
  - at: '21:30:00'
    trigger: time
  action:
  - alias: Wait for silent/dark conditions
    wait_template: '{{ is_state(''binary_sensor.device_bedroom_projector'', ''off'')
      and not is_state(''media_player.chromecast'', ''playing'') and not is_state(''media_player.projector'',
      ''playing'') and not is_state(''media_player.l018_5176'', ''playing'') }}'
    timeout: 04:00:00
    continue_on_timeout: false
  - alias: Fetch daily forecast
    data:
      type: daily
    target:
      entity_id: weather.dom
    response_variable: weather_data
    action: weather.get_forecasts
  - alias: Prepare Variables & Master Prompt
    variables:
      forecast_tomorrow: '{{ weather_data[''weather.dom''].forecast[1] }}'
      wind_bearing: '{{ forecast_tomorrow.wind_bearing }}'
      wind_direction: '{% set bearing = wind_bearing | int(0) %} {% if 337.5 <= bearing
        or bearing < 22.5 %} północny (N) {% elif 22.5 <= bearing < 67.5 %} północno-wschodni
        (NE) {% elif 67.5 <= bearing < 112.5 %} wschodni (E) {% elif 112.5 <= bearing
        < 157.5 %} południowo-wschodni (SE) {% elif 157.5 <= bearing < 202.5 %} południowy
        (S) {% elif 202.5 <= bearing < 247.5 %} południowo-zachodni (SW) {% elif 247.5
        <= bearing < 292.5 %} zachodni (W) {% elif 292.5 <= bearing < 337.5 %} północno-zachodni
        (NW) {% else %} zmienny {% endif %}'
      meteo_active: '{{ is_state(''binary_sensor.meteoalarm'', ''on'') }}'
      meteo_event: '{{ state_attr(''binary_sensor.meteoalarm'', ''Event'') | default(''Brak'')
        }}'
      meteo_desc: '{{ state_attr(''binary_sensor.meteoalarm'', ''Description'') |
        default('''') }}'
      meteo_instruction: '{{ state_attr(''binary_sensor.meteoalarm'', ''Instruction'')
        | default('''') }}'
      hydro_level: '{{ states(''sensor.warta_poznan_most_rocha_poziom_wody'') }}'
      hydro_flow: '{{ states(''sensor.warta_poznan_most_rocha_przeplyw_wody'') }}'
      hydro_alert: '{{ states(''sensor.warta_poznan_most_rocha_alert_hydrologiczny'')
        }}'
      prompt_text: "Jesteś zaawansowanym asystentem AI. Twoim zadaniem jest wygenerowanie
        odpowiedzi składającej się z TRZECH ODDZIELNYCH SEKCJI, oddzielonych separatorami.\n---
        DANE METEO NA JUTRO:  - Stan nieba: {{ forecast_tomorrow.condition }} - Temp.
        Max (dzień): {{ forecast_tomorrow.temperature }}°C  - Temp. Min (rano/noc):
        {{ forecast_tomorrow.templow }}°C  - Opady: {{ forecast_tomorrow.precipitation
        }} mm (Prawdopodobieństwo: {{ forecast_tomorrow.precipitation_probability
        }}%)  - Wiatr: {{ forecast_tomorrow.wind_speed }} km/h (kierunek: {{ wind_direction
        }})  - UV: {{ forecast_tomorrow.uv_index }}\n--- OSTRZEŻENIA (METEOALARM):
        - Status: {{ 'AKTYWNE!' if meteo_active else 'Brak' }} {% if meteo_active
        %} - Zdarzenie: {{ meteo_event }} - Opis: {{ meteo_desc }} - Instrukcja: {{
        meteo_instruction }} {% endif %}\n--- STAN RZEKI WARTY (Ciekawostka/Hydro):
        - Poziom wody: {{ hydro_level }} cm - Przepływ: {{ hydro_flow }} m³/s - Status
        alertu hydro: {{ hydro_alert }} ---\nINSTRUKCJE DLA POSZCZEGÓLNYCH SEKCJI:\n###TTS###
        (KOMUNIKAT RADIOWY - MASTERCLASS)  Wcielasz się w rolę charyzmatycznego prezentera
        radiowego. ZASADY: 1. **Hierarchia Ważności**: Jeśli Meteoalarm jest aktywny,
        MUSISZ o nim wspomnieć na początku. 2. **Narracja**: Zauważ różnicę temperatur
        (rano vs dzień). Używaj języka sensorycznego. 3. **Kontekst Rzeki**: Wspomnij
        krótko, ale WSZYSTKIE liczby poziomu wody muszą być słowne. 4. **ZASADA KLUCZOWA
        - ODMIANA LICZB**: To tekst do syntezatora mowy. WSZYSTKIE liczby, godziny
        i jednostki (stopnie, km/h) musisz zapisać SŁOWNIE i odmienić je przez przypadki.
        Nie używaj cyfr!\n   *   ŹLE: \"Jutro 15°C i wiatr 20 km/h.\"\n   *   DOBRZE:
        \"Jutro piętnaście stopni Celsjusza, a wiatr powieje z prędkością dwudziestu
        kilometrów na godzinę.\"\n\n###PAWEL### (INŻYNIER - DATA DRIVEN) Krótki status
        SMS \"Executive Summary\". Używaj CYFR. ZASADY: - Treść: Główne ryzyka (wiatr/deszcz/gołoledź).
        Meteoalarm = wykrzykniki. - **Rower (Rekreacja)**: Traktuj to WYŁĄCZNIE jako
        hobby. Jeśli pogoda zła - milcz. Jeśli dobra - napisz \"Warunki na szosę:
        Dobre\". - ❌ **HYDRO**: W tej sekcji NIE pisz nic o stanie rzeki.\n###MAGDA###
        (INŻYNIER - OPTYMALIZACJA) Krótki status SMS \"Smart Planning\". Używaj CYFR.
        ZASADY: - Treść: Jak się ubrać (delta temperatur). Bezpieczeństwo. - ❌ **HYDRO**:
        W tej sekcji NIE pisz nic o stanie rzeki.\nFORMAT ODPOWIEDZI (Użyj dokładnie
        tych separatorów!):  ###TTS### [Treść Masterclass]  ###PAWEL### [Treść dla
        Pawła]  ###MAGDA### [Treść dla Magdy]"
  - alias: Generate AI Response
    data:
      text: '{{ prompt_text }}'
      agent_id: conversation.google_ai_conversation
    response_variable: ai_response
    action: conversation.process
  - alias: Safe Parse Logic
    variables:
      raw_text: '{{ ai_response.response.speech.plain.speech }}'
      valid_format: '{{ ''###TTS###'' in raw_text and ''###PAWEL###'' in raw_text
        and ''###MAGDA###'' in raw_text }}'
      msg_tts: '{% if valid_format %} {{ raw_text.split(''###TTS###'')[1].split(''###PAWEL###'')[0]
        | trim }} {% else %} {{ raw_text }} {% endif %}'
      msg_pawel: '{% if valid_format %} {{ raw_text.split(''###PAWEL###'')[1].split(''###MAGDA###'')[0]
        | trim }} {% else %} Błąd AI - sprawdź aplikację. {% endif %}'
      msg_magda: '{% if valid_format %} {{ raw_text.split(''###MAGDA###'')[1] | trim
        }} {% else %} Błąd AI - sprawdź aplikację. {% endif %}'
  - alias: 1. Play TTS (Masterclass Radio)
    data:
      message: '{{ msg_tts }}'
      title: "Prognoza Radiowa \U0001F4FB"
      use_tts: true
    action: script.universal_notifier
  - alias: 2. Notify Pawel (Engineer Status)
    data:
      message: '{{ msg_pawel }}'
      title: "Status Pogodowy \U0001F4C9"
      phone_pawel: true
    action: script.universal_notifier
  - alias: 3. Notify Magda (Optimization Plan)
    data:
      message: '{{ msg_magda }}'
      title: "Plan na jutro \U0001F9E3"
      phone_magdalena: true
    action: script.universal_notifier
