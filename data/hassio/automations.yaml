- id: '1760649196310'
  alias: Light - Bedroom - Button Control
  description: Handles the physical button, controls lights, and switches the system
    to manual mode.
  mode: parallel
  trigger:
  - device_id: fb2c81a6706f9ac4cb9412bc98c78eb4
    domain: mqtt
    type: action
    subtype: single
    id: single
    trigger: device
  - device_id: fb2c81a6706f9ac4cb9412bc98c78eb4
    domain: mqtt
    type: action
    subtype: toggle
    id: toggle
    trigger: device
  - device_id: fb2c81a6706f9ac4cb9412bc98c78eb4
    domain: mqtt
    type: action
    subtype: double
    id: double
    trigger: device
  - device_id: fb2c81a6706f9ac4cb9412bc98c78eb4
    domain: mqtt
    type: action
    subtype: rotate_right
    id: rotate_right
    trigger: device
  - device_id: fb2c81a6706f9ac4cb9412bc98c78eb4
    domain: mqtt
    type: action
    subtype: rotate_left
    id: rotate_left
    trigger: device
  condition: []
  action:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id in [''single'', ''toggle''] }}'
      sequence:
      - target:
          entity_id:
          - light.yeelink_monoa_0559_light
          - light.yeelink_monoa_0ec8_light
        action: light.toggle
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''rotate_right'' }}'
      sequence:
      - data:
          brightness_step_pct: 10
        target:
          entity_id:
          - light.yeelink_monoa_0559_light
          - light.yeelink_monoa_0ec8_light
        action: light.turn_on
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''rotate_left'' }}'
      sequence:
      - data:
          brightness_step_pct: -10
        target:
          entity_id:
          - light.yeelink_monoa_0559_light
          - light.yeelink_monoa_0ec8_light
        action: light.turn_on
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''double'' }}'
      sequence:
      - target:
          entity_id:
          - light.yeelink_monoa_0559_light
          - light.yeelink_monoa_0ec8_light
          - light.light_bedroom_1
          - light.light_bedroom_2
        action: light.turn_off
  - if:
    - condition: not
      conditions:
      - condition: state
        entity_id: input_select.bedroom_lighting_mode
        state: Cinema Mode
      - condition: state
        entity_id: input_select.bedroom_lighting_mode
        state: Sen
    - condition: time
      before: '21:00:00'
    - condition: or
      conditions:
      - condition: time
        after: 09:00:00
        weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
      - condition: time
        after: '10:00:00'
        weekday:
        - sat
        - sun
    then:
    - target:
        entity_id: input_select.bedroom_lighting_mode
      data:
        option: Manual
      action: input_select.select_option
- id: '1760649280777'
  alias: Light - Bedroom - Cinema Mode Management
  description: Automatically enables and disables Cinema Mode based on the projector's
    status, with smart logic for returning to Sleep or Auto mode.
  triggers:
  - alias: Projector turned on
    entity_id:
    - binary_sensor.device_bedroom_projector
    to: 'on'
    from: 'off'
    id: cinema_on
    trigger: state
  - alias: Projector turned off
    entity_id:
    - binary_sensor.device_bedroom_projector
    to: 'off'
    from: 'on'
    id: cinema_off
    trigger: state
  - alias: Lighting mode was set to Cinema Mode
    entity_id:
    - input_select.bedroom_lighting_mode
    to: Cinema Mode
    id: cinema_mode_set
    trigger: state
  actions:
  - choose:
    - alias: Enable Cinema Mode
      conditions:
      - condition: trigger
        id: cinema_mode_set
      sequence:
      - alias: Set lighting mode to Cinema
        target:
          entity_id: input_select.bedroom_lighting_mode
        data:
          option: Cinema Mode
        action: input_select.select_option
      - alias: Turn off all bedroom lights
        target:
          entity_id:
          - light.light_bedroom_1
          - light.light_bedroom_2
          - light.yeelink_monoa_0559_light
          - light.yeelink_monoa_0ec8_light
        action: light.turn_off
    - alias: Disable Cinema Mode
      conditions:
      - condition: trigger
        id: cinema_off
      - alias: Not already in Sleep mode
        condition: not
        conditions:
        - condition: state
          entity_id: input_select.bedroom_lighting_mode
          state: Sen
      sequence:
      - choose:
        - alias: Switch to Sleep Mode (occupied + night time)
          conditions:
          - condition: and
            conditions:
            - alias: Someone is in bedroom
              condition: state
              entity_id: binary_sensor.presence_bedroom_presence
              state: 'on'
            - alias: Night time hours
              condition: time
              after: '21:00:00'
              before: 06:00:00
          sequence:
          - alias: Set lighting mode to Sleep
            target:
              entity_id: input_select.bedroom_lighting_mode
            data:
              option: Sen
            action: input_select.select_option
        default:
        - alias: Set lighting mode to Auto
          target:
            entity_id: input_select.bedroom_lighting_mode
          data:
            option: Auto
          action: input_select.select_option
  mode: single
- id: '1760649312265'
  alias: Light - Bedroom - Reset to Auto Mode
