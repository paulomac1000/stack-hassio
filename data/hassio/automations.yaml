- id: '1761520588637'
  alias: Light - Bedroom - Exit Sleep Mode
  description: 'Multi-layered logic for exiting Sleep Mode (Sen) and returning to
    Auto mode. Exit Strategies: 1. Smart Wake Up: Triggered when bedroom occupancy
    is lost for 20 minutes between 08:00 and 11:00, provided there was recent bed
    vibration (confirming the user was actually in bed and then left). 2. Morning
    Stairs Activity: Triggered by motion on the stairs between 07:00 and 12:00, assuming
    the user has left the sleeping area. 3. Manual Override: Triggered immediately
    if any bedroom light is turned on manually. 4. Failsafe: A hard reset at 10:30
    to ensure the system doesn''t stay in Sleep Mode all day. Logging: Each exit path
    logs a specific reason to the system log for auditing.'
  triggers:
  - alias: Occupancy lost for 20 minutes
    id: presence_loss
    entity_id:
    - binary_sensor.presence_bedroom_presence
    to: 'off'
    for:
      minutes: 20
    trigger: state
  - alias: Any bedroom light turned on
    id: light_on
    entity_id:
    - light.yeelink_monoa_0559_light
    - light.yeelink_monoa_0ec8_light
    - light.light_bedroom_1
    - light.light_bedroom_2
    to: 'on'
    trigger: state
  - alias: Motion detected on stairs
    id: stairs_motion
    entity_id:
    - binary_sensor.presence_stairs_presence
    to: 'on'
    trigger: state
  - alias: Failsafe time reached
    id: failsafe_time
    at: '10:30:00'
    trigger: time
  conditions:
  - alias: System must be in Sleep Mode
    condition: state
    entity_id: input_select.bedroom_lighting_mode
    state: Sen
  actions:
  - choose:
    - alias: 'Path 1: Smart Wake Up (Presence loss + Bed activity)'
      conditions:
      - alias: Triggered by presence loss
        condition: trigger
        id: presence_loss
      - alias: Is morning time (08:00 - 11:00)
        condition: time
        after: 08:00:00
        before: '11:00:00'
      - alias: Recent bed vibration detected (within 1000s)
        condition: template
        value_template: '{{ (as_timestamp(now()) -  as_timestamp(states.binary_sensor.vibration_bedroom_bed_vibration.last_changed
          | default(0))) < 1000 }}'
      sequence:
      - alias: Reset mode to Auto
        action: input_select.select_option
        target:
          entity_id: input_select.bedroom_lighting_mode
        data:
          option: Auto
      - alias: Log Smart Wake Up exit
        action: system_log.write
        data:
          message: 'Bedroom Sleep Mode exited: Smart Wake Up (Presence loss + recent
            bed activity).'
          level: info
          logger: bedroom_automation
    - alias: 'Path 2: Stairs Motion (Morning activity)'
      conditions:
      - alias: Triggered by stairs motion
        condition: trigger
        id: stairs_motion
      - alias: Is morning time (07:00 - 12:00)
        condition: time
        after: 07:00:00
        before: '12:00:00'
      sequence:
      - alias: Reset mode to Auto
        action: input_select.select_option
        target:
          entity_id: input_select.bedroom_lighting_mode
        data:
          option: Auto
      - alias: Log Stairs Motion exit
        action: system_log.write
        data:
          message: 'Bedroom Sleep Mode exited: Morning activity detected on stairs.'
          level: info
          logger: bedroom_automation
    - alias: 'Path 3: Manual Override or Failsafe'
      conditions:
      - alias: Triggered by light or failsafe time
        condition: or
        conditions:
        - condition: trigger
          id: failsafe_time
        - condition: trigger
          id: light_on
      sequence:
      - alias: Reset mode to Auto
        action: input_select.select_option
        target:
          entity_id: input_select.bedroom_lighting_mode
        data:
          option: Auto
      - alias: Log Manual/Failsafe exit
        action: system_log.write
        data:
          message: 'Bedroom Sleep Mode exited: Manual override or failsafe time reached.'
          level: info
          logger: bedroom_automation
  mode: single
