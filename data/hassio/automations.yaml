- id: '1710378841498'
  alias: Watchdog - OpenBK devices
  description: Execute GET request for unavailable Beken Corporation devices
  mode: single
  trigger:
  - hours: /1
    trigger: time_pattern
  - event: start
    trigger: homeassistant
  - command: Napraw połączenie z urządzeniami ołpen bejken
    trigger: conversation
  - entity_id:
    - number.unavailable_openbeaken_devices_count
    to:
    trigger: state
  condition:
  - condition: template
    value_template: '{{ now() >= state_attr(''automation.watchdog_openbk_devices'',''last_triggered'')|as_local
      + timedelta(minutes=2) }}'
  action:
  - variables:
      devices: "{% set ns = namespace(devices=[], seen=[]) %} {% for state in states.switch
        if device_attr(state.entity_id, 'manufacturer') == 'Beken Corporation' and
        state.state == 'unavailable' -%}\n  {% set device_url = device_attr(state.entity_id,
        \"configuration_url\") %}\n  {% if device_url %}\n    {% set device_ip = device_url.split('//')[1].split('/')[0]
        %}\n    {% if device_ip not in ns.seen %}\n      {% set ns.devices = ns.devices
        + [device_ip] %}\n      {% set ns.seen = ns.seen + [device_ip] %}\n    {%
        endif %}\n  {% endif %}\n{%- endfor %} {% for state in states.light if device_attr(state.entity_id,
        'manufacturer') == 'Beken Corporation' and state.state == 'unavailable' -%}\n
        \ {% set device_url = device_attr(state.entity_id, \"configuration_url\")
        %}\n  {% if device_url %}\n    {% set device_ip = device_url.split('//')[1].split('/')[0]
        %}\n    {% if device_ip not in ns.seen %}\n      {% set ns.devices = ns.devices
        + [device_ip] %}\n      {% set ns.seen = ns.seen + [device_ip] %}\n    {%
        endif %}\n  {% endif %}\n{%- endfor %} {{ ns.devices }}\n"
  - condition: template
    value_template: '{{ devices | length > 0 }}'
  - action: system_log.write
    data:
      message: 'OpenBK Watchdog: Found {{ devices | length }} unavailable device(s):
        {{ devices | join('', '') }}'
      level: info
  - repeat:
      for_each: '{{ devices }}'
      sequence:
      - action: rest_command.openbk_restart
        continue_on_error: true
        data:
          ip: '{{ repeat.item }}'
      - delay:
          milliseconds: 500
      - action: system_log.write
        data:
          message: 'OpenBK Watchdog: Attempted restart for {{ repeat.item }}'
          level: info
