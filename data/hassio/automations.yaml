- id: '1769173378942'
  alias: Notify - Window Recommendation (No AI)
  description: Deterministyczne zalecenia dot. okien. ZERO wywołań AI.
  triggers:
  - at: '20:30:00'
    trigger: time
  conditions:
  - condition: state
    entity_id: input_boolean.mode_long_absence_mode
    state: 'off'
  actions:
  - alias: Fetch Hourly Forecast
    action: weather.get_forecasts
    target:
      entity_id: weather.dom
    data:
      type: hourly
    response_variable: hourly_data
  - alias: Calculate Scenario
    variables:
      forecast: '{{ hourly_data[''weather.dom''].forecast }}'
      pm25: '{{ states(''sensor.dom_pm2_5'') | int(0) }}'
      lowest_night_temp: "{% if forecast %}\n  {% set night = forecast | selectattr('datetime',
        'search', 'T(0[0-5]|2[2-3]):') | list %}\n  {% if night %}{{ night | map(attribute='temperature')
        | min | round(0) }}\n  {% else %}15{% endif %}\n{% else %}15{% endif %}\n"
      open_windows: "{% set windows = {\n  'binary_sensor.contact_bedroom_contact':
        'sypialnia',\n  'binary_sensor.contact_kitchen_contact': 'kuchnia',\n  'binary_sensor.contact_livingroom_contact':
        'salon',\n  'binary_sensor.contact_piesek_left_contact': 'pokój pieska (L)',\n
        \ 'binary_sensor.contact_piesek_right_contact': 'pokój pieska (P)'\n} %} {%
        set ns = namespace(open=[]) %} {% for entity, name in windows.items() %}\n
        \ {% if is_state(entity, 'on') %}\n    {% set ns.open = ns.open + [name] %}\n
        \ {% endif %}\n{% endfor %} {{ ns.open | join(', ') }}\n"
      has_open: '{{ open_windows | length > 0 }}'
      forecast_cond: '{{ forecast[0].condition | lower if forecast else ''unknown''
        }}'
      rain_conds: '{{ [''rainy'', ''pouring'', ''lightning-rainy'', ''thunderstorm'']
        }}'
      scenario: "{% if has_open %}\n  {% if lowest_night_temp < 10 %}CLOSE_COLD\n
        \ {% elif pm25 >= 25 %}CLOSE_SMOG\n  {% else %}NONE{% endif %}\n{% else %}\n
        \ {% if forecast_cond in rain_conds and lowest_night_temp > 18 and pm25 <
        25 %}OPEN_RAIN_FRESH\n  {% elif lowest_night_temp > 20 and pm25 < 25 %}OPEN_HEAT_RELIEF\n
        \ {% else %}NONE{% endif %}\n{% endif %}\n"
      temp_word: '{% set t = lowest_night_temp | int %} {% set words = {0:''zero'',1:''jeden'',2:''dwa'',3:''trzy'',4:''cztery'',5:''pięć'',6:''sześć'',7:''siedem'',8:''osiem'',9:''dziewięć'',10:''dziesięć'',11:''jedenaście'',12:''dwanaście'',13:''trzynaście'',14:''czternaście'',15:''piętnaście'',16:''szesnaście'',17:''siedemnaście'',18:''osiemnaście'',19:''dziewiętnaście'',20:''dwadzieścia'',21:''dwadzieścia
        jeden'',22:''dwadzieścia dwa'',23:''dwadzieścia trzy'',24:''dwadzieścia cztery'',25:''dwadzieścia
        pięć''} %} {% if t in words %}{{ words[t] }} {% elif t < 0 %}minus {{ words[t|abs]
        if t|abs in words else t|abs }} {% else %}{{ t }}{% endif %}

        '
      msg_tts: '{% if scenario == ''CLOSE_COLD'' %} Zamykamy twierdzę! Nocą temperatura
        spadnie do {{ temp_word }} stopni. Szkoda ciepła. {% elif scenario == ''CLOSE_SMOG''
        %} Alarm smogowy! Powietrze jest zanieczyszczone. Zamykamy okna dla zdrowia.
        {% elif scenario == ''OPEN_RAIN_FRESH'' %} Nadchodzi rześkie powietrze z deszczem.
        Warto przewietrzyć, powietrze jest teraz czyste! {% elif scenario == ''OPEN_HEAT_RELIEF''
        %} Noc będzie ciepła, ponad {{ temp_word }} stopni. Idealny moment by schłodzić
        dom otwierając okna. {% endif %}

        '
      msg_pawel: "{% if scenario == 'CLOSE_COLD' %} \U0001F4C9 T_night = {{ lowest_night_temp
        }}°C. Straty ciepła. Zamknij: {{ open_windows }}. {% elif scenario == 'CLOSE_SMOG'
        %} ⚠️ PM2.5 = {{ pm25 }}. Filtry HEPA on. Zamknij: {{ open_windows }}. {%
        elif scenario == 'OPEN_RAIN_FRESH' %} \U0001F327️ PM2.5 = {{ pm25 }}. Zalecana
        krótka wentylacja (uwaga parapety). {% elif scenario == 'OPEN_HEAT_RELIEF'
        %} \U0001F321️ T_night = {{ lowest_night_temp }}°C. Passive Cooling. Otwórz
        okna. {% endif %}\n"
      msg_magda: "{% if scenario == 'CLOSE_COLD' %} \U0001F9E3 Zamknijmy okna na noc,
        żeby nie wychłodzić pokoi. Otwarte: {{ open_windows }}. {% elif scenario ==
        'CLOSE_SMOG' %} \U0001F637 Powietrze brudne. Zamknij okna dla zdrowia: {{
        open_windows }}. {% elif scenario == 'OPEN_RAIN_FRESH' %} \U0001F327️ Wpuśćmy
        świeże powietrze, jest teraz idealnie czyste! {% elif scenario == 'OPEN_HEAT_RELIEF'
        %} \U0001F319 Otwórzmy okna na noc, będzie się lepiej spało w chłodzie. {%
        endif %}\n"
  - alias: Stop if no action needed
    condition: template
    value_template: '{{ scenario != ''NONE'' }}'
  - alias: Play TTS
    action: script.universal_notifier
    data:
      message: '{{ msg_tts }}'
      title: "Zalecenie: Okna \U0001FA9F"
      use_tts: true
  - alias: Notify Paweł
