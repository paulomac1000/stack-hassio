            blinds_stop_c: switch.curtains_bedroom_stop
      - alias: Control Blinds
        action: switch.turn_on
        target:
          entity_id: '{{ sw[trigger.id] }}'
    - alias: HA Blinds Sync Handler
      conditions:
      - condition: trigger
        id: ha_blinds
      sequence:
      - alias: Calculate Blinds Variables
        variables:
          b_open: '{{ is_state(''switch.curtains_bedroom_open'', ''on'') }}'
          b_close: '{{ is_state(''switch.curtains_bedroom_close'', ''on'') }}'
          b_text: '{% if b_open %}OTWIERANIE{% elif b_close %}ZAMYKANIE{% else %}ZATRZYMANE{%
            endif %}'
          b_color: '{% if b_open %}#4CAF50{% elif b_close %}#FF9800{% else %}#9E9E9E{%
            endif %}'
      - alias: 'MQTT: Update Blinds'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p4b100.border_color={{ b_color }}","p4b101.text_color={{ b_color
            }}","p4b102.text={{ b_text }}","p4b41.hidden={{ 1 if b_open else 0 }}","p4b42.hidden={{
            0 if b_open else 1 }}","p4b43.hidden={{ 1 if b_close else 0 }}","p4b44.hidden={{
            0 if b_close else 1 }}"]'
    - alias: Cinema Toggle Handler
      conditions:
      - condition: trigger
        id:
        - proj_toggle
        - spk_toggle
      - condition: template
        value_template: '{{ trigger.payload_json.val is defined }}'
      sequence:
      - alias: Toggle Equipment
        action: switch.turn_{{ 'on' if trigger.payload_json.val == 1 else 'off' }}
        target:
          entity_id: '{{ ''switch.power_strip_3'' if trigger.id == ''proj_toggle''
            else ''switch.power_strip_2'' }}'
      - if:
        - alias: Check Projector Toggle
          condition: template
          value_template: '{{ trigger.id == ''proj_toggle'' }}'
        then:
        - alias: 'LOG: Projector Toggle'
          action: system_log.write
          data:
            level: info
            message: 'OpenHASP: Projector toggled to {{ ''ON'' if trigger.payload_json.val
              == 1 else ''OFF'' }}.'
    - alias: Cinema Mode Button Handler
      conditions:
      - condition: trigger
        id: cinema_mode_btn
      - condition: template
        value_template: '{{ trigger.payload_json.event == ''down'' }}'
      sequence:
      - alias: Set Cinema Mode
        action: input_select.select_option
        target:
          entity_id: input_select.bedroom_lighting_mode
        data:
          option: Cinema Mode
      - alias: 'LOG: Cinema Mode'
        action: system_log.write
        data:
          level: info
          message: 'OpenHASP: Cinema Mode activated from Page 5.'
    - alias: Cinema Shutdown Handler
      conditions:
      - condition: trigger
        id: cinema_off
      - condition: template
        value_template: '{{ trigger.payload_json.event == ''down'' }}'
      sequence:
      - alias: Turn Off Equipment
        action: switch.turn_off
        target:
          entity_id:
          - switch.power_strip_3
          - switch.power_strip_2
      - alias: Set Auto Mode
        action: input_select.select_option
        target:
          entity_id: input_select.bedroom_lighting_mode
        data:
          option: Auto
      - alias: 'LOG: Cinema Shutdown'
        action: system_log.write
        data:
          level: info
          message: 'OpenHASP: Cinema Shutdown triggered. Equipment OFF, Mode AUTO.'
    - alias: HA Cinema Sync Handler
      conditions:
      - condition: trigger
        id: ha_cinema
      sequence:
      - alias: Calculate Cinema Variables
        variables:
          proj_on: '{{ is_state(''binary_sensor.device_bedroom_projector'', ''on'')
            }}'
          proj_pwr: '{{ is_state(''switch.power_strip_3'', ''on'') }}'
          spk_on: '{{ is_state(''switch.power_strip_2'', ''on'') }}'
          proj_text: '{% if proj_on %}Ogląda{% elif proj_pwr %}Czuwanie{% else %}Wyłączony{%
            endif %}'
          proj_color: '{% if proj_on %}#9C27B0{% elif proj_pwr %}#FF9800{% else %}#555555{%
            endif %}'
      - alias: 'MQTT: Update Cinema'
        action: mqtt.publish
        data:
          topic: hasp/{{ plate }}/command/json
          payload: '["p5b101.text_color={{ proj_color }}","p5b103.text={{ proj_text
            }}","p5b103.text_color={{ proj_color }}","p5b51.val={{ 1 if proj_pwr else
            0 }}","p5b52.val={{ 1 if spk_on else 0 }}"]'
  mode: queued
  max: 15
  variables:
    plate: plate
- id: '1764272604460'
  alias: Notify - Bedroom - Humidifier Contextual Presence
  description: TTS notification based on presence using 'this' object
  triggers:
  - entity_id: sensor.zhimi_ca4_e6f6_water_level_2
    below: 15
    trigger: numeric_state
  - entity_id:
    - binary_sensor.motion_sensor_bedroom_extended
    - binary_sensor.motion_sensor_stairs_extended
    - binary_sensor.motion_sensor_piesek_extended
    to: 'on'
    trigger: state
  - entity_id: light.light_bathroom_1
    to: 'on'
    trigger: state
  - trigger: time
    at: 08:30:00
  - trigger: time
    at: '20:30:00'
  conditions:
  - condition: numeric_state
    entity_id: sensor.zhimi_ca4_e6f6_water_level_2
    below: 15
  - condition: state
    entity_id: input_boolean.mode_long_absence_mode
    state: 'off'
  - condition: template
    value_template: '{% set last = this.attributes.last_triggered %} {{ last is none
      or (now() - last).total_seconds() > 7200 }}

      '
  actions:
  - alias: Silent Mobile Notification
    data:
      title: "\U0001F4A7 Nawilżacz: Niski poziom"
      message: 'Woda: {{ states(''sensor.zhimi_ca4_e6f6_water_level_2'') }}%. Uzupełnij
        zbiornik.'
      phone_pawel: true
      phone_magdalena: true
      use_tts: false
    action: script.universal_notifier
  - alias: Conditional TTS
