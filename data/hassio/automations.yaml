- id: '1760659782369'
  alias: Light - LivingRoom - Automatic Control
  description: Controls main ceiling lights in Living Room based on Motion and TV.
    Prioritizes Guest Mode. Ignores Vacuum for turning ON, but prevents turning OFF
    if Vacuum is working while lights are already on.
  mode: restart
  trigger:
  - entity_id:
    - binary_sensor.motion_sensor_livingroom_extended
    - binary_sensor.tv_enabled
    - binary_sensor.guest_mode_condition_livingroom
    trigger: state
  - entity_id: input_select.livingroom_lighting_mode
    to: Auto
    trigger: state
  - at:
    - '23:00:00'
    - 06:00:00
    trigger: time
  condition:
  - alias: Ensure Auto Mode is active
    condition: state
    entity_id: input_select.livingroom_lighting_mode
    state: Auto
  action:
  - alias: Calculate Context Variables
    variables:
      is_guest_mode_off: '{{ is_state(''binary_sensor.guest_mode_condition_livingroom'',
        ''off'') }}'
      is_tv_on: '{{ is_state(''binary_sensor.tv_enabled'', ''on'') }}'
      is_motion: '{{ is_state(''binary_sensor.motion_sensor_livingroom_extended'',
        ''on'') }}'
      is_dark_solar: '{{ states(''sensor.ws2900_v2_02_02_solar_lux'') | float(999)
        < states(''input_number.light_livingroom_solar_lux_lvl'') | float(0) }}'
      is_dark_indoor: '{{ states(''sensor.presence_livingroom_illuminance'') | float(999)
        < states(''input_number.light_livingroom_illuminance_lvl'') | float(0) }}'
      is_dark_backup: '{{ is_state(''sensor.ws2900_v2_02_02_solar_lux'', ''unavailable'')
        and is_state(''sun.sun'', ''below_horizon'') }}'
      is_dark: '{{ is_dark_solar or is_dark_indoor or is_dark_backup }}'
      is_night_time: '{{ now().hour >= 23 or now().hour < 6 }}'
      can_turn_off: "{{ not is_motion and not is_tv_on and\n   not is_state('vacuum.viomi_v8_9672_robot_cleaner_2',
        'cleaning') }}"
  - alias: Execute Logic
    choose:
    - conditions:
      - condition: template
        value_template: '{{ is_guest_mode_off }}'
      sequence:
      - target:
          entity_id:
          - light.light_livingroom_1
          - light.light_livingroom_2
        action: light.turn_off
      - stop: Guest mode OFF.
    - conditions:
      - condition: template
        value_template: '{{ is_tv_on }}'
      sequence:
      - target:
          entity_id: light.light_livingroom_2
        action: light.turn_on
      - target:
          entity_id: light.light_livingroom_1
        action: light.turn_off
    - conditions:
      - condition: template
        value_template: '{{ is_motion and is_night_time }}'
      sequence:
      - target:
          entity_id: light.light_livingroom_2
        action: light.turn_on
      - target:
          entity_id: light.light_livingroom_1
        action: light.turn_off
    - conditions:
      - condition: template
        value_template: '{{ is_motion and is_dark }}'
      sequence:
      - target:
          entity_id: light.light_livingroom_1
        action: light.turn_on
      - target:
          entity_id: light.light_livingroom_2
        action: light.turn_off
    - conditions:
      - condition: template
        value_template: '{{ is_motion and not is_dark }}'
      sequence:
      - target:
          entity_id:
          - light.light_livingroom_1
          - light.light_livingroom_2
        action: light.turn_off
    - conditions:
      - condition: template
        value_template: '{{ can_turn_off }}'
      sequence:
      - target:
          entity_id:
          - light.light_livingroom_1
          - light.light_livingroom_2
        action: light.turn_off
- id: '1760659816796'
  alias: Light - LivingRoom - Switch to Manual Mode
  description: Detects manual light changes to switch to 'Manual' mode, but is disabled
