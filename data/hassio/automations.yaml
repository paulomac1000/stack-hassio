    metadata: {}
    data:
      evaluate_payload: false
      qos: 0
      retain: false
      topic: cmnd/BK7231N_512300023/IRSEND
      payload: NEC 0xEB14FF00 0x14 0
- id: '1713878659406'
  alias: Notify - Scooter fully charged
  description: Turns off the scooter charger when current drops (battery full), calculates
    charging time, and sends notifications.
  mode: single
  trigger:
  - entity_id: sensor.socket_entrance_scooter_power
    below: 5
    for: 00:01:00
    trigger: numeric_state
  condition:
  - alias: Ensure switch is actually ON
    condition: state
    entity_id: switch.socket_entrance_scooter
    state: 'on'
  action:
  - alias: Calculate charging duration
    variables:
      start_time: '{{ as_timestamp(states.switch.socket_entrance_scooter.last_changed)
        }}'
      end_time: '{{ as_timestamp(now()) }}'
      cycle_seconds: '{{ (end_time - start_time) | int }}'
      cycle_minutes: '{{ (cycle_seconds // 60) }}'
      cycle_hours: '{{ (cycle_minutes // 60) }}'
      cycle_display: "{% if cycle_hours|int > 0 %}\n  {{ cycle_hours }}h {{ (cycle_minutes
        % 60) }}m\n{% else %}\n  {{ cycle_minutes }} min\n{% endif %}"
  - alias: Turn off the charger
    target:
      entity_id: switch.socket_entrance_scooter
    action: switch.turn_off
  - alias: TTS Notification
    action: script.universal_notifier
    data:
      title: Hulajnoga
      message: Hulajnoga naładowana. Zasilanie zostało wyłączone.
      use_tts: true
      phone_pawel: false
      phone_magdalena: false
      use_pushbullet: false
  - alias: Phone Notification
    action: script.universal_notifier
    data:
      title: Hulajnoga
      message: "\U0001F50B Hulajnoga w pełni naładowana. ⏱ Czas ładowania: {{ cycle_display
        }} \U0001F50C Gniazdko zostało wyłączone automatycznie."
      use_tts: false
      phone_pawel: true
      phone_magdalena: false
      use_pushbullet: false
- id: '1714348135310'
  alias: Powiadomienie o odebranym kodzie RF
  description: ''
  trigger:
  - platform: mqtt
    topic: tele/tasmota_DF83AE/RESULT
  condition:
  - condition: template
