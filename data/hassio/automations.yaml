- id: '1760657070206'
  alias: Light - Piesek - Automatic Control
  description: 'Hierarchical light control for Piesek''s room. Runs only in ''Auto''
    mode AND guest condition is met. PC presence triggers mood lighting (purple, 25%)
    in evening hours (22:00-06:00), normal Yeelink during day. Includes mutual failsafe:
    Yeelink unavailable → Primary on, Primary unavailable → Yeelink on.'
  triggers:
  - alias: Presence sensor changed
    entity_id: binary_sensor.presence_piesek_presence
    trigger: state
  - alias: PC power state changed
    entity_id: binary_sensor.device_piesek_pc
    trigger: state
  - alias: Lighting mode changed
    entity_id: input_select.piesek_lighting_mode
    trigger: state
  - alias: Home Assistant started
    trigger: homeassistant
    event: start
  - alias: Evening mood trigger (22:00)
    at: '22:00:00'
    trigger: time
  - alias: Evening mood trigger (sunset +1h)
    event: sunset
    offset: +01:00:00
    trigger: sun
  conditions:
  - alias: Lighting mode must be Auto
    condition: state
    entity_id: input_select.piesek_lighting_mode
    state: Auto
  - alias: Guest mode condition must be met
    condition: state
    entity_id: binary_sensor.guest_mode_condition_piesek
    state: 'on'
  actions:
  - choose:
    - alias: 1. No presence → Turn off all lights
      conditions:
      - condition: state
        entity_id: binary_sensor.presence_piesek_presence
        state: 'off'
      sequence:
      - alias: Turn off all lights with transition
        target:
          entity_id:
          - light.light_piesek_1
          - light.light_piesek_2
          - light.yeelink_color2_0510_light
        data:
          transition: 1
        action: light.turn_off
    - alias: 2. PC ON + Evening (22:00–06:00 or after sunset) → Yeelink MOOD
      conditions:
      - condition: state
        entity_id: binary_sensor.presence_piesek_presence
        state: 'on'
      - condition: state
        entity_id: binary_sensor.device_piesek_pc
        state: 'on'
      - condition: or
        conditions:
        - condition: time
          after: '22:00:00'
          before: 06:00:00
        - condition: sun
          after: sunset
      sequence:
      - choose:
        - alias: Yeelink available → Mood lighting
          conditions:
          - condition: template
            value_template: "{{ not is_state('light.yeelink_color2_0510_light', 'unavailable')\n
              \  and not is_state('light.yeelink_color2_0510_light', 'unknown') }}"
          sequence:
          - alias: Yeelink mood — deep lavender
            target:
              entity_id: light.yeelink_color2_0510_light
            data:
              rgb_color:
              - 180
              - 100
              - 255
              brightness_pct: 25
              transition: 60
            action: light.turn_on
          - alias: Turn off primary lights
            target:
              entity_id:
              - light.light_piesek_1
              - light.light_piesek_2
            action: light.turn_off
            data: {}
        default:
        - alias: Failsafe — Yeelink unavailable, use Primary
          target:
            entity_id: light.light_piesek_1
          action: light.turn_on
          data: {}
    - alias: 3. PC ON + Day → Yeelink NORMAL (failsafe to Primary)
      conditions:
      - condition: state
        entity_id: binary_sensor.presence_piesek_presence
        state: 'on'
      - condition: state
        entity_id: binary_sensor.device_piesek_pc
        state: 'on'
      - condition: numeric_state
        entity_id: sensor.presence_piesek_illuminance
        below: input_number.light_piesek_illuminance_lvl
      sequence:
      - choose:
        - alias: Yeelink available → Normal mode
          conditions:
          - condition: template
            value_template: "{{ not is_state('light.yeelink_color2_0510_light', 'unavailable')\n
              \  and not is_state('light.yeelink_color2_0510_light', 'unknown') }}"
          sequence:
          - alias: Turn on Yeelink (default settings)
            target:
              entity_id: light.yeelink_color2_0510_light
            action: light.turn_on
            data: {}
          - alias: Turn off primary lights
            target:
              entity_id:
              - light.light_piesek_1
              - light.light_piesek_2
            action: light.turn_off
            data: {}
        default:
        - alias: Failsafe — Yeelink unavailable, use Primary
          target:
            entity_id: light.light_piesek_1
          action: light.turn_on
          data: {}
        - alias: Turn off Yeelink
          target:
            entity_id: light.yeelink_color2_0510_light
          action: light.turn_off
          data: {}
    - alias: 4. Dark, no PC → Primary Light (failsafe to Yeelink)
      conditions:
      - condition: state
        entity_id: binary_sensor.presence_piesek_presence
        state: 'on'
      - condition: or
        conditions:
        - condition: numeric_state
          entity_id: sensor.presence_piesek_illuminance
          below: input_number.light_piesek_illuminance_lvl
        - condition: state
          entity_id: light.light_piesek_1
          state: 'on'
      sequence:
      - choose:
        - alias: Primary available → Activate Primary
          conditions:
          - condition: template
            value_template: "{{ not is_state('light.light_piesek_1', 'unavailable')\n
              \  and not is_state('light.light_piesek_1', 'unknown') }}"
          sequence:
          - alias: Turn on Primary light
            target:
              entity_id: light.light_piesek_1
            action: light.turn_on
            data: {}
          - alias: Turn off Yeelink
            target:
              entity_id: light.yeelink_color2_0510_light
            action: light.turn_off
            data: {}
        default:
        - alias: Failsafe — Primary unavailable, use Yeelink
          target:
            entity_id: light.yeelink_color2_0510_light
          action: light.turn_on
          data: {}
        - alias: Turn off Primary light
          target:
            entity_id: light.light_piesek_1
          action: light.turn_off
          data: {}
    - alias: 5. Secondary light ON → Do nothing (manual override)
      conditions:
      - condition: state
        entity_id: light.light_piesek_2
        state: 'on'
      sequence: []
    default:
    - alias: Default — Turn off all lights
      target:
        entity_id:
        - light.light_piesek_1
        - light.light_piesek_2
        - light.yeelink_color2_0510_light
      action: light.turn_off
      data: {}
  mode: restart
