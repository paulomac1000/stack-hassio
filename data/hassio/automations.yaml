- id: '1711328559573'
  alias: Purifier - Bedroom - Automatic Control
  description: 'Controls bedroom purifier. Runs whenever air quality is poor (>15),
    ignoring motion. Prioritizes: Window/Absence (OFF) -> Sleep Mode/Darkness (Silent)
    -> Standard (Auto).'
  triggers:
  - entity_id:
    - sensor.zhimi_mb4a_e02f_pm25_density_2
    - binary_sensor.contact_bedroom_contact
    trigger: state
  - entity_id: input_boolean.mode_long_absence_mode
    trigger: state
  - entity_id: input_select.bedroom_lighting_mode
    trigger: state
  - entity_id:
    - light.light_bedroom_1
    - light.light_bedroom_2
    trigger: state
  conditions: []
  actions:
  - alias: Calculate Logic Variables
    variables:
      current_pm25: '{{ states(''sensor.zhimi_mb4a_e02f_pm25_density_2'') | int(0)
        }}'
      is_window_open: '{{ is_state(''binary_sensor.contact_bedroom_contact'', ''on'')
        }}'
      is_long_absence: '{{ is_state(''input_boolean.mode_long_absence_mode'', ''on'')
        }}'
      is_sleep_mode_selected: '{{ is_state(''input_select.bedroom_lighting_mode'',
        ''Sen'') }}'
      are_lights_off: "{{ is_state('light.light_bedroom_1', 'off') and \n   is_state('light.light_bedroom_2',
        'off') and \n   is_state('light.yeelink_monoa_0559_light', 'off') and \n   is_state('light.yeelink_monoa_0ec8_light',
        'off') }}"
      is_sleeping_context: '{{ is_sleep_mode_selected and are_lights_off }}'
      should_be_off: '{{ is_window_open or is_long_absence or current_pm25 < 15 }}'
      should_be_silent: '{{ not should_be_off and is_sleeping_context }}'
  - alias: Execute Purifier Logic
    choose:
    - conditions:
      - condition: template
        value_template: '{{ should_be_off }}'
      sequence:
      - alias: Turn Off Purifier
        target:
          entity_id: fan.zhimi_mb4a_e02f_air_purifier_2
        action: fan.turn_off
    - conditions:
      - condition: template
        value_template: '{{ should_be_silent }}'
      sequence:
      - alias: Turn On (Silent)
        target:
          entity_id: fan.zhimi_mb4a_e02f_air_purifier_2
        action: fan.turn_on
        data: {}
      - alias: Set Speed to Sleep
        target:
          entity_id: fan.zhimi_mb4a_e02f_air_purifier_2
        data:
          preset_mode: Sleep
        action: fan.set_preset_mode
    - conditions: []
      sequence:
      - alias: Turn On (Auto)
        target:
          entity_id: fan.zhimi_mb4a_e02f_air_purifier_2
        action: fan.turn_on
        data: {}
      - alias: Set Speed to Auto
        target:
          entity_id: fan.zhimi_mb4a_e02f_air_purifier_2
        data:
          preset_mode: Auto
        action: fan.set_preset_mode
  mode: restart
- id: unique_identifier_for_combined_automation
  alias: Light - Backyard - Advanced Control (v2)
  description: 'Smart sterowanie światłem ogrodu. Poprawiona logika aktualizacji statusu
    przy ręcznym wyłączeniu.

    '
  triggers:
  - id: person_detected
    entity_id: binary_sensor.rlc_410w_person
    to: 'on'
    trigger: state
  - id: pet_detected
    entity_id: binary_sensor.rlc_410w_pet
    to: 'on'
    trigger: state
  - id: light_on
    entity_id:
    - light.light_backyard_right
    - light.light_backyard_left
    to: 'on'
    trigger: state
  - id: light_off
    entity_id:
    - light.light_backyard_right
    - light.light_backyard_left
    to: 'off'
    from: 'on'
    trigger: state
  - id: startup
    trigger: homeassistant
    event: start
  conditions: []
  actions:
  - if:
    - condition: state
      entity_id: light.light_backyard_right
      state: 'off'
    - condition: state
      entity_id: light.light_backyard_left
      state: 'off'
    then:
    - action: input_text.set_value
      target:
        entity_id: input_text.backyard_light_status
      data:
        value: Światła ogrodu wyłączone
    - stop: Wszystkie światła zgaszone - aktualizacja statusu i stop.
  - alias: Calculate Context & Logic
    variables:
      ctx_l_r: '{{ (states.light.light_backyard_right.context | default({})).user_id
        | default(none) }}'
      ctx_l_l: '{{ (states.light.light_backyard_left.context | default({})).user_id
        | default(none) }}'
      ctx_s_r: '{{ (states.switch.light_backyard_right.context | default({})).user_id
        if states.switch.light_backyard_right is defined else none }}'
      ctx_s_l: '{{ (states.switch.light_backyard_left.context | default({})).user_id
        if states.switch.light_backyard_left is defined else none }}'
      is_user_context: "{{ ctx_l_r is not none or ctx_l_l is not none or\n   ctx_s_r
        is not none or ctx_s_l is not none }}"
      ts_now: '{{ as_timestamp(now()) }}'
      ts_light_r: '{{ as_timestamp(states.light.light_backyard_right.last_changed)
        | default(0) }}'
      ts_light_l: '{{ as_timestamp(states.light.light_backyard_left.last_changed)
        | default(0) }}'
      ts_light_last: '{{ [ts_light_r, ts_light_l] | max }}'
      ts_motion_person: '{{ as_timestamp(states.binary_sensor.rlc_410w_person.last_changed)
        | default(0) }}'
      ts_motion_pet: '{{ as_timestamp(states.binary_sensor.rlc_410w_pet.last_changed)
        | default(0) }}'
      ts_last_motion: '{{ [ts_motion_person, ts_motion_pet] | max }}'
      person_on: '{{ is_state(''binary_sensor.rlc_410w_person'',''on'') }}'
      pet_on: '{{ is_state(''binary_sensor.rlc_410w_pet'',''on'') }}'
      is_light_older_than_motion: "{{ is_state('light.light_backyard_right', 'on')\n
        \  and (ts_last_motion - ts_light_last > 10) }}"
      is_manual_mode: "{{ is_user_context\n   or (trigger.id == 'light_on'\n       and
        not person_on\n       and not pet_on)\n   or is_light_older_than_motion\n
        \  or trigger.id == 'startup' }}"
      timeout_seconds: "{% if is_manual_mode %}\n  3600\n{% elif trigger.id == 'person_detected'
        or is_state('binary_sensor.rlc_410w_person','on') %}\n  900\n{% else %}\n
        \ 300\n{% endif %}"
      is_dark: "{{ is_state('sun.sun', 'below_horizon')\n   or (ts_now - as_timestamp(state_attr('sun.sun',
        'next_setting'))) > -3600 }}"
      auto_reason: "{% if person_on and pet_on %}\n  Osoba i zwierzę na podwórku –
        światło AUTO\n{% elif person_on %}\n  Osoba na podwórku – światło AUTO\n{%
        elif pet_on %}\n  Zwierzę na podwórku – światło AUTO\n{% else %}\n  Ruch na
        podwórku – światło AUTO\n{% endif %}"
  - alias: Activation Logic
    choose:
    - conditions:
      - condition: template
        value_template: '{{ is_manual_mode }}'
      sequence:
      - action: input_text.set_value
        target:
          entity_id: input_text.backyard_light_status
        data:
          value: "{% if trigger.id == 'startup' and\n      (is_state('light.light_backyard_right','on')\n
            \      or is_state('light.light_backyard_left','on')) %}\n  Światła włączone
            przy starcie HA\n{% elif trigger.id == 'light_on' %}\n  Światła ogrodu
            włączone ręcznie\n{% else %}\n  Tryb ręczny – bez automatyki ruchu\n{%
            endif %}\n"
    - conditions:
      - condition: template
        value_template: '{{ not is_manual_mode and is_dark }}'
      - condition: template
        value_template: '{{ person_on or pet_on }}'
      sequence:
      - alias: Turn ON backyard lights (RIGHT)
        action: light.turn_on
        target:
          entity_id: light.light_backyard_right
      - action: input_text.set_value
        target:
          entity_id: input_text.backyard_light_status
        data:
          value: '{{ auto_reason }}'
  - alias: Wait for Inactivity
    wait_template: "{{ is_state('binary_sensor.rlc_410w_person','off')\n   and is_state('binary_sensor.rlc_410w_pet','off')
      }}"
    timeout: 03:00:00
    continue_on_timeout: true
  - alias: Dynamic Delay (Timer)
    delay:
      seconds: '{{ timeout_seconds }}'
  - alias: Turn OFF
    action: light.turn_off
    target:
      entity_id:
      - light.light_backyard_right
      - light.light_backyard_left
  - alias: Update status after OFF
    action: input_text.set_value
    target:
      entity_id: input_text.backyard_light_status
    data:
      value: Światła ogrodu wyłączone
  mode: restart
- id: '1712276372553'
  alias: Watchdog - WThermostat
  description: ''
  trigger:
  - entity_id: climate.wthermostat
    to: unavailable
    for:
      minutes: 5
    trigger: state
  - hours: /1
    trigger: time_pattern
  - trigger: homeassistant
    event: start
  action:
  - condition: template
    value_template: '{{ states(''climate.wthermostat'') == ''unavailable'' }}'
  - delay:
      hours: 0
      minutes: 1
      seconds: 0
      milliseconds: 0
  - action: rest_command.wthermostat_restart
    data: {}
- id: '1712617921906'
  alias: Enhanced Smart Control - Television Control
  description: 'Zarządza stanem TV i Ambilight na podstawie pracy telewizora/Chromecasta
    oraz aktualizuje stan głośników (script.speakers_in_use).

    '
  mode: single
  trigger:
  - trigger: homeassistant
    event: start
  - trigger: state
    entity_id:
    - media_player.lg_webos_smart_tv
    - media_player.chromecast
    from: 'on'
    to: 'off'
    for: 00:00:02
  - trigger: state
    entity_id: binary_sensor.tv_enabled
    to: 'on'
    for: 00:00:02
  - trigger: state
    entity_id: binary_sensor.tv_enabled
    to: 'off'
    for: 00:00:02
  condition: []
  action:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.platform == ''homeassistant'' }}'
      sequence:
      - delay: 00:01:00
  - choose:
    - conditions:
      - condition: state
        entity_id: binary_sensor.tv_enabled
        state: 'on'
      sequence:
      - action: script.speakers_in_use
      - action: light.turn_on
        target:
          entity_id: light.dreamview_t1
    default:
    - action: light.turn_off
      target:
        entity_id: light.dreamview_t1
    - action: script.speakers_in_use
- id: '1713550502292'
  alias: Switch - Chromacast speaker volume control
  description: Automatyzacja do zwiększania lub zmniejszania głośności głośników w
    zależności od zmiany głośności Chromecast.
  triggers:
  - entity_id: media_player.chromecast
    attribute: volume_level
    trigger: state
  conditions:
  - condition: template
    value_template: '{{ trigger.to_state is not none and trigger.from_state is not
      none }}'
  - condition: template
    value_template: '{{ trigger.to_state.attributes.volume_level is defined and trigger.from_state.attributes.volume_level
      is defined }}'
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.to_state.attributes.volume_level > trigger.from_state.attributes.volume_level
          }}'
      sequence:
      - action: script.speakers_volume
        data: {}
    - conditions:
      - condition: template
        value_template: '{{ trigger.to_state.attributes.volume_level < trigger.from_state.attributes.volume_level
          }}'
      sequence:
      - action: script.speakers_volume_2
        data: {}
  mode: queued
  max: 10
- id: '1713558218450'
  alias: Powiadomienie o odebranym kodzie IR
  trigger:
  - platform: mqtt
    topic: BK7231N_512300023/RESULT
  condition:
  - condition: template
    value_template: '{{ ''IrReceived'' in trigger.payload_json }}'
  action:
  - data:
      message: 'Odebrano kod IR: {{ trigger.payload_json.IrReceived.Data }}'
      title: Kod IR
    action: notify.mobile_app_rmx2202
