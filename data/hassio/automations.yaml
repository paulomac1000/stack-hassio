    data:
      option: Manual
    action: input_select.select_option
- id: '1760659843522'
  alias: Light - LivingRoom - Reset to Auto Mode
  description: Resetuje tryb na 'Auto', gdy salon staje się pusty, a system był w
    trybie 'Manual'.
  mode: single
  trigger:
  - entity_id:
    - binary_sensor.motion_sensor_livingroom_extended
    to: 'off'
