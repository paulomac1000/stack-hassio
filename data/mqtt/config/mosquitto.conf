# Tryb mieszany - pozwala na dostęp anonimowy + z hasłem
persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type all

# Główny listener
listener 1883
allow_anonymous true
#password_file /mosquitto/config/pwfile

# Opcjonalnie: jeśli chcesz WebSocket (dla przeglądarki)
# listener 9001
# protocol websockets
# allow_anonymous true
# password_file /mosquitto/config/pwfile