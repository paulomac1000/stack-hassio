  #      max-size: "10m"
  #      max-file: "3"

  # =============================================================================
  # STEP 8: TEST RUNNER (Optional/Auto-run)
  # =============================================================================

  unit-tests:
    container_name: hass-unit-tests
    build:
      context: .
      dockerfile: tests/Dockerfile
    volumes:
      - .:/app:ro
    working_dir: /app
    # Unit tests don't need other services, so no depends_on.
    # This service will run and exit with code 0 if tests pass.
    # It allows seeing test results directly in 'docker compose up' logs.
    command: pytest tests/test_heating_macros.py yolov5-app/test_app.py -v --tb=short -p no:cacheprovider

volumes:
  yolov5_cache:
